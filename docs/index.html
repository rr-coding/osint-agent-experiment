// ── State ────────────────────────────────────────────────────────────────
let currentData = null;
let currentDatasource = null;   // 'existing' | 'gather'
let statusInfo = { existing: false, existingFile: null, existingModified: null };
let isRunning = false;
let map = null;
let markers = [];
let circles = [];
let labelLayers = [];
let sseConnection = null;

// ── Colour palette ────────────────────────────────────────────────────────
const CATEGORY_COLOURS = {
  aircraft_carrier:    "#00e5ff",
  destroyer:           "#448aff",
  frigate:             "#00bfa5",
  submarine_fleet:     "#7c4dff",
  submarine_strategic: "#e040fb",
  amphibious_assault:  "#ff6e40",
  patrol_vessel:       "#eeff41",
  mine_countermeasures:"#ffd740",
  auxiliary:           "#90a4ae",
  naval_base:          "#ffffff",
  air_station:         "#b0bec5",
  training_unit:       "#80cbc4",
  other:               "#616161",
};
const READINESS_COLOURS = { high: "#00e676", medium: "#ffab00", low: "#ff1744" };

// ── UTC clock ─────────────────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  const months = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
  const pad = n => String(n).padStart(2,"0");
  document.getElementById("clock").textContent =
    `${pad(now.getUTCDate())} ${months[now.getUTCMonth()]} ${now.getUTCFullYear()} ` +
    `${pad(now.getUTCHours())}:${pad(now.getUTCMinutes())}:${pad(now.getUTCSeconds())}Z`;
}
setInterval(updateClock, 1000);
updateClock();

// ── Map init ──────────────────────────────────────────────────────────────
function initMap() {
  map = L.map("map", {
    center: [54, -2],
    zoom: 5,
    zoomControl: true,
  });
  L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
    attribution: '&copy; <a href="https://carto.com/">CartoDB</a> &copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
    subdomains: "abcd",
    maxZoom: 19,
  }).addTo(map);
}

// ── Status check on load ──────────────────────────────────────────────────
async function checkStatus() {
  // Demo mode: no server needed
  updateDatasourceUI();
}

function updateDatasourceUI() {
  const btnExisting = document.getElementById("btn-existing");
  const meta = document.getElementById("existing-meta");
  if (statusInfo.existing && statusInfo.existingFile) {
    btnExisting.disabled = false;
    const modStr = statusInfo.existingModified
      ? fmtDate(statusInfo.existingModified)
      : "—";
    meta.textContent = `${statusInfo.existingFile} — ${modStr}`;
  } else {
    btnExisting.disabled = true;
    meta.textContent = "No data available";
    if (currentDatasource === "existing") currentDatasource = null;
  }
  updateExecuteBtn();
}

function fmtDate(iso) {
  const d = new Date(iso);
  const months = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
  const pad = n => String(n).padStart(2,"0");
  return `${pad(d.getUTCDate())} ${months[d.getUTCMonth()]} ${d.getUTCFullYear()} ` +
         `${pad(d.getUTCHours())}:${pad(d.getUTCMinutes())}Z`;
}

// ── Datasource selection ──────────────────────────────────────────────────
function selectDatasource(mode) {
  if (mode === "existing" && document.getElementById("btn-existing").disabled) return;
  currentDatasource = mode;
  document.getElementById("btn-existing").classList.toggle("active", mode === "existing");
  document.getElementById("btn-gather").classList.toggle("active", mode === "gather");
  updateExecuteBtn();
}

function updateExecuteBtn() {
  const btn = document.getElementById("execute-btn");
  const rnOn = document.getElementById("rn-toggle").checked;
  if (isRunning) {
    btn.disabled = false;
    btn.classList.add("running");
    btn.textContent = "EXECUTING...";
    return;
  }
  btn.classList.remove("running");
  if (!currentDatasource) {
    btn.disabled = true;
    btn.textContent = "EXECUTE";
    return;
  }
  if (!rnOn) {
    btn.disabled = true;
    btn.textContent = "EXECUTE";
    return;
  }
  btn.disabled = false;
  btn.textContent = "EXECUTE";
}

document.getElementById("rn-toggle").addEventListener("change", updateExecuteBtn);

// ── Execute ───────────────────────────────────────────────────────────────
async function execute() {
  if (isRunning) return;
  if (currentDatasource === "existing") {
    await loadExistingData();
  } else if (currentDatasource === "gather") {
    await gatherFreshOSINT();
  }
}

async function loadExistingData() {
  // Demo mode: data already embedded
  setData(EMBEDDED_DATA);
  const assets = EMBEDDED_DATA.assets || [];
  log("white", `[STATUS] ${assets.length} assets loaded from embedded data. Map populated.`);
  setStatus("ready", "SYSTEM READY");
}

async function gatherFreshOSINT() {
  log("white", "[STATUS] Live agent execution not available in demo mode. Viewing cached data.");
}

async function handleSSEEvent(ev) {
  if (ev.type === "log") {
    log(classifyLine(ev.line), ev.line);
  } else if (ev.type === "status") {
    log("white", "[STATUS] " + ev.message);
  } else if (ev.type === "complete") {
    log("green", `[STATUS] Agent run complete. Loading ${ev.data_file}...`);
    await checkStatus();
    await loadExistingData();
  } else if (ev.type === "error") {
    log("red", "[ERROR] " + ev.message);
  }
}

function classifyLine(line) {
  if (/\[DECISION\]|\[SEARCH\]/i.test(line))  return "cyan";
  if (/\[FOUND\]|\[ANALYSIS\]/i.test(line))   return "green";
  if (/\[WARNING\]|\[RETRY\]/i.test(line))    return "amber";
  if (/\[ERROR\]/i.test(line))                return "red";
  return "white";
}

// ── Log helpers ───────────────────────────────────────────────────────────
function log(cls, text) {
  const box = document.getElementById("log-box");
  const line = document.createElement("div");
  line.className = `log-line log-${cls}`;
  line.textContent = text;
  box.appendChild(line);
  box.scrollTop = box.scrollHeight;
}

function clearLog() {
  document.getElementById("log-box").innerHTML = "";
}

// ── Status indicator ──────────────────────────────────────────────────────
function setStatus(state, text) {
  const dot = document.getElementById("status-dot");
  const label = document.getElementById("status-text");
  dot.className = "status-dot " + (state === "ready" ? "ready" : state === "running" ? "running" : "nodata");
  label.textContent = text;
}

// ── Populate map ──────────────────────────────────────────────────────────
function setData(data) {
  currentData = data;
  updateMap();
  updateFooter();
}

function clearMapLayers() {
  markers.forEach(m => { map.removeLayer(m); });
  circles.forEach(c => { map.removeLayer(c); });
  labelLayers.forEach(l => { map.removeLayer(l); });
  markers = []; circles = []; labelLayers = [];
}

function updateMap() {
  if (!currentData) return;
  clearMapLayers();

  const assets = currentData.assets || currentData;
  if (!Array.isArray(assets)) return;

  const colourBy  = document.getElementById("colour-by").value;
  const showLabels= document.getElementById("show-labels").checked;
  const showRadius= document.getElementById("show-radius").checked;
  const showCaps  = document.getElementById("show-caps").checked;
  const filtHigh  = document.getElementById("filt-high").checked;
  const filtMed   = document.getElementById("filt-medium").checked;
  const filtLow   = document.getElementById("filt-low").checked;

  // Build operation types index from metadata
  const opTypes = (currentData.metadata && currentData.metadata.operation_types) || [];

  assets.forEach(asset => {
    if (asset.latitude == null || asset.longitude == null) return;

    // Filter by readiness
    const r = (asset.operational_readiness || "").toLowerCase();
    if (r === "high"   && !filtHigh) return;
    if (r === "medium" && !filtMed)  return;
    if (r === "low"    && !filtLow)  return;

    const colour = getColour(asset, colourBy, opTypes);
    const isFixed = asset.type === "base" || asset.type === "air_station";
    let marker;

    if (isFixed) {
      // Square marker via divIcon
      const icon = L.divIcon({
        html: `<div style="
          width:16px;height:16px;
          background:${colour};
          border:1px solid ${colour};
          box-shadow:0 0 8px ${colour}88;
          opacity:0;
          transition:opacity 0.3s;
        " class="map-marker-square"></div>`,
        iconSize: [16, 16],
        iconAnchor: [8, 8],
        className: "",
      });
      marker = L.marker([asset.latitude, asset.longitude], { icon });
    } else {
      marker = L.circleMarker([asset.latitude, asset.longitude], {
        radius: 10,
        color: colour,
        weight: 2,
        fillColor: colour,
        fillOpacity: 0.25,
        opacity: 0,
        className: "map-marker-circle",
      });
    }

    marker.addTo(map);
    // Fade in
    setTimeout(() => {
      const el = marker.getElement && marker.getElement();
      if (el) {
        el.style.transition = "opacity 0.3s";
        el.style.opacity = "1";
        // Handle divIcon inner square
        const sq = el.querySelector(".map-marker-square");
        if (sq) sq.style.opacity = "1";
      } else if (marker.setStyle) {
        marker.setStyle({ opacity: 1, fillOpacity: 0.25 });
      }
    }, 30);

    marker.bindPopup(() => buildPopup(asset, opTypes, showCaps), { maxWidth: 420 });
    markers.push(marker);

    // Label
    if (showLabels) {
      const label = L.tooltip({
        permanent: true,
        direction: "right",
        offset: [12, 0],
        className: "",
      });
      label.setContent(`<span style="
        font-family:'Share Tech Mono',monospace;
        font-size:10px;
        color:${colour};
        background:rgba(10,14,23,0.8);
        padding:1px 4px;
        border:1px solid ${colour}44;
        white-space:nowrap;
      ">${asset.name}</span>`);
      label.setLatLng([asset.latitude, asset.longitude]);
      label.addTo(map);
      labelLayers.push(label);
    }

    // Confidence radius
    if (showRadius && asset.confidence_score != null) {
      const radiusM = (1 - asset.confidence_score) * 50000;
      if (radiusM > 500) {
        const circ = L.circle([asset.latitude, asset.longitude], {
          radius: radiusM,
          color: colour,
          weight: 1,
          opacity: 0.3,
          fillColor: colour,
          fillOpacity: 0.08,
        });
        circ.addTo(map);
        circles.push(circ);
      }
    }
  });

  updateLegend(colourBy, opTypes, assets);
}

function getColour(asset, colourBy, opTypes) {
  if (colourBy === "readiness") {
    return READINESS_COLOURS[(asset.operational_readiness || "").toLowerCase()] || "#4a5568";
  }
  if (colourBy === "category") {
    return CATEGORY_COLOURS[asset.unit_category || asset.type] || "#4a5568";
  }
  if (colourBy === "capability") {
    // Find highest scoring op type
    const scores = asset.capability_scores || {};
    let best = null, bestScore = -1;
    for (const [k, v] of Object.entries(scores)) {
      if (v > bestScore) { bestScore = v; best = k; }
    }
    // Map op type id to a colour from category palette by index
    if (!best) return "#4a5568";
    const keys = opTypes.map(o => o.id);
    const idx = keys.indexOf(best);
    const palette = Object.values(CATEGORY_COLOURS);
    return palette[((idx >= 0 ? idx : 0)) % palette.length];
  }
  return "#4a5568";
}

function buildPopup(asset, opTypes, showCaps) {
  const r = (asset.operational_readiness || "").toLowerCase();
  const rClass = r === "high" ? "high" : r === "medium" ? "medium" : r === "low" ? "low" : "";
  const rText = r ? r.toUpperCase() : "—";
  const conf = asset.confidence_score != null
    ? Math.round(asset.confidence_score * 100)
    : null;
  const coords = (asset.latitude != null && asset.longitude != null)
    ? `${asset.latitude.toFixed(3)}°, ${asset.longitude.toFixed(3)}°`
    : "—";

  let capHtml = "";
  if (showCaps && asset.capability_scores && Object.keys(asset.capability_scores).length > 0) {
    capHtml = `<hr class="popup-divider"><div style="font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">Capabilities</div>`;
    const colour = CATEGORY_COLOURS[asset.unit_category || asset.type] || "#4a5568";
    for (const op of opTypes) {
      const score = asset.capability_scores[op.id] ?? 0;
      const pct = (score / 5) * 100;
      capHtml += `
        <div class="cap-bar-row">
          <div class="cap-bar-label">${op.name} &nbsp;<span style="color:var(--text-bright)">${score}/5</span></div>
          <div class="cap-bar-bg"><div class="cap-bar-fill" style="width:${pct}%;background:${colour}"></div></div>
        </div>`;
    }
  }

  let sourcesHtml = "";
  if (asset.source_urls && asset.source_urls.length > 0) {
    sourcesHtml = `<hr class="popup-divider"><div class="popup-sources">`;
    for (const url of asset.source_urls.slice(0, 3)) {
      if (url) sourcesHtml += `<a href="${url}" target="_blank" rel="noopener">${url.replace(/https?:\/\//,"")}</a>`;
    }
    sourcesHtml += `</div>`;
  }

  return `
    <div class="popup-name">${asset.name}</div>
    <div class="popup-row"><span class="popup-key">Class</span><span class="popup-val">${asset.class || "—"}</span></div>
    <div class="popup-row"><span class="popup-key">Category</span><span class="popup-val">${fmt(asset.unit_category)}</span></div>
    <div class="popup-row"><span class="popup-key">Readiness</span><span class="popup-val ${rClass}">${rText}</span></div>
    ${asset.readiness_rationale ? `<div class="popup-rationale">${truncate(asset.readiness_rationale, 200)}</div>` : ""}
    <div class="popup-row"><span class="popup-key">Assignment</span><span class="popup-val">${truncate(asset.current_assignment || "—", 80)}</span></div>
    <hr class="popup-divider">
    <div class="popup-row"><span class="popup-key">Location</span><span class="popup-val">${asset.location_description || "—"}</span></div>
    <div class="popup-row"><span class="popup-key">Coordinates</span><span class="popup-val">${coords}</span></div>
    ${conf !== null ? `
    <div class="popup-row" style="margin-top:4px">
      <span class="popup-key">Confidence</span>
      <span class="popup-val">
        <div class="conf-bar-wrap">
          <div class="conf-bar-bg"><div class="conf-bar-fill" style="width:${conf}%"></div></div>
          <span class="conf-pct">${conf}%</span>
        </div>
      </span>
    </div>` : ""}
    ${capHtml}
    ${sourcesHtml}
  `;
}

function fmt(s) {
  if (!s) return "—";
  return s.replace(/_/g, " ").replace(/\b\w/g, c => c.toUpperCase());
}
function truncate(s, n) {
  if (!s || s.length <= n) return s || "—";
  return s.slice(0, n) + "…";
}

// ── Legend ────────────────────────────────────────────────────────────────
function updateLegend(colourBy, opTypes, assets) {
  const el = document.getElementById("legend-items");
  el.innerHTML = "";

  let entries = [];
  if (colourBy === "readiness") {
    entries = [
      { colour: READINESS_COLOURS.high,   label: "High Readiness" },
      { colour: READINESS_COLOURS.medium, label: "Medium Readiness" },
      { colour: READINESS_COLOURS.low,    label: "Low Readiness" },
    ];
  } else if (colourBy === "category") {
    const present = new Set((assets || []).map(a => a.unit_category || a.type).filter(Boolean));
    for (const [k, v] of Object.entries(CATEGORY_COLOURS)) {
      if (present.has(k)) entries.push({ colour: v, label: fmt(k) });
    }
  } else if (colourBy === "capability") {
    const palette = Object.values(CATEGORY_COLOURS);
    opTypes.forEach((op, i) => {
      entries.push({ colour: palette[i % palette.length], label: op.name });
    });
  }

  for (const e of entries) {
    const row = document.createElement("div");
    row.className = "legend-item";
    row.innerHTML = `<div class="legend-swatch" style="background:${e.colour}"></div><span>${e.label}</span>`;
    el.appendChild(row);
  }
}

// ── Footer ────────────────────────────────────────────────────────────────
function updateFooter() {
  const footer = document.getElementById("footer");
  if (!currentData) {
    footer.innerHTML = `<div id="footer-nodata">NO DATA LOADED</div>`;
    return;
  }
  const assets = currentData.assets || currentData;
  const meta = currentData.metadata || {};
  const total = Array.isArray(assets) ? assets.length : 0;
  const located = Array.isArray(assets) ? assets.filter(a => a.latitude != null).length : 0;
  const confs = Array.isArray(assets) ? assets.filter(a => a.confidence_score != null).map(a => a.confidence_score) : [];
  const avgConf = confs.length ? Math.round((confs.reduce((a,b)=>a+b,0)/confs.length)*100) : 0;
  const tokens = meta.total_tokens_used ? meta.total_tokens_used.toLocaleString() : "—";
  const updatedRaw = meta.generated_at || null;
  const updated = updatedRaw ? fmtDate(updatedRaw) : "—";
  const file = meta.source_file || statusInfo.existingFile || "—";

  footer.innerHTML = `
    <div id="footer-left">DEMO MODE &nbsp;|&nbsp; DATA: ${file}</div>
    <div id="footer-centre">ASSETS: ${total} | LOCATED: ${located} | AVG CONF: ${avgConf}%</div>
    <div id="footer-right">TOKENS: ${tokens} | UPDATED: ${updated}</div>
  `;
}

// ── Theme switching ───────────────────────────────────────────────────────
function setTheme(name) {
  document.body.classList.remove("theme-highcon", "theme-nightvis");
  if (name === "highcon") document.body.classList.add("theme-highcon");
  if (name === "nightvis") document.body.classList.add("theme-nightvis");
  ["default","highcon","nightvis"].forEach(t => {
    document.getElementById("btn-theme-" + t).classList.toggle("active", t === name);
  });
}

// ── Init ──────────────────────────────────────────────────────────────────
initMap();
setStatus("ready", "SYSTEM READY");

// Demo mode: load embedded data immediately
(function () {
  currentData = EMBEDDED_DATA;
  const meta = EMBEDDED_DATA.metadata || {};
  statusInfo.existing = true;
  statusInfo.existingFile = meta.source_file || "embedded";
  statusInfo.existingModified = meta.generated_at || null;
  selectDatasource("existing");
  updateMap();
  updateFooter();

  // Simulated typewriter agent log
  const assets = EMBEDDED_DATA.assets || [];
  const lines = [];
  const readinessLabel = r => r ? r.toUpperCase() : "UNKNOWN";
  assets.forEach(a => {
    lines.push(["cyan",  `[SEARCH] Querying: ${a.name} deployment 2026`]);
    if (a.location_description) {
      lines.push(["green", `[FOUND] ${a.name} — ${a.class || a.type} — ${a.location_description}`]);
    } else {
      lines.push(["green", `[FOUND] ${a.name} — ${a.class || a.type}`]);
    }
    if (a.operational_readiness) {
      lines.push(["white", `[ANALYSIS] Readiness assessment: ${readinessLabel(a.operational_readiness)} — ${(a.current_assignment || "assignment not confirmed").slice(0,80)}`]);
    }
  });
  lines.push(["dim",   `[STATUS] Dataset loaded. ${assets.length} assets. ${assets.filter(x=>x.latitude!=null).length} geocoded.`]);

  let i = 0;
  const typeNext = () => {
    if (i >= lines.length) return;
    const [cls, text] = lines[i++];
    log(cls, text);
    setTimeout(typeNext, 50);
  };
  typeNext();
})();
</script>
