<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OSINT COMMAND CENTRE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
/* ── Design tokens — DEFAULT (cyan on dark) ────────────────────────── */
:root {
  --bg-primary:        #0a0e17;
  --bg-panel:          #0f1520;
  --bg-inset:          #070b12;
  --border-accent:     #00e5ff;
  --border-subtle:     rgba(0,229,255,0.12);
  --border-mid:        rgba(0,229,255,0.20);
  --border-faint:      rgba(0,229,255,0.15);
  --toggle-bg-on:      rgba(0,229,255,0.15);
  --text-primary:      #c8d6e5;
  --text-bright:       #e8f0f8;
  --text-dim:          #4a5568;
  --status-high:       #00e676;
  --status-medium:     #ffab00;
  --status-low:        #ff1744;
  --accent-glow:       rgba(0,229,255,0.3);
  --panel-width:       320px;
  --header-height:     48px;
  --footer-height:     36px;
}

/* ── HIGHCON — yellow/white on black ────────────────────────────────── */
body.theme-highcon {
  --bg-primary:        #000000;
  --bg-panel:          #0c0c0c;
  --bg-inset:          #000000;
  --border-accent:     #ffe600;
  --border-subtle:     rgba(255,230,0,0.15);
  --border-mid:        rgba(255,230,0,0.30);
  --border-faint:      rgba(255,230,0,0.20);
  --toggle-bg-on:      rgba(255,230,0,0.18);
  --text-primary:      #ffffff;
  --text-bright:       #ffffff;
  --text-dim:          #888888;
  --status-high:       #00ff88;
  --status-medium:     #ffe600;
  --status-low:        #ff2222;
  --accent-glow:       rgba(255,230,0,0.35);
}

/* ── NIGHTVIS — red on very dark ────────────────────────────────────── */
body.theme-nightvis {
  --bg-primary:        #070305;
  --bg-panel:          #0c0608;
  --bg-inset:          #040204;
  --border-accent:     #ff2200;
  --border-subtle:     rgba(255,34,0,0.12);
  --border-mid:        rgba(255,34,0,0.22);
  --border-faint:      rgba(255,34,0,0.16);
  --toggle-bg-on:      rgba(255,34,0,0.15);
  --text-primary:      #cc8880;
  --text-bright:       #ffbbaa;
  --text-dim:          #553333;
  --status-high:       #ff6600;
  --status-medium:     #cc3300;
  --status-low:        #880011;
  --accent-glow:       rgba(255,34,0,0.30);
}

/* ── Reset & base ─────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%; overflow: hidden;
  background: var(--bg-primary);
  color: var(--text-primary);
  font-family: "Share Tech Mono", "Courier New", monospace;
  font-size: 13px;
  text-rendering: optimizeLegibility;
  -webkit-font-smoothing: antialiased;
}
a { color: var(--border-accent); text-decoration: none; }
a:hover { text-decoration: underline; }

/* ── Layout skeleton ──────────────────────────────────────────────── */
#app {
  display: grid;
  grid-template-rows: var(--header-height) 1fr var(--footer-height);
  grid-template-columns: var(--panel-width) 1fr;
  grid-template-areas:
    "header header"
    "panel  map"
    "footer footer";
  width: 100vw; height: 100vh;
}

/* ── Header ───────────────────────────────────────────────────────── */
#header {
  grid-area: header;
  background: var(--bg-panel);
  border-bottom: 1px solid var(--border-accent);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  z-index: 1000;
}
#header-title {
  font-size: 16px;
  letter-spacing: 3px;
  color: var(--border-accent);
  text-transform: uppercase;
}
#header-right {
  display: flex;
  align-items: center;
  gap: 20px;
}
#status-indicator {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  letter-spacing: 1px;
  text-transform: uppercase;
}
.status-dot {
  width: 8px; height: 8px;
  border-radius: 0;
}
.status-dot.ready   { background: var(--status-high); animation: pulse-dot 2s ease-in-out infinite; }
.status-dot.running { background: var(--status-medium); animation: pulse-dot 1s ease-in-out infinite; }
.status-dot.nodata  { background: var(--status-low); }
@keyframes pulse-dot {
  0%,100% { opacity: 1; }
  50%      { opacity: 0.4; }
}
#clock {
  font-size: 13px;
  color: var(--text-bright);
  letter-spacing: 1px;
}

/* ── Leaflet tooltip reset (osint-label class strips default white box) ── */
.leaflet-tooltip.osint-label {
  background: transparent;
  border: none;
  box-shadow: none;
  padding: 0;
}
.leaflet-tooltip.osint-label::before {
  display: none;
}

/* ── Theme toggle ─────────────────────────────────────────────────── */
#theme-toggle {
  display: flex;
  gap: 2px;
}
.theme-btn {
  padding: 4px 10px;
  background: transparent;
  border: 1px solid var(--text-dim);
  color: var(--text-dim);
  font-family: inherit;
  font-size: 10px;
  letter-spacing: 1px;
  cursor: pointer;
  border-radius: 0;
  transition: border-color 0.15s, color 0.15s, background 0.15s;
}
.theme-btn:hover { border-color: var(--border-accent); color: var(--border-accent); }
.theme-btn.active {
  border-color: var(--border-accent);
  color: var(--bg-primary);
  background: var(--border-accent);
}

/* ── Left panel ───────────────────────────────────────────────────── */
#panel {
  grid-area: panel;
  background: var(--bg-panel);
  border-right: 1px solid var(--border-accent);
  overflow-y: auto;
  overflow-x: hidden;
  display: flex;
  flex-direction: column;
  gap: 0;
  scrollbar-width: thin;
  scrollbar-color: var(--text-dim) var(--bg-inset);
}
#panel::-webkit-scrollbar { width: 4px; }
#panel::-webkit-scrollbar-thumb { background: var(--text-dim); }

.section {
  padding: 10px 14px 12px;
  border-bottom: 1px solid var(--border-subtle);
}
.section-header {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--text-dim);
  border-bottom: 1px solid var(--border-faint);
  padding-bottom: 4px;
  margin-bottom: 10px;
}

/* ── Toggle rows (Intelligence Sources) ────────────────────────────── */
.toggle-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}
.toggle-label {
  font-size: 12px;
  color: var(--text-primary);
}
.toggle-label.dim { color: var(--text-dim); cursor: not-allowed; }

/* Rectangular toggle switch */
.toggle-switch {
  position: relative;
  width: 36px; height: 18px;
  cursor: pointer;
}
.toggle-switch input { display: none; }
.toggle-track {
  position: absolute; inset: 0;
  background: var(--bg-inset);
  border: 1px solid var(--text-dim);
  transition: border-color 0.2s, background 0.2s;
}
.toggle-switch input:checked + .toggle-track {
  border-color: var(--border-accent);
  background: var(--toggle-bg-on);
}
.toggle-handle {
  position: absolute;
  top: 3px; left: 3px;
  width: 10px; height: 10px;
  background: var(--text-dim);
  transition: left 0.2s, background 0.2s;
}
.toggle-switch input:checked + .toggle-track + .toggle-handle {
  left: 21px;
  background: var(--border-accent);
}
.toggle-switch.disabled { cursor: not-allowed; opacity: 0.4; pointer-events: none; }

/* ── Data source buttons ────────────────────────────────────────────── */
.datasource-btn {
  display: block;
  width: 100%;
  padding: 7px 10px;
  background: var(--bg-inset);
  border: 1px solid var(--text-dim);
  color: var(--text-dim);
  font-family: inherit;
  font-size: 12px;
  letter-spacing: 1px;
  text-align: left;
  cursor: pointer;
  border-radius: 0;
  margin-bottom: 6px;
  transition: border-color 0.15s, color 0.15s;
}
.datasource-btn.active {
  border-color: var(--border-accent);
  color: var(--text-bright);
}
.datasource-btn:hover:not(:disabled) {
  border-color: var(--border-accent);
  color: var(--text-bright);
}
.datasource-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.datasource-meta {
  font-size: 10px;
  color: var(--text-dim);
  margin-top: -4px;
  margin-bottom: 6px;
  padding-left: 2px;
}

/* ── Execute button ─────────────────────────────────────────────────── */
#execute-btn {
  width: 100%;
  padding: 10px;
  background: transparent;
  border: 1px solid var(--border-accent);
  color: var(--border-accent);
  font-family: inherit;
  font-size: 13px;
  letter-spacing: 2px;
  text-transform: uppercase;
  cursor: pointer;
  border-radius: 0;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}
#execute-btn:hover:not(:disabled) {
  background: var(--border-accent);
  color: var(--bg-primary);
}
#execute-btn:disabled {
  border-color: var(--text-dim);
  color: var(--text-dim);
  cursor: not-allowed;
}
#execute-btn.running {
  border-color: var(--status-medium);
  color: var(--status-medium);
  animation: execute-pulse 1.5s ease-in-out infinite;
}
@keyframes execute-pulse {
  0%,100% { border-color: var(--status-medium); color: var(--status-medium); }
  50%      { border-color: var(--border-accent); color: var(--border-accent); }
}

/* ── Agent log ──────────────────────────────────────────────────────── */
#log-wrapper {
  position: relative;
}
#log-box {
  height: 280px;
  background: var(--bg-inset);
  border: 1px solid var(--border-mid);
  overflow-y: auto;
  padding: 6px 8px;
  font-size: 11px;
  line-height: 1.5;
  scrollbar-width: thin;
  scrollbar-color: var(--text-dim) var(--bg-inset);
}
#log-box::-webkit-scrollbar { width: 3px; }
#log-box::-webkit-scrollbar-thumb { background: var(--text-dim); }
.log-line { white-space: pre-wrap; word-break: break-all; }
.log-cyan   { color: var(--border-accent); }
.log-green  { color: var(--status-high); }
.log-amber  { color: var(--status-medium); }
.log-red    { color: var(--status-low); }
.log-white  { color: var(--text-bright); }
.log-dim    { color: var(--text-dim); }
#log-clear {
  position: absolute;
  top: 2px; right: 2px;
  padding: 2px 6px;
  background: transparent;
  border: 1px solid var(--text-dim);
  color: var(--text-dim);
  font-family: inherit;
  font-size: 10px;
  cursor: pointer;
  border-radius: 0;
}
#log-clear:hover { border-color: var(--border-accent); color: var(--border-accent); }

/* ── Map controls ───────────────────────────────────────────────────── */
.control-row {
  display: flex;
  flex-direction: column;
  gap: 4px;
  margin-bottom: 8px;
}
.control-label {
  font-size: 10px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 1px;
}
select.ctrl-select {
  width: 100%;
  background: var(--bg-inset);
  border: 1px solid var(--border-accent);
  color: var(--text-primary);
  font-family: inherit;
  font-size: 12px;
  padding: 4px 6px;
  border-radius: 0;
  appearance: none;
  cursor: pointer;
}
select.ctrl-select option { background: var(--bg-inset); }

.toggle-group {
  display: flex;
  flex-direction: column;
  gap: 5px;
  margin-bottom: 8px;
}
.cb-row {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: var(--text-primary);
  cursor: pointer;
}
/* Custom checkbox */
.cb-row input[type="checkbox"] { display: none; }
.cb-box {
  width: 14px; height: 14px;
  border: 1px solid var(--text-dim);
  background: var(--bg-inset);
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: border-color 0.15s, background 0.15s;
}
.cb-row input:checked + .cb-box {
  border-color: var(--border-accent);
  background: var(--border-accent);
}
.cb-row input:checked + .cb-box::after {
  content: "✓";
  font-size: 10px;
  color: var(--bg-primary);
  line-height: 1;
}

/* ── Legend ─────────────────────────────────────────────────────────── */
#legend-items { display: flex; flex-direction: column; gap: 5px; }
.legend-item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  color: var(--text-primary);
}
.legend-swatch {
  width: 12px; height: 12px;
  flex-shrink: 0;
  border: 1px solid rgba(255,255,255,0.2);
}

/* ── Map area ────────────────────────────────────────────────────────── */
#map {
  grid-area: map;
  background: var(--bg-primary);
}

/* ── Footer ──────────────────────────────────────────────────────────── */
#footer {
  grid-area: footer;
  background: var(--bg-panel);
  border-top: 1px solid var(--border-accent);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  font-size: 11px;
  color: var(--text-dim);
  letter-spacing: 0.5px;
}
#footer-left, #footer-centre, #footer-right { flex: 1; }
#footer-centre { text-align: center; }
#footer-right  { text-align: right; }
#footer-nodata {
  width: 100%;
  text-align: center;
  letter-spacing: 2px;
  text-transform: uppercase;
}

/* ── Leaflet overrides ──────────────────────────────────────────────── */
.leaflet-control-zoom a {
  background: var(--bg-panel) !important;
  color: var(--border-accent) !important;
  border: 1px solid var(--border-accent) !important;
  border-radius: 0 !important;
  font-family: inherit !important;
}
.leaflet-control-zoom a:hover {
  background: var(--border-accent) !important;
  color: var(--bg-primary) !important;
}
.leaflet-container .leaflet-control-attribution {
  background: rgba(0,0,0,0.5) !important;
  color: var(--text-dim) !important;
  font-size: 9px !important;
}
.leaflet-popup-content-wrapper {
  background: var(--bg-panel) !important;
  border: 1px solid var(--border-accent) !important;
  border-radius: 0 !important;
  box-shadow: 0 0 20px var(--accent-glow) !important;
  color: var(--text-primary) !important;
  font-family: "Share Tech Mono", monospace !important;
  min-width: 350px !important;
}
.leaflet-popup-tip-container { display: none !important; }
.leaflet-popup-close-button {
  color: var(--border-accent) !important;
  font-size: 16px !important;
  top: 4px !important; right: 6px !important;
}
.leaflet-popup-content { margin: 14px 16px !important; }

/* ── Popup internals ─────────────────────────────────────────────────── */
.popup-name {
  font-size: 14px;
  color: var(--text-bright);
  font-weight: bold;
  letter-spacing: 1px;
  margin-bottom: 6px;
  text-transform: uppercase;
}
.popup-row {
  display: flex;
  justify-content: space-between;
  margin-bottom: 3px;
  font-size: 11px;
}
.popup-key { color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
.popup-val { color: var(--text-primary); text-align: right; max-width: 200px; }
.popup-val.high   { color: var(--status-high); }
.popup-val.medium { color: var(--status-medium); }
.popup-val.low    { color: var(--status-low); }
.popup-divider {
  border: none;
  border-top: 1px solid rgba(0,229,255,0.2);
  margin: 8px 0;
}
.popup-rationale {
  font-size: 10px;
  color: var(--text-dim);
  margin-bottom: 6px;
  line-height: 1.4;
}
.conf-bar-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 4px;
}
.conf-bar-bg {
  flex: 1;
  height: 4px;
  background: var(--bg-inset);
  border: 1px solid var(--text-dim);
}
.conf-bar-fill { height: 100%; background: var(--border-accent); }
.conf-pct { font-size: 11px; color: var(--border-accent); width: 36px; text-align: right; }
.cap-bar-row { margin-bottom: 4px; }
.cap-bar-label { font-size: 10px; color: var(--text-dim); margin-bottom: 2px; }
.cap-bar-bg { height: 8px; background: var(--bg-inset); border: 1px solid var(--border-subtle); }
.cap-bar-fill { height: 100%; }
.popup-sources { margin-top: 8px; font-size: 10px; }
.popup-sources a { color: var(--border-accent); display: block; }
</style>
</head>
<body>
<div id="app">

  <!-- ── Header ────────────────────────────────────────────────────────── -->
  <header id="header">
    <span id="header-title">🌐 OSINT COMMAND CENTRE</span>
    <div id="theme-toggle">
      <button class="theme-btn active" onclick="setTheme('default')" id="btn-theme-default">DEFAULT</button>
      <button class="theme-btn"        onclick="setTheme('highcon')"  id="btn-theme-highcon">HIGHCON</button>
      <button class="theme-btn"        onclick="setTheme('nightvis')" id="btn-theme-nightvis">NIGHTVIS</button>
    </div>
    <div id="header-right">
      <div id="status-indicator">
        <div class="status-dot nodata" id="status-dot"></div>
        <span id="status-text">NO DATA</span>
      </div>
      <div id="clock">—</div>
    </div>
  </header>

  <!-- ── Left panel ────────────────────────────────────────────────────── -->
  <nav id="panel">

    <!-- Section 1: Intelligence Sources -->
    <div class="section">
      <div class="section-header">Intelligence Sources</div>
      <div class="toggle-row">
        <span id="rn-toggle-label-text" class="toggle-label">⚓ Royal Navy</span>
        <label class="toggle-switch">
          <input type="checkbox" id="rn-toggle" checked onchange="updateExecuteBtn()">
          <div class="toggle-track"></div>
          <div class="toggle-handle"></div>
        </label>
      </div>
      <div class="toggle-row">
        <span id="ba-toggle-label-text" class="toggle-label">⚔ British Army</span>
        <label class="toggle-switch">
          <input type="checkbox" id="ba-toggle" checked onchange="updateExecuteBtn()">
          <div class="toggle-track"></div>
          <div class="toggle-handle"></div>
        </label>
      </div>
      <div class="toggle-row">
        <span id="raf-toggle-label-text" class="toggle-label">✈ Royal Air Force</span>
        <label class="toggle-switch">
          <input type="checkbox" id="raf-toggle" checked onchange="updateExecuteBtn()">
          <div class="toggle-track"></div>
          <div class="toggle-handle"></div>
        </label>
      </div>
    </div>

    <!-- Section 2: Data Source -->
    <div class="section">
      <div class="section-header">Data Source</div>
      <button class="datasource-btn" id="btn-existing" onclick="selectDatasource('existing')">
        ▣ USE EXISTING DATA
      </button>
      <div class="datasource-meta" id="existing-meta">Checking…</div>
      <button class="datasource-btn" id="btn-gather" onclick="selectDatasource('gather')">
        ▷ GATHER FRESH OSINT
      </button>
    </div>

    <!-- Section 3: Operations -->
    <div class="section">
      <div class="section-header">Operations</div>
      <button id="execute-btn" onclick="execute()" disabled>EXECUTE</button>
    </div>

    <!-- Section 4: Agent Log -->
    <div class="section">
      <div class="section-header">Agent Log</div>
      <div id="log-wrapper">
        <button id="log-clear" onclick="clearLog()">CLEAR</button>
        <div id="log-box"></div>
      </div>
    </div>

    <!-- Section 5: Map Controls -->
    <div class="section">
      <div class="section-header">Map Controls</div>
      <div class="control-row">
        <span class="control-label">Colour markers by</span>
        <select class="ctrl-select" id="colour-by" onchange="updateMap()">
          <option value="service" selected>Service</option>
          <option value="readiness">Readiness</option>
        </select>
      </div>
      <div class="toggle-group">
        <label class="cb-row">
          <input type="checkbox" id="show-labels" checked onchange="updateMap()">
          <div class="cb-box"></div>
          Asset labels
        </label>
      </div>
    </div>

    <!-- Section 6: Filter by Service -->
    <div class="section">
      <div class="section-header">Filter by Service</div>
      <div class="toggle-group">
        <label class="cb-row">
          <input type="checkbox" id="filt-svc-rn" checked onchange="updateMap();updateFooter()">
          <div class="cb-box"></div>
          <span style="color:#5c6bc0">⚓</span>&nbsp;Royal Navy
        </label>
        <label class="cb-row">
          <input type="checkbox" id="filt-svc-ba" checked onchange="updateMap();updateFooter()">
          <div class="cb-box"></div>
          <span style="color:#ef5350">⚔</span>&nbsp;British Army
        </label>
        <label class="cb-row">
          <input type="checkbox" id="filt-svc-raf" checked onchange="updateMap();updateFooter()">
          <div class="cb-box"></div>
          <span style="color:#4fc3f7">✈</span>&nbsp;Royal Air Force
        </label>
        <label class="cb-row">
          <input type="checkbox" id="filt-svc-joint" checked onchange="updateMap();updateFooter()">
          <div class="cb-box"></div>
          <span style="color:#8e24aa">◆</span>&nbsp;Joint / Other
        </label>
      </div>
    </div>

    <!-- Section 7: Filter by Readiness -->
    <div class="section">
      <div class="section-header">Filter by Readiness</div>
      <div class="toggle-group">
        <label class="cb-row">
          <input type="checkbox" id="filt-high" checked onchange="updateMap()">
          <div class="cb-box"></div>
          <span style="color:var(--status-high)">■</span>&nbsp;High
        </label>
        <label class="cb-row">
          <input type="checkbox" id="filt-medium" checked onchange="updateMap()">
          <div class="cb-box"></div>
          <span style="color:var(--status-medium)">■</span>&nbsp;Medium
        </label>
        <label class="cb-row">
          <input type="checkbox" id="filt-low" checked onchange="updateMap()">
          <div class="cb-box"></div>
          <span style="color:var(--status-low)">■</span>&nbsp;Low

<script>
const EMBEDDED_DATA = {"metadata":{"generated_at":"2026-04-18T16:11:37.032659+00:00Z","services_loaded":["royal_navy","british_army","royal_air_force"],"total_tokens_used":261599,"operation_types":[{"id":"carrier_strike","name":"Carrier Strike","description":"Power projection through carrier-based aviation, employing Queen Elizabeth-class carriers with escort destroyers and frigates to deliver air strikes and establish sea control over a wide area"},{"id":"air_defence","name":"Air Defence","description":"Protecting the fleet and territorial airspace from air and missile threats, primarily leveraging Type 45 destroyers' Sea Viper systems and coordinated sensor networks across the task group"},{"id":"anti_submarine_warfare","name":"Anti-Submarine Warfare","description":"Detecting, tracking, and neutralising submarine threats using Type 23 frigate towed arrays, hull-mounted sonars, and Wildcat helicopters equipped with sonobuoys and torpedoes"},{"id":"maritime_patrol_and_surveillance","name":"Maritime Patrol and Surveillance","description":"Persistent monitoring of home waters and exclusive economic zones using River-class OPVs and embarked helicopters to maintain maritime domain awareness and deter illegal activity"},{"id":"amphibious_operations","name":"Amphibious Operations","description":"Delivering personnel, vehicles, and supplies to littoral environments using RFA Bay-class landing ship docks, supported by carrier-borne air cover and escort warships"},{"id":"replenishment_at_sea","name":"Replenishment at Sea","description":"Sustaining deployed naval forces through underway fuel, stores, and logistics transfers using Tide-class tankers to extend task group endurance and operational reach"},{"id":"humanitarian_assistance_disaster_relief","name":"Humanitarian Assistance and Disaster Relief","description":"Rapid response to natural disasters or humanitarian crises using amphibious ships, tankers, and helicopters to deliver aid, evacuate civilians, and provide medical support"},{"id":"fishery_protection_and_sovereignty","name":"Fishery Protection and Sovereignty Patrol","description":"Enforcement of fishing regulations, border security, and sovereignty assertion in UK territorial waters and EEZ, primarily conducted by River-class offshore patrol vessels"},{"id":"fleet_escort_and_sea_control","name":"Fleet Escort and Sea Control","description":"Providing anti-air, anti-surface, and anti-submarine escort to high-value units and merchant shipping, using Type 45 destroyers, Type 23 and Type 31 frigates operating in layered defence"},{"id":"aviation_training_and_readiness","name":"Aviation Training and Readiness","description":"Generation and sustainment of naval aviation capability through shore-based training at RNAS Yeovilton and embarked helicopter operations with 815 NAS Wildcats across the fleet"},{"id":"armoured_warfare","name":"Armoured Warfare","description":"Offensive and defensive operations employing main battle tanks and armoured vehicles in combined arms manoeuvre"},{"id":"infantry_operations","name":"Infantry Operations","description":"Close combat operations conducted by dismounted infantry including assault, defence, and patrolling"},{"id":"reconnaissance_and_isr","name":"Reconnaissance and ISR","description":"Intelligence gathering, surveillance, and target acquisition using armoured recce assets and drone platforms"},{"id":"combined_arms_manoeuvre","name":"Combined Arms Manoeuvre","description":"Integrated battlegroup-level operations synchronising armour, infantry, and drone capabilities to achieve tactical objectives"},{"id":"find_and_strike","name":"Find and Strike","description":"Detect, identify, and engage targets using networked drone and armoured assets to deliver precision effects"},{"id":"peacekeeping_and_stabilisation","name":"Peacekeeping and Stabilisation","description":"Operations to maintain or restore peace, provide security, and support stabilisation in post-conflict or fragile environments"},{"id":"training_and_capacity_building","name":"Training and Capacity Building","description":"Instruction and mentoring of partner nation forces to develop their military capability and self-sufficiency"},{"id":"counter_terrorism","name":"Counter-Terrorism","description":"Targeted operations to disrupt, degrade, and defeat terrorist networks and prevent terrorist activity"},{"id":"humanitarian_assistance","name":"Humanitarian Assistance","description":"Military support to civil authorities and populations during crises, including disaster relief and protection of civilians"},{"id":"collective_training_and_exercises","name":"Collective Training and Exercises","description":"Large-scale training activities to develop and validate unit readiness, interoperability, and warfighting skills"},{"id":"air_policing","name":"Air Policing / QRA","description":"Quick Reaction Alert scrambles to identify and intercept unknown or hostile aircraft in UK and NATO airspace, primarily conducted by Typhoon FGR4 units"},{"id":"air_superiority","name":"Air Superiority","description":"Offensive and defensive counter-air operations to establish and maintain control of the battlespace, led by Typhoon FGR4 squadrons with AEW support from Wedgetail"},{"id":"maritime_patrol","name":"Maritime Patrol & Anti-Submarine Warfare","description":"Long-range maritime surveillance, anti-submarine warfare, and surface vessel tracking operations conducted by Boeing P-8A Poseidon aircraft"},{"id":"aew_battlespace_management","name":"Airborne Early Warning & Battlespace Management","description":"Provision of long-range radar surveillance and command and control of air assets using the Wedgetail AEW1 to build and maintain an air recognised picture"},{"id":"air_to_air_refuelling","name":"Air-to-Air Refuelling","description":"In-flight refuelling of fixed-wing aircraft to extend range and endurance on operations, delivered by Voyager tanker aircraft from RAF Brize Norton"},{"id":"strategic_lift","name":"Strategic Air Transport & Lift","description":"Long-range movement of personnel, equipment, and materiel in support of deployed operations and humanitarian tasking, conducted by Voyager from RAF Brize Norton"},{"id":"isr","name":"Intelligence, Surveillance & Reconnaissance","description":"Persistent collection and exploitation of intelligence from air and ground platforms, including maritime ISR by P-8A Poseidon and wider sensor assets at RAF Waddington"},{"id":"counter_drone","name":"Counter-Drone / C-UAS Operations","description":"Detection, tracking, and neutralisation of hostile unmanned aerial systems using ground-based capabilities, primarily delivered by No 34 Squadron RAF Regiment Counter-drone Rapid Sentry"},{"id":"ground_based_air_defence","name":"Ground-Based Air Defence","description":"Protection of airfields, key installations, and deployed operating bases against air and missile threats, conducted by RAF Regiment units including No 34 Squadron"},{"id":"expeditionary_air_operations","name":"Expeditionary & Deployed Air Operations","description":"Projection of air power from deployed locations overseas, integrating Typhoon FGR4, P-8A, Wedgetail, and Voyager in support of NATO or coalition taskings away from home bases"}]},"assets":[{"name":"HMS Dragon","service":"royal_navy","type":"ship","class":"Type 45 destroyer","location_description":"Eastern Mediterranean, off Cyprus defending Cyprus/RAF Akrotiri; later docked in eastern Mediterranean port for repairs","latitude":34.59,"longitude":32.9872,"confidence_score":0.97,"confidence_rationale":"RAF Akrotiri, Cyprus SBA","source_urls":["https://www.navylookout.com"],"date_observed":"2026-04-07","last_updated":"2026-04-18T09:37:03.088484+00:00Z","unit_category":"destroyer","operational_readiness":"high","readiness_rationale":"Intelligence indicates HMS Dragon was brought to seaworthy status in an accelerated six-day refit and deployed to the Eastern Mediterranean in response to a kinetic threat (Iranian-made drone strike on a British base in Cyprus). The context explicitly states she 'will remain at a very high level of readiness during this period, able to sail at short notice if required.' A minor technical issue requiring docking was noted, but this appears to have been resolved given the continued high-readiness posture and integration with 815 NAS Wildcats. The rapid crew recall and compressed maintenance/weapons-loading cycle suggests full combat stores and an operationally focused crew, though the truncated refit period introduces a marginal risk of latent materiel issues. On balance, readiness is assessed as high.","current_assignment":"Deployed to the Eastern Mediterranean off Cyprus in a defensive air defence and deterrence posture following an Iranian-made drone strike on a British base. Operating in coordination with 815 Naval Air Squadron Wildcats armed with Martlet missiles to reinforce air defences over Cyprus and signal British capability and intent in the region.","assignment_source":null,"capability_scores":{"carrier_strike":1,"air_defence":5,"anti_submarine_warfare":2,"maritime_patrol_and_surveillance":4,"amphibious_operations":0,"replenishment_at_sea":0,"humanitarian_assistance_disaster_relief":1,"fishery_protection_and_sovereignty":1,"fleet_escort_and_sea_control":4,"aviation_training_and_readiness":2},"capability_rationale":"Air defence (5): This is the primary role the Type 45 class was designed and optimised for. HMS Dragon carries the Sea Viper system (Aster 15 and Aster 30 missiles), the Sampson multi-function AESA radar for tracking and fire control, and the S1850M long-range surveillance radar \u2014 widely considered one of the most capable area air defence suites afloat. The current deployment explicitly tasks her in an air defence role against drone and missile threats. Fleet escort and sea control (4): Type 45s are natural high-value unit escorts and the air defence umbrella they provide is a cornerstone of sea control. HMS Dragon's positioning off Cyprus and high readiness state make her a credible sea control asset in the Eastern Mediterranean, though she lacks offensive anti-ship missiles (no Harpoon currently fitted on most Type 45s) which limits the score from 5. Maritime patrol and surveillance (4): The Sampson and S1850M radar combination provides exceptional air and surface surveillance. The ability to embark a Wildcat helicopter extends the surveillance envelope significantly. Her current tasking inherently involves persistent surveillance of the Eastern Mediterranean threat environment. Anti-submarine warfare (2): The Type 45 can embark a Merlin HM2 ASW helicopter and carries hull-mounted sonar, but ASW is not a primary design role. She lacks towed array sonar and torpedo tubes. The score reflects a limited but non-trivial organic ASW capability via embarked aviation. Aviation training and readiness (2): HMS Dragon has a flight deck and hangar capable of operating Wildcat or Merlin helicopters, and is currently coordinating with 815 NAS Wildcats. However, aviation training is incidental to her primary mission, not a dedicated role. Carrier strike (1): A Type 45 can contribute to a carrier strike group as an air defence escort but cannot independently conduct carrier strike operations. Scored 1 to reflect the indirect contribution potential. Humanitarian assistance/disaster relief (1) and fishery protection/sovereignty (1): The ship has basic capacity (helicopter, boats, crew) but these are not remotely aligned with her current tasking or design optimisation. Amphibious operations (0) and replenishment at sea (0): No relevant capability. She is not an amphibious platform and carries no RAS rigs for providing fuel or stores to other vessels."},{"name":"HMS Prince of Wales","service":"royal_navy","type":"ship","class":"Queen Elizabeth-class aircraft carrier","location_description":"Portsmouth Naval Base, 5 days notice to sail; planned deployment to Atlantic, High North, and eastern seaboard of North America (Operation FIRECREST)","latitude":50.7984,"longitude":-1.1082,"confidence_score":0.97,"confidence_rationale":"Portsmouth Naval Base","source_urls":["https://www.navylookout.com"],"date_observed":"2026-03-31","last_updated":"2026-04-18T09:37:35.137310+00:00Z","unit_category":"aircraft_carrier","operational_readiness":"high","readiness_rationale":"HMS Prince of Wales completed post-deployment maintenance following the HIGHMAST deployment (ended December 2025) and is assessed to have returned to a high-readiness posture. As of 7 March 2026, the UK reduced her notice to sail from 10 days to 5 days amid the Iran crisis, and crew have been formally warned to be ready to deploy within that window. Her location at Portsmouth Naval Base \u2014 the home port for QE-class carriers with full logistic and shore support \u2014 is consistent with a vessel at generated readiness awaiting a deployment order. The PM's Munich Security Conference announcement on 14 February 2026 specifically named her as lead unit for the UK Carrier Strike Group under Operation Firecrest, confirming she has been formally assigned as the centrepiece of an operational task group. The only residual uncertainty is whether all embarked air group elements (F-35B squadrons, Merlin/Wildcat detachments) have completed their pre-deployment work-up; however, the 5-day notice posture and political-level commitment strongly indicate high readiness.","current_assignment":"Designated lead unit of the UK Carrier Strike Group for Operation Firecrest, tasked with NATO deterrence operations in the North Atlantic and High North (Arctic). Currently at 5 days' notice to sail from Portsmouth Naval Base. Planned activities include reinforcing NATO's Arctic Sentry mission, a port visit to an unspecified US East Coast port, and hosting cross-deck F-35 operations with US Marine Corps/Navy aviation assets.","assignment_source":null,"capability_scores":{"carrier_strike":5,"air_defence":4,"anti_submarine_warfare":3,"maritime_patrol_and_surveillance":4,"amphibious_operations":2,"replenishment_at_sea":1,"humanitarian_assistance_disaster_relief":3,"fishery_protection_and_sovereignty":1,"fleet_escort_and_sea_control":4,"aviation_training_and_readiness":5},"capability_rationale":"Carrier Strike (5): This is the primary design role of the Queen Elizabeth class. The 65,000-tonne hull, ski-jump ramp, and capacity for up to 40 F-35B Lightning II make her the UK's premier strike platform; Operation Firecrest is explicitly a carrier strike deployment. Air Defence (4): The embarked F-35B air wing provides a potent outer air battle capability with its advanced sensors and AMRAAM/AIM-9X loadout. The ship herself carries Phalanx CIWS for point defence but lacks area-effect SAM systems (no Sea Viper), hence 4 rather than 5 \u2014 area air defence relies on escort destroyers (Type 45). Anti-Submarine Warfare (3): Embarked Merlin HM2 helicopters with dipping sonar and Sting Ray torpedoes give a credible ASW capability, particularly important for the North Atlantic/GIUK gap tasking. However, the carrier itself has no hull-mounted sonar or torpedo tubes; ASW screen depends on accompanying frigates/submarines, so scored moderate. Maritime Patrol & Surveillance (4): The F-35B's sensor suite (AN/APG-81 AESA radar, DAS, EOTS) and Merlin Crowsnest AEW provide extensive maritime domain awareness across a very wide area. This is highly relevant to the Arctic Sentry mission. Amphibious Operations (2): The QE class can theoretically embark Chinook and Merlin troop-carrying helicopters and has been exercised in a Littoral Strike role, but she lacks a well dock, vehicle decks, or dedicated amphibious C2 facilities. Limited score reflects contingency utility only. Replenishment at Sea (1): HMS Prince of Wales is a consumer, not a provider, of RAS. She can receive fuel and stores but is not configured to supply other vessels. Minimal score. HADR (3): Large flight deck, extensive hangar, medical facilities, and ability to generate significant helicopter sorties give moderate HADR utility, as demonstrated by QE-class contingency planning. However, this is not her primary tasking. Fishery Protection & Sovereignty (1): Massively over-specified for constabulary tasks. A carrier could assert sovereignty by presence but would never be allocated to fishery patrols. Fleet Escort & Sea Control (4): As the capital ship of a CSG, she is the centrepiece of sea control operations, projecting air power to dominate the surface and air picture. Scored 4 rather than 5 because she herself requires escorts; sea control is a task-group function she enables rather than performs alone. Aviation Training & Readiness (5): The QE class is the UK's only platform for F-35B carrier qualification, deck landing practice, and cross-deck interoperability (as planned with US jets). The Operation Firecrest deployment explicitly includes coalition aviation integration, making this a co-primary role."},{"name":"HMS Queen Elizabeth","service":"royal_navy","type":"ship","class":"Queen Elizabeth-class aircraft carrier","location_description":"Rosyth, undergoing extended maintenance/dry dock; airspace restrictions over Firth of Forth ahead of sailing","latitude":56.0245,"longitude":-3.4355,"confidence_score":0.97,"confidence_rationale":"Rosyth Dockyard, Firth of Forth","source_urls":["https://www.navylookout.com"],"date_observed":"2026-04-01","last_updated":"2026-04-18T09:38:02.166823+00:00Z","unit_category":"aircraft_carrier","operational_readiness":"low","readiness_rationale":"HMS Queen Elizabeth has been in Rosyth dry dock since mid-2025 undergoing maintenance and repairs. Multiple intelligence indicators point to delays: reports state repairs are 'months behind schedule,' and as of late January 2026 both QE-class carriers were described as 'out of action.' Original plans suggested she would resume an active role by early 2026, but as of April 2026 she remains in dry dock. The recent airspace restrictions over the Firth of Forth hint that sailing preparations may be underway, which could indicate a transition toward medium readiness in the near term, but until she completes basin trials, sea trials, and regenerates her air group and crew certifications, she cannot be considered operationally ready. She was reportedly placed at a state of 'advanced readiness' administratively, but no deployment decision has been made, and physical readiness remains constrained by the maintenance programme.","current_assignment":"Extended dry dock maintenance and repair period at Rosyth Dockyard, Scotland, ahead of planned 2026 sea programme. Possible preparations for undocking and initial sea trials based on airspace restriction indicators.","assignment_source":null,"capability_scores":{"carrier_strike":5,"air_defence":4,"anti_submarine_warfare":3,"maritime_patrol_and_surveillance":3,"amphibious_operations":2,"replenishment_at_sea":1,"humanitarian_assistance_disaster_relief":3,"fishery_protection_and_sovereignty":1,"fleet_escort_and_sea_control":3,"aviation_training_and_readiness":4},"capability_rationale":"These scores reflect the inherent design capabilities of the Queen Elizabeth-class when fully operational, not current degraded readiness. Carrier Strike (5): This is her primary role \u2014 she is designed to embark up to 40 F-35B Lightning II strike fighters and project power via a ski-jump launch system; she is the centrepiece of the UK's Carrier Strike Group. Air Defence (4): Strong contribution via embarked F-35B providing fleet air defence and combat air patrol, supplemented by Phalanx CIWS; however, she relies on escort destroyers (Type 45) for area air defence missiles, so not a standalone air defence platform. Anti-Submarine Warfare (3): Moderate capability through embarked Merlin HM2 helicopters equipped with dipping sonar and torpedoes; however, ASW is not her primary mission and she depends on escort frigates and submarines for layered ASW protection. Maritime Patrol and Surveillance (3): Merlin and Wildcat helicopters plus F-35B sensors (DAS, AESA radar) provide significant ISR coverage; the ship's own radar suite contributes, but she is not optimised as a surveillance platform. Amphibious Operations (2): Limited \u2014 she can theoretically support helicopter-borne amphibious manoeuvre and has hosted Royal Marines Commando elements, but she lacks a well deck, vehicle decks, and landing craft capacity that dedicated LPDs/LHDs offer. Replenishment at Sea (1): Minimal \u2014 she is a recipient of RAS, not a provider; she has RAS stations to receive fuel, stores, and ammunition but no capability to replenish other vessels. HADR (3): Moderate \u2014 large flight deck and hangar can support significant helicopter operations for disaster relief; substantial medical facilities and accommodation spaces can be repurposed, as demonstrated by previous QE-class contingency planning. Fishery Protection and Sovereignty (1): Minimal \u2014 vastly over-specified for constabulary tasks; theoretically possible but entirely impractical and not a credible employment. Fleet Escort and Sea Control (3): She contributes significantly to sea control through embarked air power and as the hub of a carrier strike group, but she herself requires escorts rather than providing escort; scoring reflects her enabling role rather than direct escort capability. Aviation Training and Readiness (4): Strong \u2014 her primary peacetime function involves F-35B and rotary-wing qualification, deck operations training, and air group work-up; she is the UK's principal platform for fixed-wing carrier aviation training."},{"name":"HMS Sutherland","service":"royal_navy","type":"ship","class":"Type 23 frigate","location_description":"Outbound from Devonport; shadowing Russian ships in UK waters","latitude":50.3714,"longitude":-4.1872,"confidence_score":0.97,"confidence_rationale":"HMNB Devonport, Plymouth","source_urls":["https://www.navylookout.com"],"date_observed":"2026-04-18","last_updated":"2026-04-18T09:38:21.230294+00:00Z","unit_category":"frigate","operational_readiness":"high","readiness_rationale":"HMS Sutherland completed a major life extension overhaul and returned to sea in early 2025 after nearly four years in Devonport dockyard. Intelligence from late 2025 confirms she has been operational. Given the scale of the refit (the final Type 23 life extension programme), her systems and hull should be in excellent material condition. She is based at Devonport and described as being in UK home waters with front-line operations targeted. The combination of a recent comprehensive refit and confirmed operational status supports a high readiness assessment as of April 2026.","current_assignment":"Operating from Devonport in UK home waters; likely fulfilling standing Royal Navy tasking such as Fleet Ready Escort, Towed Array Patrol Ship, or North Atlantic/Channel patrol duties. She has a documented history of escorting Russian warships through the English Channel and maintaining ASW presence.","assignment_source":null,"capability_scores":{"carrier_strike":2,"air_defence":3,"anti_submarine_warfare":5,"maritime_patrol_and_surveillance":4,"amphibious_operations":1,"replenishment_at_sea":0,"humanitarian_assistance_disaster_relief":2,"fishery_protection_and_sovereignty":3,"fleet_escort_and_sea_control":4,"aviation_training_and_readiness":2},"capability_rationale":"Anti-submarine warfare scores 5 as this is the primary design role of the Type 23 class. HMS Sutherland is equipped with Sonar 2087 towed array (one of the world's most capable low-frequency active/passive sonar systems), hull-mounted Sonar 2050, torpedo launchers (Stingray), and can embark Merlin HM2 ASW helicopters. She has regularly served as Towed Array Patrol Ship (TAPS) and is described as specialising in submarine hunting. Fleet escort and sea control scores 4 reflecting her proven history as Fleet Ready Escort, Channel escort of Russian warships, and her capable weapons fit including Sea Ceptor and the 4.5-inch Mk 8 gun. Maritime patrol and surveillance scores 4 given her sensor suite (radar, sonar, ESM), helicopter capability, and documented patrol and surveillance tasking in home waters and globally. Air defence scores 3 as Sea Ceptor provides a capable local/point-defence SAM system with some area-defence qualities, but she lacks the Aster/Sea Viper long-range system of a Type 45 destroyer. Fishery protection and sovereignty scores 3; while not her primary role, a frigate can and does perform sovereignty patrols and enforcement tasks. Carrier strike scores 2 as she can contribute to a carrier strike group as an ASW or general escort but is not optimised for strike operations (Harpoon being phased out, no land-attack cruise missile). Humanitarian assistance scores 2; she has a helicopter and medical facilities but limited capacity compared to amphibious or auxiliary vessels. Aviation training scores 2 as she has a flight deck and hangar for one medium helicopter but is not a dedicated aviation training platform. Amphibious operations scores 1 as she has negligible troop or vehicle carrying capacity. Replenishment at sea scores 0 as she is a consumer, not a provider, of RAS services."},{"name":"HMS Mersey","service":"royal_navy","type":"ship","class":"River-class OPV","location_description":"Portsmouth-based; activated to monitor Russian warships in UK waters","latitude":50.7984,"longitude":-1.1082,"confidence_score":0.97,"confidence_rationale":"Portsmouth Naval Base","source_urls":["https://www.navylookout.com"],"date_observed":"2026-04-07","last_updated":"2026-04-18T09:40:12.758883+00:00Z","unit_category":"patrol_vessel","operational_readiness":"high","readiness_rationale":"HMS Mersey is confirmed actively deployed as of April 2026, monitoring Russian warship transits in UK home waters alongside a Wildcat helicopter from 815 NAS and RFA Tideforce. Active tasking with supporting assets indicates high operational readiness. However, it is noted that the Batch 1 OPVs are offered for sale to Uruguay and scheduled for decommissioning in 2028, which may indicate reduced long-term investment in deep maintenance, though current deployment suggests she is fully mission-capable for her patrol role.","current_assignment":"Actively deployed monitoring Russian warship transits passing close to UK waters, operating alongside a Wildcat helicopter from 815 Naval Air Squadron and RFA Tideforce.","assignment_source":null,"capability_scores":{"carrier_strike":0,"air_defence":0,"anti_submarine_warfare":0,"maritime_patrol_and_surveillance":5,"amphibious_operations":0,"replenishment_at_sea":0,"humanitarian_assistance_disaster_relief":2,"fishery_protection_and_sovereignty":5,"fleet_escort_and_sea_control":1,"aviation_training_and_readiness":1},"capability_rationale":"HMS Mersey is a River-class Batch 1 OPV purpose-built for fishery protection and sovereignty patrol, scoring 5 in that category. Her current active tasking shadowing Russian warships demonstrates she is equally optimised for maritime patrol and surveillance (score 5). She has no meaningful air defence capability (single 20mm Oerlikon cannon and machine guns only), no anti-submarine warfare sensors or weapons, no amphibious capability, and no replenishment-at-sea capability, all scoring 0. She possesses a flight deck capable of operating Merlin or Wildcat helicopters but lacks a hangar, giving her a minimal aviation training contribution (score 1). Her light armament and limited combat systems make her unsuitable for fleet escort or sea control in a contested environment, though she could in extremis provide a presence (score 1). The vessel's size (~1,700 tonnes) and medical/accommodation facilities give her a limited humanitarian assistance capacity (score 2), though she is not designed or optimised for this role. She has no relevance to carrier strike or amphibious operations."},{"name":"RFA Tideforce","service":"royal_navy","type":"auxiliary","class":"Tide-class tanker","location_description":"UK waters monitoring Russian ships with HMS Mersey; also reported in the Mediterranean","latitude":50.5,"longitude":-3.5,"confidence_score":0.4,"confidence_rationale":"RFA Tideforce is described as operating in UK waters monitoring Russian ships alongside HMS Mersey, which typically occurs in the English Channel or approaches to the North Sea \u2014 common areas for shadowing Russian naval vessels transiting near the UK. A secondary report places her in the Mediterranean, but the primary tasking with HMS Mersey (an OPV frequently assigned to home waters) suggests UK waters as the more likely current position. Coordinates are estimated for the western English Channel area, a frequent interception zone for Russian warships passing through UK waters. Confidence is low due to the ambiguity between two widely separated possible locations.","source_urls":["https://www.navylookout.com"],"date_observed":"2026-04-07","last_updated":"2026-04-18T09:40:32.282688+00:00Z","unit_category":"auxiliary","operational_readiness":"medium","readiness_rationale":"RFA Tideforce is actively operational as of April 2026, working alongside HMS Mersey and an 815 NAS Wildcat to monitor Russian warships in UK waters, which indicates she is crewed and deployable. However, readiness is tempered by the well-documented RFA manning crisis: in October 2024 she was reported docked but available only for emergency deployment due to sailor shortages, and ongoing concerns about potential strike action persist. Her current active tasking suggests she has sufficient crew for short-duration home waters operations, but sustained high-tempo or extended deployments may be constrained by manning. Assessed as medium rather than high due to these personnel vulnerabilities and uncertainty about her ability to surge for prolonged operations.","current_assignment":"Operating in UK waters alongside HMS Mersey and an 815 NAS Wildcat, monitoring Russian warship activity (April 2026)","assignment_source":null,"capability_scores":{"carrier_strike":4,"air_defence":1,"anti_submarine_warfare":1,"maritime_patrol_and_surveillance":2,"amphibious_operations":3,"replenishment_at_sea":5,"humanitarian_assistance_disaster_relief":3,"fishery_protection_and_sovereignty":2,"fleet_escort_and_sea_control":2,"aviation_training_and_readiness":2},"capability_rationale":"RFA Tideforce's primary role is replenishment at sea (score 5): the Tide-class is purpose-built as a MARS fleet tanker with 19,000 cubic metres of fuel and dry stores capacity, equipped with abeam and astern RAS rigs, and is the critical enabling asset for sustained naval operations at range. Carrier strike scores 4 because Tide-class tankers are indispensable enablers of CSG deployments\u2014Tideforce has direct experience supporting HMS Queen Elizabeth during Operation Firedrake\u2014though she is a support element, not a strike platform herself. Amphibious operations scores 3 as she can provide fuel and stores replenishment to an amphibious task group and has flight deck/hangar facilities useful for logistics. HADR scores 3 given her large capacity for stores, helicopter facilities for disaster relief distribution, and suitability for sustained offshore presence. Maritime patrol and surveillance scores 2: she is currently contributing to Russian warship monitoring, demonstrating a secondary surveillance/presence role, though she lacks dedicated sensors. Fishery protection and sovereignty scores 2 for similar reasons\u2014she can contribute to sovereign presence but is not optimised for it. Fleet escort and sea control scores 2: she has Phalanx CIWS and 30mm guns for self-defence and can operate within a task group, but has no offensive surface warfare capability. Aviation training and readiness scores 2: her flight deck and hangar can support Merlin or Wildcat operations and she is currently embarking 815 NAS aircraft, providing a platform for rotary wing currency, though this is incidental to her main role. Air defence scores 1: Phalanx CIWS provides only point self-defence. Anti-submarine warfare scores 1: she can embark ASW-capable Wildcat or Merlin helicopters but has no organic sonar or ASW weapons systems herself."},{"name":"RFA Lyme Bay","service":"royal_navy","type":"auxiliary","class":"Bay-class landing ship dock","location_description":"Mediterranean","latitude":35.0,"longitude":18.0,"confidence_score":0.5,"confidence_rationale":"The Mediterranean Sea spans roughly from 30\u00b0N to 46\u00b0N and from 6\u00b0W to 36\u00b0E. The approximate geographic centre of the Mediterranean is around 35\u00b0N, 18\u00b0E. RFA Lyme Bay is a Bay-class landing ship dock auxiliary of the Royal Fleet Auxiliary. With no further specificity beyond 'Mediterranean', the centre of the sea is used as the best estimate.","source_urls":["https://www.navylookout.com"],"date_observed":"2026-04-18","last_updated":"2026-04-18T09:40:52.552394+00:00Z","unit_category":"auxiliary","operational_readiness":"medium","readiness_rationale":"RFA Lyme Bay has been placed on heightened readiness in Gibraltar and is being prepared to sail if required, which indicates she is not yet fully deployed but is being actively brought to operational status. She is undergoing inspections and receiving new autonomous mine countermeasures equipment, suggesting she is in a transitional readiness state \u2014 not low (she is crewed and being equipped), but not yet confirmed as fully mission-ready at sea. The context notes she is being 'reactivated' and is 'due to receive' equipment, implying the process is ongoing as of April 2026. Defaulting to medium with an upward trajectory; she could reach high readiness imminently upon completion of inspections and equipment fit.","current_assignment":"Forward-staged in Gibraltar on heightened readiness for potential deployment to the Eastern Mediterranean. Being equipped as a mothership for autonomous mine countermeasures systems (underwater drones and uncrewed minehunting boats) and undergoing readiness inspections. Dual-roled for possible civilian evacuation support in connection with the 2026 Iran War and proximity to British Sovereign Base Areas on Cyprus.","assignment_source":null,"capability_scores":{"carrier_strike":0,"air_defence":1,"anti_submarine_warfare":0,"maritime_patrol_and_surveillance":2,"amphibious_operations":4,"replenishment_at_sea":1,"humanitarian_assistance_disaster_relief":4,"fishery_protection_and_sovereignty":1,"fleet_escort_and_sea_control":1,"aviation_training_and_readiness":2},"capability_rationale":"Amphibious operations (4): Bay-class LSD(A) is purpose-built for amphibious logistics \u2014 she has a well dock, vehicle deck, flight deck rated for Chinook/Merlin, and can carry landing craft and vehicles. She scores 4 rather than 5 because Bay-class are auxiliary landing ships, lacking the full C2 and assault capabilities of the Albion-class LPDs. Humanitarian assistance/disaster relief (4): The intelligence explicitly identifies civilian evacuation as a planned role; her vehicle deck capacity, helicopter spots, modest medical facilities, and ability to embark large numbers of personnel make her well-suited for HADR and NEO operations. Maritime patrol and surveillance (2): Limited organic sensor suite, but her new role as a mothership for autonomous mine countermeasures systems (underwater drones, uncrewed boats) gives her some enhanced situational awareness in the MCM domain; the flight deck can support surveillance-capable helicopters. Aviation training and readiness (2): The dual-spot flight deck can support rotary-wing operations and could be used for deck qualification or training serials, but this is not a primary role. Air defence (1): Self-defence only \u2014 Phalanx CIWS and 30mm guns provide point defence but no area air defence capability. Replenishment at sea (1): As an RFA vessel she has some stores capacity but is not configured as a replenishment tanker or stores ship. Fleet escort and sea control (1): Minimal self-defence weapons; not designed for escort duties. Fishery protection and sovereignty (1): Could theoretically perform presence tasks but is vastly over-specified and under-armed for this role. Anti-submarine warfare (0): No ASW sensors or weapons fitted. Carrier strike (0): No applicable capability."},{"name":"HMS Daring","service":"royal_navy","type":"ship","class":"Type 45 destroyer","location_description":"In long refit, set to return to service in 2026","latitude":null,"longitude":null,"confidence_score":null,"confidence_rationale":null,"source_urls":["https://www.navylookout.com"],"date_observed":"2026-04-18","last_updated":"2026-04-18T09:38:47.218054+00:00Z","unit_category":"destroyer","operational_readiness":"low","readiness_rationale":"HMS Daring has been non-operational for over 8.5 years and as of 18 August 2025 had not been to sea for 3,000 days. While the PIP installation is complete and the ship's company has moved onboard (a significant milestone), the vessel was still completing regeneration/refit as of the intelligence cut. Shakedown was anticipated to begin around December 2025 or more likely January 2026, with a return to operational status expected later in 2026. As of today (April 2026), if the shakedown timeline held, the ship may be in or nearing the end of shakedown/operational sea training (OST), but there is no confirmation she has completed this phase or been declared operationally available. A vessel emerging from an 8.5-year lay-up with a newly reconstituted crew, even with PIP complete, faces significant risk of further delays and will need to rebuild combat readiness through extensive sea trials and OST. Readiness is therefore assessed as low \u2014 she is not yet a deployable asset, though she is on a credible trajectory toward medium readiness in the latter half of 2026.","current_assignment":"Completing regeneration and refit at Portsmouth; preparing for or conducting post-refit shakedown and operational sea training prior to returning to the active fleet","assignment_source":null,"capability_scores":{"carrier_strike":4,"air_defence":5,"anti_submarine_warfare":2,"maritime_patrol_and_surveillance":3,"amphibious_operations":2,"replenishment_at_sea":0,"humanitarian_assistance_disaster_relief":2,"fishery_protection_and_sovereignty":2,"fleet_escort_and_sea_control":4,"aviation_training_and_readiness":1},"capability_rationale":"Scores reflect the inherent capability of the Type 45 class once operational, not the ship's current degraded readiness state. Air Defence (5): The Type 45's primary role. Sea Viper (Aster 15/30) combined with the Sampson multifunction radar and S1850M long-range surveillance radar make it one of the world's most capable area air-defence platforms. Carrier Strike (4): Type 45s are the designated air-defence escorts for the Queen Elizabeth-class carriers; this is a core tasking, though the ship itself does not generate strike \u2014 it enables and protects the strike group. Fleet Escort & Sea Control (4): Strong sensors, Sea Viper for area defence, 4.5-inch Mk 8 gun, Phalanx CIWS, and ability to embark Wildcat/Merlin make it a highly capable escort. Maritime Patrol & Surveillance (3): Excellent radar suite (Sampson + S1850M) provides outstanding air and surface surveillance over wide areas; embarked helicopter extends this further. However, the ship is not optimised for persistent patrol in the way a frigate or OPV might be. Anti-Submarine Warfare (2): Limited organic ASW capability. The Type 45 lacks a towed-array sonar and hull-mounted sonar is basic. An embarked Merlin HM2 would significantly boost ASW capability, but the platform itself is not designed for this role. Amphibious Operations (2): Can provide air-defence and naval gunfire support to an amphibious task group, but has no organic amphibious lift or assault capability. Humanitarian Assistance/Disaster Relief (2): Has helicopter capability, medical facilities, and presence, but lacks the capacity of amphibious or auxiliary vessels for sustained HADR. Fishery Protection & Sovereignty (2): Capable but significantly over-specified for this role; could perform sovereignty patrols but this would be an inefficient use of a high-end asset. Aviation Training & Readiness (1): Can embark and operate Wildcat or Merlin from the flight deck, but has a single spot and limited aviation training infrastructure \u2014 minimal contribution. Replenishment at Sea (0): Not applicable; the Type 45 is a consumer, not a provider, of RAS."},{"name":"HMS Active","service":"royal_navy","type":"ship","class":"Type 31 frigate","location_description":"Rosyth, float-off completed, under construction","latitude":56.0245,"longitude":-3.4355,"confidence_score":0.97,"confidence_rationale":"Rosyth Dockyard, Firth of Forth","source_urls":["https://www.navylookout.com"],"date_observed":"2026-04-18","last_updated":"2026-04-18T09:39:01.145166+00:00Z","unit_category":"frigate","operational_readiness":"low","readiness_rationale":"HMS Active was rolled out of the build hall on 24 February 2026 and completed float-off on 24 March 2026. She is currently in the fitting-out afloat phase at Rosyth, which involves installation of systems, equipment, and extensive outfitting work before sea trials and commissioning can even begin. The Type 31 class is not scheduled for initial delivery until the end of 2029. HMS Active is therefore years away from being an operational warship \u2014 she has no combat systems activated, no crew working up, and cannot deploy. Operational readiness is unambiguously low.","current_assignment":"Fitting out afloat at Babcock's Rosyth shipyard, Scotland, undergoing further outfit work prior to test and commissioning","assignment_source":null,"capability_scores":{"carrier_strike":0,"air_defence":0,"anti_submarine_warfare":0,"maritime_patrol_and_surveillance":0,"amphibious_operations":0,"replenishment_at_sea":0,"humanitarian_assistance_disaster_relief":0,"fishery_protection_and_sovereignty":0,"fleet_escort_and_sea_control":0,"aviation_training_and_readiness":0},"capability_rationale":"All capability scores are set to 0 because HMS Active is not yet a commissioned or operational vessel. She is still under construction in the fitting-out phase and cannot perform any naval operations. For reference, once commissioned, the Type 31 (Inspiration-class) general purpose frigate would be expected to score well in fleet escort and sea control (primary role), maritime patrol and surveillance, and fishery protection/sovereignty patrols. Her Sea Ceptor SAM system would provide moderate area/local air defence capability. The 57mm Bofors and 40mm guns provide surface engagement. Helicopter embarkation (Wildcat/Merlin) would give her a useful but not primary ASW contribution. However, none of these capabilities are currently available \u2014 systems are not yet installed or activated, and the ship has no operational crew. Scores will only be meaningful once the vessel completes sea trials, acceptance, and commissioning, which is expected no earlier than 2029-2030."},{"name":"HMS Somerset","service":"royal_navy","type":"ship","class":"Type 23 frigate","location_description":"On trials and patrols recently","latitude":50.4,"longitude":-4.2,"confidence_score":0.3,"confidence_rationale":"HMS Somerset is a Type 23 frigate based at HMNB Devonport, Plymouth. 'On trials and patrols' suggests she is likely operating in waters near her home port, possibly in the English Channel or Western Approaches, which are common areas for Royal Navy trials and routine patrols. Without more specific information, the best estimate places her in the general vicinity of the southwestern UK approaches near Devonport.","source_urls":["https://www.navylookout.com"],"date_observed":"2026-04-18","last_updated":"2026-04-18T09:41:16.660006+00:00Z","unit_category":"frigate","operational_readiness":"high","readiness_rationale":"HMS Somerset is confirmed fully operational as of April 2026, having recently conducted a live tasking intercepting and shadowing Russian warships (Severomorsk and Kama) through the Channel and into the North Sea. This demonstrates that all key sensor, propulsion, and combat systems are functional. Although she had a prolonged post-refit period (completed February 2022) with documented difficulties returning to sea, and was noted in maintenance in late 2025, the April 2026 active deployment and confirmed preparation for an extended North Atlantic deployment strongly indicate high readiness. The \u00a320M life extension refit installed Sea Ceptor and upgraded sensors, further supporting current material condition.","current_assignment":"Completing Channel/North Sea escort of Russian naval vessels (Udaloy-class destroyer Severomorsk and oiler Kama), with HMS St Albans taking over that tasking. HMS Somerset is now preparing for an extended North Atlantic deployment focused on submarine monitoring and protection of critical undersea infrastructure (cables, pipelines).","assignment_source":null,"capability_scores":{"carrier_strike":2,"air_defence":4,"anti_submarine_warfare":5,"maritime_patrol_and_surveillance":5,"amphibious_operations":1,"replenishment_at_sea":0,"humanitarian_assistance_disaster_relief":2,"fishery_protection_and_sovereignty":3,"fleet_escort_and_sea_control":4,"aviation_training_and_readiness":1},"capability_rationale":"Anti-submarine warfare (5): The Type 23 frigate was designed from the keel up as an ASW platform. HMS Somerset carries Sonar 2087 towed array (one of the most capable low-frequency active/passive sonars in NATO), hull-mounted Sonar 2050, torpedo launchers (Sting Ray torpedoes), and can embark the Merlin HM2 \u2014 the world's most advanced ASW helicopter. Her upcoming North Atlantic deployment is explicitly tasked with submarine monitoring, confirming this as her primary role. Maritime patrol and surveillance (5): Demonstrated directly by the April 2026 Russian warship shadowing operation. Her upgraded radar and sensor suite enables persistent surveillance, and this is a core peacetime tasking for Type 23s. Air defence (4): Sea Ceptor (CAMM) provides a highly capable local/area air defence system effective against aircraft, cruise missiles, and UAVs with a range of 25+ km. This is a strong capability but she is not an area air defence destroyer (Type 45), hence 4 rather than 5. Fleet escort and sea control (4): Type 23s are primary fleet escorts in the Royal Navy. Sea Ceptor, ASW sensors, 4.5-inch gun, and torpedo capability make her a well-rounded escort. Scored 4 as she lacks the layered strike capability of a destroyer but is highly effective in the escort role. Fishery protection and sovereignty (3): Capable of sovereignty enforcement and EEZ patrol but this is not her optimised role; typically assigned to OPVs. However, as demonstrated, she does conduct sovereignty-related taskings. Carrier strike (2): Can contribute as an escort in a carrier strike group providing ASW and air defence screening, but has no land-attack cruise missile capability and is not a primary strike asset. Humanitarian assistance/disaster relief (2): Can provide limited HADR \u2014 helicopter platform, medical facilities, small boats \u2014 but lacks the capacity, flight deck size, and embarked forces of amphibious or larger vessels. Amphibious operations (1): Minimal capability; can provide naval gunfire support with 4.5-inch gun and escort amphibious forces, but has no troop/vehicle carrying capacity. Replenishment at sea (0): Not applicable; she is a receiving unit, not a supply vessel. Aviation training and readiness (1): Can embark and operate helicopters but is not a training platform; minimal relevance."},{"name":"HMS Portland","service":"royal_navy","type":"ship","class":"Type 23 frigate","location_description":"Entered maintenance period last month","latitude":50.3984,"longitude":-4.1884,"confidence_score":0.85,"confidence_rationale":"HMS Portland is a Type 23 frigate of the Royal Navy. Maintenance periods for Royal Navy frigates are typically conducted at Devonport Royal Dockyard in Plymouth, which is HMS Portland's home port. The coordinates correspond to HMNB Devonport. While Babcock's facilities at Devonport or potentially Rosyth could be used, Devonport is the most likely location for a Type 23 refit/maintenance period.","source_urls":["https://www.navylookout.com"],"date_observed":"2026-03-18","last_updated":"2026-04-18T09:41:37.609853+00:00Z","unit_category":"frigate","operational_readiness":"low","readiness_rationale":"HMS Portland entered scheduled maintenance at Babcock's Frigate Support Centre in Devonport approximately one month ago (circa March 2026). As of 2026-04-18, she is in the early stages of this maintenance period and is explicitly not available for immediate tasking. Defence sources suggest a more significant refit may follow in 2027, which could indicate the current maintenance is preparatory or that the ship's material state requires sustained attention. Given she is actively in a maintenance period with no projected return-to-service date provided, readiness is assessed as low.","current_assignment":"Scheduled maintenance at Babcock's Frigate Support Centre, HMNB Devonport (entered approximately March 2026)","assignment_source":null,"capability_scores":{"carrier_strike":3,"air_defence":3,"anti_submarine_warfare":5,"maritime_patrol_and_surveillance":4,"amphibious_operations":1,"replenishment_at_sea":0,"humanitarian_assistance_disaster_relief":2,"fishery_protection_and_sovereignty":3,"fleet_escort_and_sea_control":4,"aviation_training_and_readiness":2},"capability_rationale":"Type 23 frigates were designed primarily as ASW platforms, making anti_submarine_warfare the primary role (5). HMS Portland carries Sonar 2087 towed array and 2150 hull-mounted sonar, which are among the most capable ASW sensor suites in NATO, complemented by the ability to embark Merlin HM2 with dipping sonar and torpedoes, plus ship-launched torpedo systems. Fleet escort and sea control scores strongly (4) as Type 23s are core escort assets with a balanced weapons and sensor fit. Maritime patrol and surveillance scores 4 due to the 997 surveillance radar, sonar suite, and Merlin HM2 embarked capability providing wide-area awareness. Air defence scores moderate (3): Sea Ceptor provides credible local/point air defence for self-protection and limited area contribution, but she lacks the Sampson radar and larger missile capacity of a Type 45 destroyer. Carrier strike scores 3 as she can serve as a capable escort within a carrier strike group, particularly contributing ASW screening, but is not a strike platform herself. Fishery protection and sovereignty scores 3: capable but over-specified for the role; Type 23s have been used for such tasking when required. Humanitarian assistance scores 2: limited capacity for stores, medical facilities, and personnel transport compared to amphibious or auxiliary vessels, though the embarked helicopter provides some utility. Aviation training scores 2: can operate Merlin HM2 from her flight deck and hangar but is not optimised for aviation training. Amphibious operations scores 1: no well deck, limited troop/vehicle capacity, only marginal contribution via helicopter. Replenishment at sea scores 0: she is a consumer, not a provider, of RAS services. Note: all capability scores reflect inherent class and fitted capabilities when operational; her current low readiness means these capabilities are not presently available."},{"name":"RFA Tidesurge","service":"royal_navy","type":"auxiliary","class":"Tide-class tanker","location_description":"Dock in Birkenhead, Merseyside for maintenance","latitude":53.3827,"longitude":-3.0075,"confidence_score":0.95,"confidence_rationale":"Birkenhead, Merseyside is home to the Cammell Laird shipyard, the primary dockyard facility in Birkenhead used for naval and RFA vessel maintenance and refit. Coordinates correspond to the Cammell Laird shipyard location on the River Mersey.","source_urls":["https://www.navylookout.com"],"date_observed":"2026-04-18","last_updated":"2026-04-18T09:41:56.041177+00:00Z","unit_category":"auxiliary","operational_readiness":"low","readiness_rationale":"RFA Tidesurge is currently in dry dock at Cammell Laird shipyard, Birkenhead, resting on blocks for general repair and maintenance. A vessel in dry dock is not operationally available and would require completion of maintenance, undocking, sea trials, and work-up before returning to tasking. The imagery of the ship on blocks confirms she is not in a ready state. Additionally, the recent loss of a sailor overboard during North Atlantic operations in November may have contributed to crew welfare and morale considerations, and fleet-wide RFA manning shortages further complicate her ability to regenerate readiness quickly. Previous Cammell Laird maintenance (January 2020) suggests these periods can be substantial. Readiness is assessed as low rather than medium on the basis of confirmed dry dock status.","current_assignment":"In dry dock at Cammell Laird shipyard, Birkenhead, undergoing general repair and maintenance","assignment_source":null,"capability_scores":{"carrier_strike":4,"air_defence":1,"anti_submarine_warfare":1,"maritime_patrol_and_surveillance":1,"amphibious_operations":3,"replenishment_at_sea":5,"humanitarian_assistance_disaster_relief":3,"fishery_protection_and_sovereignty":1,"fleet_escort_and_sea_control":2,"aviation_training_and_readiness":2},"capability_rationale":"RFA Tidesurge's primary role is replenishment at sea (score 5): she carries 19,000 cubic metres of fuel and dry stores with RAS rigs for both abeam and astern refuelling, making her optimised for this mission. Carrier strike scores 4 because Tide-class tankers are essential enablers of carrier strike group endurance, providing fuel to escorts and the carrier itself during sustained operations, though they are not strike platforms themselves. Amphibious operations scores 3 as she can sustain amphibious task groups with fuel and stores, and her flight deck/hangar can support helicopter logistics. HADR scores 3 given her large capacity for stores, helicopter capability, and ability to operate independently in disaster areas. Fleet escort and sea control scores 2: while she has Phalanx CIWS and 30mm guns for self-defence and can operate within task groups, she is not a combatant. Aviation training and readiness scores 2 as her Merlin/Wildcat-capable flight deck and hangar can support rotary-wing deck landing practice and currency, but this is a secondary function. Air defence scores 1: Phalanx CIWS provides only point self-defence. Anti-submarine warfare scores 1: she has no ASW sensors or weapons, though embarked helicopters could theoretically carry dipping sonar. Maritime patrol and surveillance scores 1: she has basic radar and was used to shadow a Russian submarine through the Dover Strait, demonstrating some surveillance utility, but this is not her designed role. Fishery protection and sovereignty scores 1: her size and cost make her wholly unsuited to constabulary tasking, though she could theoretically assert presence."},{"name":"HMS Tyne","service":"royal_navy","type":"ship","class":"River-class Batch I OPV","location_description":"Still in service; offered for sale to Uruguay","latitude":null,"longitude":null,"confidence_score":null,"confidence_rationale":null,"source_urls":["https://www.navylookout.com"],"date_observed":"2026-04-18","last_updated":"2026-04-18T09:43:03.013814+00:00Z","unit_category":"patrol_vessel","operational_readiness":"medium","readiness_rationale":"HMS Tyne remains in active service as part of the Coastal Forces Squadron (1st Patrol Boat Squadron) and is described as having 'enduring value' as a Batch 1 OPV. She would typically be conducting routine fishery protection patrols or held at readiness. However, she is one of three Batch 1 OPVs offered for sale to Uruguay and scheduled for class decommissioning in 2028, which may affect investment in deep maintenance and long-term material readiness. No specific April 2026 tasking or deployment has been identified, and no reports of defects or reduced capability were noted. Defaulting to medium given the absence of specific current tasking confirmation and the approaching end-of-life/divestment timeline, which introduces uncertainty about sustainment priority.","current_assignment":"No specific April 2026 deployment identified. As a standing patrol asset, she is likely conducting routine fishery protection patrols in UK home waters or held at readiness at Portsmouth.","assignment_source":null,"capability_scores":{"carrier_strike":0,"air_defence":0,"anti_submarine_warfare":0,"maritime_patrol_and_surveillance":3,"amphibious_operations":0,"replenishment_at_sea":0,"humanitarian_assistance_disaster_relief":2,"fishery_protection_and_sovereignty":5,"fleet_escort_and_sea_control":1,"aviation_training_and_readiness":1},"capability_rationale":"HMS Tyne is a River-class Batch 1 OPV purpose-built for fishery protection and sovereignty patrols, scoring 5 in that primary role. Maritime patrol and surveillance scores 3: she has good endurance and sea-keeping for UK waters patrol and can contribute to surface surveillance, but lacks advanced sensor suites (no radar/combat management system comparable to warships) and is limited to home waters tasking. HADR scores 2: the flight deck capable of operating Merlin/Wildcat provides some utility for disaster relief or SAR tasking, but the lack of a hangar, limited crew capacity, and minimal embarked stores constrain sustained HADR operations. Fleet escort and sea control scores 1: the 20mm Oerlikon and machine guns provide only token self-defence; she has no anti-ship missiles, no torpedo capability, and no meaningful combat management system, making her unsuitable for contested escort duties though she could theoretically provide a visible naval presence. Avia
