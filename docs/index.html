<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OSINT COMMAND CENTRE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
/* ── Design tokens — DEFAULT (cyan on dark) ────────────────────────── */
:root {
  --bg-primary:        #0a0e17;
  --bg-panel:          #0f1520;
  --bg-inset:          #070b12;
  --border-accent:     #00e5ff;
  --border-subtle:     rgba(0,229,255,0.12);
  --border-mid:        rgba(0,229,255,0.20);
  --border-faint:      rgba(0,229,255,0.15);
  --toggle-bg-on:      rgba(0,229,255,0.15);
  --text-primary:      #c8d6e5;
  --text-bright:       #e8f0f8;
  --text-dim:          #4a5568;
  --status-high:       #00e676;
  --status-medium:     #ffab00;
  --status-low:        #ff1744;
  --accent-glow:       rgba(0,229,255,0.3);
  --panel-width:       320px;
  --header-height:     48px;
  --footer-height:     36px;
}

/* ── HIGHCON — yellow/white on black ────────────────────────────────── */
body.theme-highcon {
  --bg-primary:        #000000;
  --bg-panel:          #0c0c0c;
  --bg-inset:          #000000;
  --border-accent:     #ffe600;
  --border-subtle:     rgba(255,230,0,0.15);
  --border-mid:        rgba(255,230,0,0.30);
  --border-faint:      rgba(255,230,0,0.20);
  --toggle-bg-on:      rgba(255,230,0,0.18);
  --text-primary:      #ffffff;
  --text-bright:       #ffffff;
  --text-dim:          #888888;
  --status-high:       #00ff88;
  --status-medium:     #ffe600;
  --status-low:        #ff2222;
  --accent-glow:       rgba(255,230,0,0.35);
}

/* ── NIGHTVIS — red on very dark ────────────────────────────────────── */
body.theme-nightvis {
  --bg-primary:        #070305;
  --bg-panel:          #0c0608;
  --bg-inset:          #040204;
  --border-accent:     #ff2200;
  --border-subtle:     rgba(255,34,0,0.12);
  --border-mid:        rgba(255,34,0,0.22);
  --border-faint:      rgba(255,34,0,0.16);
  --toggle-bg-on:      rgba(255,34,0,0.15);
  --text-primary:      #cc8880;
  --text-bright:       #ffbbaa;
  --text-dim:          #553333;
  --status-high:       #ff6600;
  --status-medium:     #cc3300;
  --status-low:        #880011;
  --accent-glow:       rgba(255,34,0,0.30);
}

/* ── Reset & base ─────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%; overflow: hidden;
  background: var(--bg-primary);
  color: var(--text-primary);
  font-family: "Share Tech Mono", "Courier New", monospace;
  font-size: 13px;
  text-rendering: optimizeLegibility;
  -webkit-font-smoothing: antialiased;
}
a { color: var(--border-accent); text-decoration: none; }
a:hover { text-decoration: underline; }

/* ── Layout skeleton ──────────────────────────────────────────────── */
#app {
  display: grid;
  grid-template-rows: var(--header-height) 1fr var(--footer-height);
  grid-template-columns: var(--panel-width) 1fr;
  grid-template-areas:
    "header header"
    "panel  map"
    "footer footer";
  width: 100vw; height: 100vh;
}

/* ── Header ───────────────────────────────────────────────────────── */
#header {
  grid-area: header;
  background: var(--bg-panel);
  border-bottom: 1px solid var(--border-accent);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  z-index: 1000;
}
#header-title {
  font-size: 16px;
  letter-spacing: 3px;
  color: var(--border-accent);
  text-transform: uppercase;
}
#header-right {
  display: flex;
  align-items: center;
  gap: 20px;
}
#status-indicator {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  letter-spacing: 1px;
  text-transform: uppercase;
}
.status-dot {
  width: 8px; height: 8px;
  border-radius: 0;
}
.status-dot.ready   { background: var(--status-high); animation: pulse-dot 2s ease-in-out infinite; }
.status-dot.running { background: var(--status-medium); animation: pulse-dot 1s ease-in-out infinite; }
.status-dot.nodata  { background: var(--status-low); }
@keyframes pulse-dot {
  0%,100% { opacity: 1; }
  50%      { opacity: 0.4; }
}
#clock {
  font-size: 13px;
  color: var(--text-bright);
  letter-spacing: 1px;
}

/* ── Theme toggle ─────────────────────────────────────────────────── */
#theme-toggle {
  display: flex;
  gap: 2px;
}
.theme-btn {
  padding: 4px 10px;
  background: transparent;
  border: 1px solid var(--text-dim);
  color: var(--text-dim);
  font-family: inherit;
  font-size: 10px;
  letter-spacing: 1px;
  cursor: pointer;
  border-radius: 0;
  transition: border-color 0.15s, color 0.15s, background 0.15s;
}
.theme-btn:hover { border-color: var(--border-accent); color: var(--border-accent); }
.theme-btn.active {
  border-color: var(--border-accent);
  color: var(--bg-primary);
  background: var(--border-accent);
}

/* ── Left panel ───────────────────────────────────────────────────── */
#panel {
  grid-area: panel;
  background: var(--bg-panel);
  border-right: 1px solid var(--border-accent);
  overflow-y: auto;
  overflow-x: hidden;
  display: flex;
  flex-direction: column;
  gap: 0;
  scrollbar-width: thin;
  scrollbar-color: var(--text-dim) var(--bg-inset);
}
#panel::-webkit-scrollbar { width: 4px; }
#panel::-webkit-scrollbar-thumb { background: var(--text-dim); }

.section {
  padding: 10px 14px 12px;
  border-bottom: 1px solid var(--border-subtle);
}
.section-header {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--text-dim);
  border-bottom: 1px solid var(--border-faint);
  padding-bottom: 4px;
  margin-bottom: 10px;
}

/* ── Toggle rows (Intelligence Sources) ────────────────────────────── */
.toggle-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}
.toggle-label {
  font-size: 12px;
  color: var(--text-primary);
}
.toggle-label.dim { color: var(--text-dim); cursor: not-allowed; }

/* Rectangular toggle switch */
.toggle-switch {
  position: relative;
  width: 36px; height: 18px;
  cursor: pointer;
}
.toggle-switch input { display: none; }
.toggle-track {
  position: absolute; inset: 0;
  background: var(--bg-inset);
  border: 1px solid var(--text-dim);
  transition: border-color 0.2s, background 0.2s;
}
.toggle-switch input:checked + .toggle-track {
  border-color: var(--border-accent);
  background: var(--toggle-bg-on);
}
.toggle-handle {
  position: absolute;
  top: 3px; left: 3px;
  width: 10px; height: 10px;
  background: var(--text-dim);
  transition: left 0.2s, background 0.2s;
}
.toggle-switch input:checked + .toggle-track + .toggle-handle {
  left: 21px;
  background: var(--border-accent);
}
.toggle-switch.disabled { cursor: not-allowed; opacity: 0.4; pointer-events: none; }

/* ── Data source buttons ────────────────────────────────────────────── */
.datasource-btn {
  display: block;
  width: 100%;
  padding: 7px 10px;
  background: var(--bg-inset);
  border: 1px solid var(--text-dim);
  color: var(--text-dim);
  font-family: inherit;
  font-size: 12px;
  letter-spacing: 1px;
  text-align: left;
  cursor: pointer;
  border-radius: 0;
  margin-bottom: 6px;
  transition: border-color 0.15s, color 0.15s;
}
.datasource-btn.active {
  border-color: var(--border-accent);
  color: var(--text-bright);
}
.datasource-btn:hover:not(:disabled) {
  border-color: var(--border-accent);
  color: var(--text-bright);
}
.datasource-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.datasource-meta {
  font-size: 10px;
  color: var(--text-dim);
  margin-top: -4px;
  margin-bottom: 6px;
  padding-left: 2px;
}

/* ── Execute button ─────────────────────────────────────────────────── */
#execute-btn {
  width: 100%;
  padding: 10px;
  background: transparent;
  border: 1px solid var(--border-accent);
  color: var(--border-accent);
  font-family: inherit;
  font-size: 13px;
  letter-spacing: 2px;
  text-transform: uppercase;
  cursor: pointer;
  border-radius: 0;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}
#execute-btn:hover:not(:disabled) {
  background: var(--border-accent);
  color: var(--bg-primary);
}
#execute-btn:disabled {
  border-color: var(--text-dim);
  color: var(--text-dim);
  cursor: not-allowed;
}
#execute-btn.running {
  border-color: var(--status-medium);
  color: var(--status-medium);
  animation: execute-pulse 1.5s ease-in-out infinite;
}
@keyframes execute-pulse {
  0%,100% { border-color: var(--status-medium); color: var(--status-medium); }
  50%      { border-color: var(--border-accent); color: var(--border-accent); }
}

/* ── Agent log ──────────────────────────────────────────────────────── */
#log-wrapper {
  position: relative;
}
#log-box {
  height: 280px;
  background: var(--bg-inset);
  border: 1px solid var(--border-mid);
  overflow-y: auto;
  padding: 6px 8px;
  font-size: 11px;
  line-height: 1.5;
  scrollbar-width: thin;
  scrollbar-color: var(--text-dim) var(--bg-inset);
}
#log-box::-webkit-scrollbar { width: 3px; }
#log-box::-webkit-scrollbar-thumb { background: var(--text-dim); }
.log-line { white-space: pre-wrap; word-break: break-all; }
.log-cyan   { color: var(--border-accent); }
.log-green  { color: var(--status-high); }
.log-amber  { color: var(--status-medium); }
.log-red    { color: var(--status-low); }
.log-white  { color: var(--text-bright); }
.log-dim    { color: var(--text-dim); }
#log-clear {
  position: absolute;
  top: 2px; right: 2px;
  padding: 2px 6px;
  background: transparent;
  border: 1px solid var(--text-dim);
  color: var(--text-dim);
  font-family: inherit;
  font-size: 10px;
  cursor: pointer;
  border-radius: 0;
}
#log-clear:hover { border-color: var(--border-accent); color: var(--border-accent); }

/* ── Map controls ───────────────────────────────────────────────────── */
.control-row {
  display: flex;
  flex-direction: column;
  gap: 4px;
  margin-bottom: 8px;
}
.control-label {
  font-size: 10px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 1px;
}
select.ctrl-select {
  width: 100%;
  background: var(--bg-inset);
  border: 1px solid var(--border-accent);
  color: var(--text-primary);
  font-family: inherit;
  font-size: 12px;
  padding: 4px 6px;
  border-radius: 0;
  appearance: none;
  cursor: pointer;
}
select.ctrl-select option { background: var(--bg-inset); }

.toggle-group {
  display: flex;
  flex-direction: column;
  gap: 5px;
  margin-bottom: 8px;
}
.cb-row {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: var(--text-primary);
  cursor: pointer;
}
/* Custom checkbox */
.cb-row input[type="checkbox"] { display: none; }
.cb-box {
  width: 14px; height: 14px;
  border: 1px solid var(--text-dim);
  background: var(--bg-inset);
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: border-color 0.15s, background 0.15s;
}
.cb-row input:checked + .cb-box {
  border-color: var(--border-accent);
  background: var(--border-accent);
}
.cb-row input:checked + .cb-box::after {
  content: "✓";
  font-size: 10px;
  color: var(--bg-primary);
  line-height: 1;
}

/* ── Legend ─────────────────────────────────────────────────────────── */
#legend-items { display: flex; flex-direction: column; gap: 5px; }
.legend-item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  color: var(--text-primary);
}
.legend-swatch {
  width: 12px; height: 12px;
  flex-shrink: 0;
  border: 1px solid rgba(255,255,255,0.2);
}

/* ── Map area ────────────────────────────────────────────────────────── */
#map {
  grid-area: map;
  background: var(--bg-primary);
}

/* ── Footer ──────────────────────────────────────────────────────────── */
#footer {
  grid-area: footer;
  background: var(--bg-panel);
  border-top: 1px solid var(--border-accent);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  font-size: 11px;
  color: var(--text-dim);
  letter-spacing: 0.5px;
}
#footer-left, #footer-centre, #footer-right { flex: 1; }
#footer-centre { text-align: center; }
#footer-right  { text-align: right; }
#footer-nodata {
  width: 100%;
  text-align: center;
  letter-spacing: 2px;
  text-transform: uppercase;
}

/* ── Leaflet overrides ──────────────────────────────────────────────── */
.leaflet-control-zoom a {
  background: var(--bg-panel) !important;
  color: var(--border-accent) !important;
  border: 1px solid var(--border-accent) !important;
  border-radius: 0 !important;
  font-family: inherit !important;
}
.leaflet-control-zoom a:hover {
  background: var(--border-accent) !important;
  color: var(--bg-primary) !important;
}
.leaflet-container .leaflet-control-attribution {
  background: rgba(0,0,0,0.5) !important;
  color: var(--text-dim) !important;
  font-size: 9px !important;
}
.leaflet-popup-content-wrapper {
  background: var(--bg-panel) !important;
  border: 1px solid var(--border-accent) !important;
  border-radius: 0 !important;
  box-shadow: 0 0 20px var(--accent-glow) !important;
  color: var(--text-primary) !important;
  font-family: "Share Tech Mono", monospace !important;
  min-width: 350px !important;
}
.leaflet-popup-tip-container { display: none !important; }
.leaflet-popup-close-button {
  color: var(--border-accent) !important;
  font-size: 16px !important;
  top: 4px !important; right: 6px !important;
}
.leaflet-popup-content { margin: 14px 16px !important; }

/* ── Popup internals ─────────────────────────────────────────────────── */
.popup-name {
  font-size: 14px;
  color: var(--text-bright);
  font-weight: bold;
  letter-spacing: 1px;
  margin-bottom: 6px;
  text-transform: uppercase;
}
.popup-row {
  display: flex;
  justify-content: space-between;
  margin-bottom: 3px;
  font-size: 11px;
}
.popup-key { color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
.popup-val { color: var(--text-primary); text-align: right; max-width: 200px; }
.popup-val.high   { color: var(--status-high); }
.popup-val.medium { color: var(--status-medium); }
.popup-val.low    { color: var(--status-low); }
.popup-divider {
  border: none;
  border-top: 1px solid rgba(0,229,255,0.2);
  margin: 8px 0;
}
.popup-rationale {
  font-size: 10px;
  color: var(--text-dim);
  margin-bottom: 6px;
  line-height: 1.4;
}
.conf-bar-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 4px;
}
.conf-bar-bg {
  flex: 1;
  height: 4px;
  background: var(--bg-inset);
  border: 1px solid var(--text-dim);
}
.conf-bar-fill { height: 100%; background: var(--border-accent); }
.conf-pct { font-size: 11px; color: var(--border-accent); width: 36px; text-align: right; }
.cap-bar-row { margin-bottom: 4px; }
.cap-bar-label { font-size: 10px; color: var(--text-dim); margin-bottom: 2px; }
.cap-bar-bg { height: 8px; background: var(--bg-inset); border: 1px solid var(--border-subtle); }
.cap-bar-fill { height: 100%; }
.popup-sources { margin-top: 8px; font-size: 10px; }
.popup-sources a { color: var(--border-accent); display: block; }
</style>
</head>
<body>
<div id="app">

  <!-- ── Header ────────────────────────────────────────────────────────── -->
  <header id="header">
    <span id="header-title">🌐 OSINT COMMAND CENTRE</span>
    <div id="theme-toggle">
      <button class="theme-btn active" onclick="setTheme('default')" id="btn-theme-default">DEFAULT</button>
      <button class="theme-btn"        onclick="setTheme('highcon')"  id="btn-theme-highcon">HIGHCON</button>
      <button class="theme-btn"        onclick="setTheme('nightvis')" id="btn-theme-nightvis">NIGHTVIS</button>
    </div>
    <div id="header-right">
      <div id="status-indicator">
        <div class="status-dot nodata" id="status-dot"></div>
        <span id="status-text">NO DATA</span>
      </div>
      <div id="clock">—</div>
    </div>
  </header>

  <!-- ── Left panel ────────────────────────────────────────────────────── -->
  <nav id="panel">

    <!-- Section 1: Intelligence Sources -->
    <div class="section">
      <div class="section-header">Intelligence Sources</div>
      <div class="toggle-row">
        <span class="toggle-label">⚓ Royal Navy</span>
        <label class="toggle-switch" id="rn-toggle-label">
          <input type="checkbox" id="rn-toggle" checked>
          <div class="toggle-track"></div>
          <div class="toggle-handle"></div>
        </label>
      </div>
      <div class="toggle-row">
        <span class="toggle-label dim" title="Agent not available">✈ Royal Air Force</span>
        <label class="toggle-switch disabled">
          <input type="checkbox" disabled>
          <div class="toggle-track"></div>
          <div class="toggle-handle"></div>
        </label>
      </div>
      <div class="toggle-row">
        <span class="toggle-label dim" title="Agent not available">⚔ British Army</span>
        <label class="toggle-switch disabled">
          <input type="checkbox" disabled>
          <div class="toggle-track"></div>
          <div class="toggle-handle"></div>
        </label>
      </div>
    </div>

    <!-- Section 2: Data Source -->
    <div class="section">
      <div class="section-header">Data Source</div>
      <button class="datasource-btn" id="btn-existing" onclick="selectDatasource('existing')">
        ▣ USE EXISTING DATA
      </button>
      <div class="datasource-meta" id="existing-meta">Checking…</div>
      <button class="datasource-btn" id="btn-gather" onclick="selectDatasource('gather')">
        ▷ GATHER FRESH OSINT
      </button>
    </div>

    <!-- Section 3: Operations -->
    <div class="section">
      <div class="section-header">Operations</div>
      <button id="execute-btn" onclick="execute()" disabled>EXECUTE</button>
    </div>

    <!-- Section 4: Agent Log -->
    <div class="section">
      <div class="section-header">Agent Log</div>
      <div id="log-wrapper">
        <button id="log-clear" onclick="clearLog()">CLEAR</button>
        <div id="log-box"></div>
      </div>
    </div>

    <!-- Section 5: Map Controls -->
    <div class="section">
      <div class="section-header">Map Controls</div>
      <div class="control-row">
        <span class="control-label">Colour markers by</span>
        <select class="ctrl-select" id="colour-by" onchange="updateMap()">
          <option value="readiness">Operational Readiness</option>
          <option value="category">Unit Category</option>
          <option value="capability">Top Capability</option>
        </select>
      </div>
      <div class="control-row">
        <span class="control-label">Show on map</span>
      </div>
      <div class="toggle-group">
        <label class="cb-row">
          <input type="checkbox" id="show-labels" checked onchange="updateMap()">
          <div class="cb-box"></div>
          Asset labels
        </label>
        <label class="cb-row">
          <input type="checkbox" id="show-radius" onchange="updateMap()">
          <div class="cb-box"></div>
          Confidence radius
        </label>
        <label class="cb-row">
          <input type="checkbox" id="show-caps" onchange="updateMap()">
          <div class="cb-box"></div>
          Capability overlay
        </label>
      </div>
      <div class="control-row">
        <span class="control-label">Filter by readiness</span>
      </div>
      <div class="toggle-group">
        <label class="cb-row">
          <input type="checkbox" id="filt-high" checked onchange="updateMap()">
          <div class="cb-box"></div>
          <span style="color:var(--status-high)">■</span>&nbsp;High
        </label>
        <label class="cb-row">
          <input type="checkbox" id="filt-medium" checked onchange="updateMap()">
          <div class="cb-box"></div>
          <span style="color:var(--status-medium)">■</span>&nbsp;Medium
        </label>
        <label class="cb-row">
          <input type="checkbox" id="filt-low" checked onchange="updateMap()">
          <div class="cb-box"></div>
          <span style="color:var(--status-low)">■</span>&nbsp;Low
        </label>
      </div>
    </div>

    <!-- Section 6: Legend -->
    <div class="section">
      <div class="section-header">Legend</div>
      <div id="legend-items"></div>
    </div>

  </nav>

  <!-- ── Map ──────────────────────────────────────────────────────────── -->
  <div id="map"></div>

  <!-- ── Footer ────────────────────────────────────────────────────────── -->
  <footer id="footer">
    <div id="footer-nodata">NO DATA LOADED</div>
  </footer>

</div>

<script>

er as 'the only British vessel available to assist with the mission'.","current_assignment":"Recently completed tracking of sanctioned Russian oil tanker MV Deyna through the Strait of Gibraltar on 20 March 2026, providing real-time tracking data, movement patterns, and high-resolution imagery to French naval forces. Likely returned to Gibraltar Squadron duties including sovereignty protection and coastal security patrols in British Gibraltar Territorial Waters.","assignment_source":null,"capability_scores":{"carrier_strike":0,"air_defence":0,"anti_submarine_warfare":0,"maritime_patrol_and_surveillance":5,"forward_presence_and_engagement":4,"fishery_protection_and_ez_enforcement":3,"anti_surface_warfare":1,"task_group_escort":1,"covert_intelligence_gathering":3,"base_port_operations_and_fleet_support":1},"capability_rationale":"HMS Cutlass is a 62ft fast patrol boat with a crew of six, armed only with three GPMGs, and a top speed of ~41 knots. Maritime patrol and surveillance (5): This is her primary role and was directly demonstrated in the MV Deyna tracking mission, where she provided real-time tracking data, movement patterns, and high-resolution imagery \u2014 classic ISR patrol outputs. Her speed and small profile make her well-suited to shadow and monitor vessels of interest. Forward presence and engagement (4): Permanently stationed at Gibraltar, she is a visible symbol of British sovereignty and naval presence at a strategically vital chokepoint; this is a core tasking for the Gibraltar Squadron. Fishery protection and EZ enforcement (3): Her speed, patrol capability, and coastal security mandate make her moderately capable for enforcement duties in British Gibraltar Territorial Waters, though her small size and limited armament constrain boarding operations compared to dedicated OPVs. Covert intelligence gathering (3): The Deyna mission demonstrated a de facto intelligence-gathering role \u2014 collecting high-resolution imagery and movement data on a sanctioned vessel and passing it to allied forces. Her small size and speed support discreet shadowing, though she lacks dedicated SIGINT/ELINT suites. Anti-surface warfare (1): Three GPMGs provide only token self-defence capability against surface threats; she has no anti-ship missiles, cannon, or fire-control radar. Task group escort (1): Her speed could theoretically allow her to screen a task group in confined waters, but she lacks sensors, weapons, and endurance for meaningful escort duties. Carrier strike, air defence, and anti-submarine warfare all score 0 as she has no relevant systems whatsoever. Base port operations (1): She could perform harbour duties or local support tasks but this is not her designed role."},{"name":"HMS Active","type":"ship","class":"Type 26 frigate","location_description":"Emerged from assembly hall at shipyard in Rosyth, near Edinburgh","latitude":56.0245,"longitude":-3.4355,"confidence_score":0.97,"confidence_rationale":"Rosyth Dockyard, Firth of Forth","source_urls":["https://www.navylookout.com"],"date_observed":"2026-03-22","last_updated":"2026-03-22T15:36:09.349366+00:00Z","unit_category":"frigate","operational_readiness":"low","readiness_rationale":"HMS Active has emerged from the assembly hall, indicating she is structurally complete but is now entering the fitting-out phase. She is not yet launched, let alone commissioned. Type 26 frigates typically require 2-3 years of fitting out, basin trials, sea trials, and acceptance after rollout. She has no crew embarked in an operational sense, her combat systems are unlikely to be installed or integrated, and she cannot be tasked to any operational duty. The intelligence context explicitly states she is NOT operationally ready. Note: the stated location of Rosyth is inconsistent with Type 26 construction, which occurs at BAE Systems Govan/Scotstoun on the Clyde; the vessel may have been moved to Rosyth for outfitting at Babcock's facility, or the location data may be erroneous. Regardless, her construction status renders her operationally unavailable.","current_assignment":"Under construction / fitting out at shipyard. Not yet commissioned into Royal Navy service.","assignment_source":null,"capability_scores":{"carrier_strike":0,"air_defence":0,"anti_submarine_warfare":0,"maritime_patrol_and_surveillance":0,"forward_presence_and_engagement":0,"fishery_protection_and_ez_enforcement":0,"anti_surface_warfare":0,"task_group_escort":0,"covert_intelligence_gathering":0,"base_port_operations_and_fleet_support":0},"capability_rationale":"All capability scores are set to 0 because HMS Active is not yet a commissioned warship and has zero operational capability at this time. She cannot be deployed, sailed, or tasked for any mission. When eventually commissioned, the Type 26 City-class design would warrant high scores in anti_submarine_warfare (5 \u2014 primary role, with Type 2087 towed array sonar, bow-mounted sonar, and Merlin HM2 ASW helicopter), task_group_escort (5 \u2014 designed as the high-end escort for carrier strike and task groups), air_defence (3 \u2014 Sea Ceptor CAMM providing local/point air defence), anti_surface_warfare (3 \u2014 Mk 45 5-inch gun, future potential for strike-length Mk 41 VLS), maritime_patrol_and_surveillance (3 \u2014 advanced sensors and helicopter), forward_presence_and_engagement (3 \u2014 global deployability and mission bay flexibility), and carrier_strike (3 \u2014 as an escort within a carrier strike group). However, none of these capabilities exist until the ship is completed, trialled, accepted, and commissioned. Scoring against current operational reality: all zeros."},{"name":"HMS Prince of Wales","type":"ship","class":"Queen Elizabeth-class aircraft carrier","location_description":"Currently based at Portsmouth; scheduled to lead UK Carrier Strike Group in the North Atlantic","latitude":50.7984,"longitude":-1.1082,"confidence_score":0.97,"confidence_rationale":"Portsmouth Naval Base","source_urls":["https://www.navylookout.com"],"date_observed":"2026-03-22","last_updated":"2026-03-22T15:36:36.072536+00:00Z","unit_category":"aircraft_carrier","operational_readiness":"high","readiness_rationale":"Intelligence reporting indicates HMS Prince of Wales has assumed the high-readiness carrier role following HMS Queen Elizabeth's entry into extended dry dock at Rosyth. She is nominally at 72-hours notice to sail. The serious propeller shaft coupling failure of August 2022 was addressed during a 9-month dry dock period (Nov 2022\u2013Jul 2023) with both shafts replaced with a new design. Subsequent return to service and assumption of high-readiness duties suggests successful sea trials and work-up. Her scheduled assignment to lead the UK Carrier Strike Group in the North Atlantic further corroborates that she has been assessed as operationally ready by Fleet Command. As the sole operational carrier and current fleet flagship, she would be receiving priority for crew manning, stores, and air group allocation. No current reporting suggests any new material defects or readiness degradation.","current_assignment":"Based at HMNB Portsmouth at high readiness (nominally 72-hour notice to sail); scheduled to lead the UK Carrier Strike Group deployment in the North Atlantic. Likely conducting or preparing for Operational Sea Training (OST) and CSG work-up activities.","assignment_source":null,"capability_scores":{"carrier_strike":5,"air_defence":4,"anti_submarine_warfare":3,"maritime_patrol_and_surveillance":4,"forward_presence_and_engagement":5,"fishery_protection_and_ez_enforcement":0,"anti_surface_warfare":3,"task_group_escort":1,"covert_intelligence_gathering":1,"base_port_operations_and_fleet_support":2},"capability_rationale":"CARRIER_STRIKE (5): This is the primary role of the Queen Elizabeth-class. The embarked air group of F-35B Lightning II stealth fighters provides fifth-generation strike capability at range. The 65,000-tonne platform with ski-jump is purpose-built for power projection. AIR_DEFENCE (4): F-35B provides a potent outer air battle capability with advanced sensors (AN/APG-81 AESA radar, DAS) and beyond-visual-range engagement. However, the ship itself relies on Phalanx CIWS for close-in self-defence and is dependent on escort vessels (Type 45 destroyers) for area air defence, preventing a score of 5. ANTI_SUBMARINE_WARFARE (3): Embarked Merlin HM2 helicopters provide capable ASW with dipping sonar, sonobuoys, and Sting Ray torpedoes. However, the carrier itself lacks hull-mounted sonar or towed arrays and is an ASW-supported rather than ASW-primary platform. The score reflects the organic rotary-wing contribution. MARITIME_PATROL_AND_SURVEILLANCE (4): The combination of F-35B (with exceptional sensor fusion including EO/IR, AESA radar, and data-link sharing) and Merlin/Wildcat helicopters with Crowsnest AEW capability provides wide-area surveillance. The ship's own sensors and the ability to act as a command hub for ISR fusion justify a strong score. FORWARD_PRESENCE_AND_ENGAGEMENT (5): A 65,000-tonne aircraft carrier is the ultimate expression of forward presence and strategic signalling. As fleet flagship and CSG lead, she is optimised for this role. A North Atlantic NATO deployment is a textbook forward presence mission. FISHERY_PROTECTION_AND_EZ_ENFORCEMENT (0): Entirely inappropriate for this role; no capability or doctrine for constabulary maritime tasks. ANTI_SURFACE_WARFARE (3): F-35B can employ Paveway IV and potentially SPEAR 3 against surface targets. Wildcat helicopters can carry Sea Venom/Martlet anti-ship missiles. However, the ship carries no organic anti-ship missiles itself and relies on the air group and escorts for ASuW. TASK_GROUP_ESCORT (1): The carrier is the protected unit, not the escort. While she contributes to the group's overall sensor picture, she does not perform escort functions. Minimal score reflects incidental contribution only. COVERT_INTELLIGENCE_GATHERING (1): A 65,000-tonne carrier is inherently non-covert. F-35B has exceptional SIGINT/ELINT collection capability which provides some intelligence-gathering capacity, but the platform itself is not suited to covert operations. BASE_PORT_OPERATIONS_AND_FLEET_SUPPORT (2): As fleet flagship at Portsmouth she has a command and coordination role, but she is not an auxiliary or support vessel. Limited score reflects her role as a command platform rather than a logistics or support asset."},{"name":"HMS Queen Elizabeth","type":"ship","class":"Queen Elizabeth-class aircraft carrier","location_description":"Completing dry dock work at Babcock Dockyard, Rosyth, Scotland","latitude":56.0245,"longitude":-3.4355,"confidence_score":0.97,"confidence_rationale":"Rosyth Dockyard, Firth of Forth","source_urls":["https://www.navylookout.com"],"date_observed":"2026-03-22","last_updated":"2026-03-22T15:36:50.721285+00:00Z","unit_category":"aircraft_carrier","operational_readiness":"low","readiness_rationale":"HMS Queen Elizabeth has been out of operational service since early 2024, when she was withdrawn from NATO exercise Steadfast Defender due to propeller shaft coupling corrosion. She has been in dry dock at Rosyth undergoing expanded maintenance including full replacement of both propeller shafts, hull certification, and deck landing aids work. As of March 2026, she is described as 'completing dry dock work', suggesting the end of maintenance may be approaching, but she remains non-operational. Even upon exiting dry dock, she will require basin trials, sea trials, and a full operational work-up (typically several months for a carrier) before she can be considered mission-capable. She has been effectively unavailable for approximately two years. Readiness is assessed as low, not medium, because she is still physically in dry dock and has not yet commenced any post-refit sea trials.","current_assignment":"Extended dry dock maintenance period at Babcock Dockyard, Rosyth, Scotland \u2014 completing propeller shaft replacement, hull certification, and deck landing aids work","assignment_source":null,"capability_scores":{"carrier_strike":0,"air_defence":0,"anti_submarine_warfare":0,"maritime_patrol_and_surveillance":0,"forward_presence_and_engagement":0,"fishery_protection_and_ez_enforcement":0,"anti_surface_warfare":0,"task_group_escort":0,"covert_intelligence_gathering":0,"base_port_operations_and_fleet_support":1},"capability_rationale":"All operational capability scores are set to 0 because HMS Queen Elizabeth is currently in dry dock and completely unable to conduct any maritime operations. When operational, the Queen Elizabeth-class is the Royal Navy's primary carrier strike platform (carrier_strike: 5), with strong air defence capability via embarked F-35B Lightning II and organic radar/command systems (air_defence: 4), moderate anti-surface warfare through embarked air wing (anti_surface_warfare: 3), and significant forward presence value (forward_presence_and_engagement: 5). She carries Merlin HM2 helicopters giving moderate ASW capability (anti_submarine_warfare: 2-3) and good maritime patrol coverage (maritime_patrol_and_surveillance: 3). However, none of these capabilities are currently available. The sole score of 1 for base_port_operations_and_fleet_support reflects that the ship, while in dry dock, is at least contributing to fleet regeneration and her crew may be supporting dockyard liaison and training activities, representing minimal but non-zero fleet support value."},{"name":"HMS Anson","type":"submarine","class":"Astute-class","location_description":"Arrived at HMAS Stirling, Western Australia, as part of AUKUS Submarine Rotational Force-West","latitude":-32.2372,"longitude":115.6831,"confidence_score":0.95,"confidence_rationale":"HMAS Stirling is a well-known Royal Australian Navy base located on Garden Island, near Rockingham, Western Australia. It is the designated facility for AUKUS Submarine Rotational Force-West (SRF-West). Coordinates correspond to the naval base's position.","source_urls":["https://www.navylookout.com"],"date_observed":"2026-02-01","last_updated":"2026-03-22T15:38:28.301820+00:00Z","unit_category":"submarine_fleet","operational_readiness":"low","readiness_rationale":"HMS Anson is currently undergoing a Submarine Maintenance Period (SMP) at HMAS Stirling, Western Australia, which directly reduces her operational readiness. She is not deployed on patrol or tasked for operational missions. The intelligence context explicitly states her readiness is reduced during the SMP. Additionally, she completed an 8,200 nautical mile non-stop transit from Gibraltar, which would typically necessitate maintenance and crew rest. While she retains her inherent capabilities as an Astute-class SSN, she cannot be considered operationally available until the SMP is complete. The duration of the SMP is not specified, but maintenance periods for nuclear submarines typically span weeks to months. Rated 'low' rather than 'medium' because the maintenance is actively underway and she is confirmed not operationally deployable at this time.","current_assignment":"Undergoing Submarine Maintenance Period (SMP) at HMAS Stirling, Western Australia, as part of AUKUS Submarine Rotational Force-West (SRF-West). This includes the first-ever maintenance of a UK nuclear-powered submarine in Australia, with multinational personnel from the RN, SDA, RAN, ASC Pty Ltd, and Pearl Harbor Naval Shipyard. Combined AUKUS Pillar I and Pillar II activities are expected, including interoperability testing of the C2 Robotics Speartooth Large Uncrewed Underwater Vehicle (LUUV) with HMS Anson. Two RAN officers are embedded aboard.","assignment_source":null,"capability_scores":{"carrier_strike":0,"air_defence":0,"anti_submarine_warfare":5,"maritime_patrol_and_surveillance":3,"forward_presence_and_engagement":4,"fishery_protection_and_ez_enforcement":0,"anti_surface_warfare":5,"task_group_escort":3,"covert_intelligence_gathering":5,"base_port_operations_and_fleet_support":2},"capability_rationale":"Scores reflect the inherent capabilities of an Astute-class SSN at full operational capacity, not her current reduced readiness state during SMP. ANTI_SUBMARINE_WARFARE (5): Primary role of the Astute-class. The Thales Sonar 2076 suite is described as one of the world's most capable submarine sonar systems, and Spearfish heavyweight torpedoes are optimised for ASW engagements. This is a core design mission. ANTI_SURFACE_WARFARE (5): Astute-class carries Tomahawk TLAM for land-attack and Spearfish torpedoes effective against surface vessels. The TLAM capability gives her significant anti-surface and strike reach. Rated as primary role. COVERT_INTELLIGENCE_GATHERING (5): Nuclear-powered submarines are optimised for extended covert operations. The Sonar 2076 suite provides exceptional passive sensing. Intelligence gathering is explicitly listed as a core Astute-class mission. FORWARD_PRESENCE_AND_ENGAGEMENT (4): Her current AUKUS SRF-West deployment to Australia is itself a significant forward presence and engagement mission, demonstrating Indo-Pacific commitment and alliance interoperability. Scored strong rather than primary because this is an enabling rather than core warfighting function. MARITIME_PATROL_AND_SURVEILLANCE (3): Submarines can conduct covert surveillance and patrol, but their inability to communicate freely while submerged and limited surface awareness compared to aircraft/surface ships moderates this score. Sonar 2076 provides excellent acoustic surveillance. TASK_GROUP_ESCORT (3): Astute-class can screen a task group against submarine and surface threats, but submarines operate independently and are not optimised for the close-escort role that frigates/destroyers perform. Moderate capability. BASE_PORT_OPERATIONS_AND_FLEET_SUPPORT (2): Limited applicability; however, her current SMP and the AUKUS maintenance milestone activity contribute modestly to this category as she is enabling allied base infrastructure development and multinational workforce integration. CARRIER_STRIKE (0): No aviation capability; while Tomahawk provides land-attack strike, this category refers to carrier-based aviation strike operations. AIR_DEFENCE (0): Submarines have no air defence capability. FISHERY_PROTECTION_AND_EZ_ENFORCEMENT (0): Not applicable to a nuclear attack submarine; this role is for patrol vessels and offshore patrol ships. Note: HMS Anson is confirmed as the sole operational RN SSN, which has significant strategic implications for Royal Navy force generation and global commitments, particularly given rising tensions with Russia cited in the intelligence context."},{"name":"HMS Tamar","type":"ship","class":null,"location_description":"Permanently deployed to the Indo-Pacific region, typically operating from Singapore","latitude":1.2966,"longitude":103.7764,"confidence_score":0.82,"confidence_rationale":"HMS Tamar is permanently forward-deployed to the Indo-Pacific region and typically operates from Changi Naval Base in Singapore. The coordinates correspond to the Changi Naval Base area. While the vessel patrols widely across the Indo-Pacific, Singapore serves as her primary operating base and most likely location at any given time.","source_urls":["https://www.navylookout.com"],"date_observed":"2026-03-22","last_updated":"2026-03-22T15:38:44.997687+00:00Z","unit_category":"patrol_vessel","operational_readiness":"high","readiness_rationale":"HMS Tamar is now in her 5th year of forward deployment to the Indo-Pacific, operating from Singapore, and intelligence indicates she remains operationally active as of 2025-2026. She has been conducting gunnery exercises on Pacific patrol and experimenting with new roles such as underwater infrastructure protection. The sustained deployment tempo and continued exercise activity strongly suggest high operational readiness. There is no reporting of mechanical issues, refit periods, or crew shortages, though the extended deployment length (5+ years) does introduce some uncertainty regarding material condition and crew fatigue.","current_assignment":"Long-term forward deployment to the Indo-Pacific region, operating from Singapore. Conducting maritime patrol, regional partner engagement, gunnery exercises, and experimental underwater infrastructure protection operations. Currently in her 5th year of permanent forward presence.","assignment_source":null,"capability_scores":{"carrier_strike":0,"air_defence":0,"anti_submarine_warfare":0,"maritime_patrol_and_surveillance":4,"forward_presence_and_engagement":5,"fishery_protection_and_ez_enforcement":4,"anti_surface_warfare":1,"task_group_escort":1,"covert_intelligence_gathering":2,"base_port_operations_and_fleet_support":1},"capability_rationale":"HMS Tamar is a Batch 2 River-class OPV optimised for forward presence and engagement \u2014 this is explicitly her primary mission, being the first permanent RN presence in the Indo-Pacific since 1997. Scored 5 accordingly. Maritime patrol and surveillance scores 4: the class is designed for long-range patrol with capable sensors, and this is a core daily tasking, though she lacks the advanced sensor suite of a frigate or destroyer. Fishery protection and EZ enforcement scores 4: this is a bread-and-butter OPV role and the Batch 2 class is well-suited, though her current tasking is focused on broader regional engagement rather than dedicated fishery patrol. Anti-surface warfare scores only 1: the 30mm cannon and GPMGs provide minimal offensive capability against surface combatants; she has no anti-ship missiles or significant combat systems. Task group escort scores 1: she could physically accompany a task group (and was expected to support CSG deployments) but contributes negligible defensive capability. Covert intelligence gathering scores 2: her persistent presence in strategically sensitive waters (including the South China Sea) and engagement operations provide passive intelligence collection opportunities, though she has no specialist SIGINT/ELINT fit reported. Carrier strike, air defence, and ASW all score 0: she has no relevant weapons systems, sensors, or capabilities for these roles \u2014 no SAMs, no sonar, no torpedo systems, no strike weapons. The flight deck can operate Wildcat or Merlin helicopters which could theoretically extend some capability, but the lack of a hangar severely limits sustained aviation operations. Base port/fleet support scores 1: she can provide minimal logistics support but this is not a designed role."},{"name":"HMS Spey","type":"ship","class":null,"location_description":"Permanently deployed to the Indo-Pacific region alongside HMS Tamar","latitude":1.27,"longitude":103.84,"confidence_score":0.4,"confidence_rationale":"HMS Spey is permanently forward-deployed to the Indo-Pacific region alongside HMS Tamar as part of the Royal Navy's persistent presence. The ships are based out of various ports across the Indo-Pacific but frequently operate from Singapore (Changi Naval Base / Sembawang) as a key logistics hub. Without a specific current port call or operating area, Singapore is used as the approximate centre of their forward-deployment hub. The Indo-Pacific is a vast region, so confidence is moderate-low.","source_urls":["https://www.navylookout.com"],"date_observed":"2026-03-22","last_updated":"2026-03-22T15:39:00.977374+00:00Z","unit_category":"patrol_vessel","operational_readiness":"high","readiness_rationale":"HMS Spey has been continuously forward deployed to the Indo-Pacific since September 2021, a period exceeding 4 years, and intelligence from April 2025 confirms active participation in a 16-day combined exercise with Commonwealth allies in the South China Sea. The sustained operational tempo \u2014 maritime security patrols, partner engagement exercises, and freedom of navigation operations \u2014 indicates she remains fully mission-capable. No reports of mechanical issues, refit, or return to home port have been identified. While such an extended deployment could raise questions about material condition, the continued active tasking and exercise participation strongly suggest high readiness for her designated role.","current_assignment":"Long-term forward deployment to the Indo-Pacific region conducting maritime security patrols, partner nation engagement exercises, freedom of navigation operations, and combined exercises with Commonwealth allies (most recently in the South China Sea with Malaysian and Singaporean forces, April 2025).","assignment_source":null,"capability_scores":{"carrier_strike":0,"air_defence":0,"anti_submarine_warfare":0,"maritime_patrol_and_surveillance":4,"forward_presence_and_engagement":5,"fishery_protection_and_ez_enforcement":4,"anti_surface_warfare":1,"task_group_escort":1,"covert_intelligence_gathering":1,"base_port_operations_and_fleet_support":1},"capability_rationale":"HMS Spey is a Batch 2 River-class OPV optimised for presence, patrol, and engagement rather than high-intensity warfighting. FORWARD PRESENCE AND ENGAGEMENT (5): This is her primary role \u2014 she has been forward deployed for over 4 years conducting partner engagement, combined exercises, and flag-showing across the entire Indo-Pacific theatre. MARITIME PATROL AND SURVEILLANCE (4): At 90m and ~2,000 tonnes with good endurance, she is well-suited for extended maritime patrol and surveillance, though she lacks the advanced sensor suites of frigates or destroyers. FISHERY PROTECTION AND EZ ENFORCEMENT (4): The Batch 2 River class was originally designed for constabulary duties including fishery protection and EEZ enforcement; her 30mm cannon and GPMGs are appropriate for this role. ANTI_SURFACE_WARFARE (1): The 30mm DS30M cannon provides only a minimal self-defence capability against surface threats; she has no anti-ship missiles or heavyweight weapons. TASK GROUP ESCORT (1): She could nominally accompany a task group but contributes negligible combat capability to escort operations. COVERT INTELLIGENCE GATHERING (1): While any deployed warship collects some intelligence through routine observation, she has no known specialist SIGINT/ELINT fits or covert capability. BASE PORT OPERATIONS AND FLEET SUPPORT (1): She can provide minimal support functions but this is not her role. CARRIER STRIKE, AIR DEFENCE, and ASW (all 0): She has no aircraft strike capability, no air defence systems beyond small arms, and no sonar or ASW weapons \u2014 these missions are entirely outside her capability envelope."},{"name":"HMS Forth","type":"ship","class":null,"location_description":"Forward-deployed to the Falkland Islands","latitude":-51.693,"longitude":-57.777,"confidence_score":0.9,"confidence_rationale":"Falkland Islands","source_urls":["https://www.navylookout.com"],"date_observed":"2026-03-22","last_updated":"2026-03-22T15:39:18.158759+00:00Z","unit_category":"patrol_vessel","operational_readiness":"low","readiness_rationale":"HMS Forth is currently in transit back to the UK after more than six years of continuous forward deployment in the Falkland Islands (January 2020 \u2013 January 2026), covering 155,000 nautical miles. After such an extended period of operations without returning to the UK, the vessel will almost certainly require a significant maintenance period, hull survey, refit/upkeep, and full crew rotation. Until she arrives and completes post-deployment maintenance, her operational readiness should be assessed as low. There is no indication she has been assigned to any new tasking, and the Royal Navy's own messaging focused on her 'heading back' rather than being redeployed. This assessment is inferred from standard naval practice following long deployments rather than a specific intelligence report on her material condition.","current_assignment":"In transit returning to the UK from the Falkland Islands following relief by HMS Medway in January 2026. Expected to enter a maintenance/upkeep period upon arrival.","assignment_source":null,"capability_scores":{"carrier_strike":0,"air_defence":0,"anti_submarine_warfare":0,"maritime_patrol_and_surveillance":4,"forward_presence_and_engagement":4,"fishery_protection_and_ez_enforcement":5,"anti_surface_warfare":1,"task_group_escort":1,"covert_intelligence_gathering":1,"base_port_operations_and_fleet_support":1},"capability_rationale":"As a Batch 2 River-class OPV, HMS Forth is purpose-built for constabulary maritime operations: fishery protection and exclusive economic zone enforcement is her primary role (score 5), as demonstrated by her six-year Falklands patrol. She scores highly for maritime patrol and surveillance (4) given her endurance, sensors, and ability to maintain a persistent patrol presence over large sea areas, and for forward presence and engagement (4), a role she fulfilled continuously in the South Atlantic. Her armament is limited to a 30mm DS30M Mk2 cannon and GPMGs, giving her only minimal anti-surface warfare capability (1) \u2014 sufficient against very small threats but negligible against any warship. She has no air defence radar or missile systems (0), no ASW sonar or weapons (0), and no role in carrier strike (0). Her flight deck can support helicopter operations but she has no hangar, limiting her utility for task group escort (1) to only the most permissive environments. Covert intelligence gathering scores 1 \u2014 while any naval vessel collects some intelligence, she has no specialist SIGINT/ELINT fit publicly known. Base port/fleet support scores 1 as she can provide limited logistic support or act as a platform of opportunity but this is not a designed role. Note: all capability scores reflect the class design at full readiness; her current low readiness state means effective capability is further reduced until post-deployment maintenance is completed."},{"name":"HMS Medway","type":"ship","class":null,"location_description":"Forward-deployed in the Caribbean","latitude":15.5,"longitude":-61.0,"confidence_score":0.5,"confidence_rationale":"HMS Medway is a Royal Navy Batch 2 River-class offshore patrol vessel permanently forward-deployed to the Caribbean to support British Overseas Territories. The Caribbean Sea's approximate centre is used as the coordinate estimate. The vessel frequently operates around the British Overseas Territories in the region (e.g., Cayman Islands, British Virgin Islands, Turks and Caicos) and may also use facilities in Cura\u00e7ao or other partner nations. Without a specific port or tasking location, the general centre of the Eastern Caribbean is provided.","source_urls":["https://www.navylookout.com"],"date_observed":"2026-03-22","last_updated":"2026-03-22T15:39:33.331212+00:00Z","unit_category":"patrol_vessel","operational_readiness":"high","readiness_rationale":"HMS Medway arrived in the Falkland Islands in January 2026 to relieve HMS Forth, meaning she is only approximately two months into her forward deployment as of the assessment date. Pre-deployment maintenance and operational work-up would have been completed prior to the transatlantic/South Atlantic transit. Multiple credible sources (Forces News, UK Defence Journal, Mercopress, Navy Leaders) confirm the handover at East Cove Military Port in January 2026. A freshly deployed vessel replacing another on a standing tasking is assessed as high readiness with good confidence.","current_assignment":"Forward-deployed as the Royal Navy's permanent patrol vessel in the Falkland Islands and wider South Atlantic, having replaced HMS Forth in January 2026. Tasked with sovereignty patrol, fishery protection, and enforcement of the Falkland Islands Exclusive Economic Zone.","assignment_source":null,"capability_scores":{"carrier_strike":0,"air_defence":0,"anti_submarine_warfare":0,"maritime_patrol_and_surveillance":5,"forward_presence_and_engagement":5,"fishery_protection_and_ez_enforcement":5,"anti_surface_warfare":1,"task_group_escort":1,"covert_intelligence_gathering":1,"base_port_operations_and_fleet_support":0},"capability_rationale":"As a Batch 2 River-class OPV (90m, ~2,000 tonnes), HMS Medway is purpose-built for long-endurance, low-intensity patrol and constabulary duties \u2014 hence the maximum scores for maritime_patrol_and_surveillance, forward_presence_and_engagement, and fishery_protection_and_ez_enforcement, which are her primary designed roles and exactly what she is tasked with in the Falklands. Her armament (30mm DS30M Mk2 cannon and GPMGs) provides only a minimal anti-surface capability against small craft or lightly armed vessels, insufficient for meaningful engagement against warships \u2014 scored 1. The flight deck (no hangar) allows helicopter operations for surveillance and boarding support but does not confer ASW, air defence, or strike capability. She carries no sonar, torpedo systems, anti-air missiles, or anti-ship missiles, so carrier_strike, air_defence, and anti_submarine_warfare are all scored 0. Task_group_escort is scored 1: she could physically accompany a task group but lacks the sensors and weapons to contribute meaningfully to group defence. Covert_intelligence_gathering is scored 1: she has basic navigational and communications sensors and may conduct incidental ELINT/observation, but she is not optimised or equipped for dedicated intelligence collection. Base_port_operations scored 0 as she is a deployable vessel, not a support facility."},{"name":"HMS Trent","type":"ship","class":null,"location_description":"Deployed on operations in the Mediterranean and West Africa; last reported position North East Atlantic Ocean","latitude":30.0,"longitude":-15.0,"confidence_score":0.4,"confidence_rationale":"HMS Trent is an OPV frequently deployed on Mediterranean and West African operations. The last reported position is the 'North East Atlantic Ocean,' which is a broad area. Given her typical patrol pattern transiting between the Mediterranean (via Gibraltar) and the Gulf of Guinea, and the descriptor 'North East Atlantic,' this suggests a position likely off the coast of Northwest Africa or near the Canary Islands/Madeira region. The coordinates 30.0N, 15.0W represent an approximate centre of the NE Atlantic consistent with her operational areas, roughly between Gibraltar and the West African coast.","source_urls":["https://www.navylookout.com"],"date_observed":"2026-03-09","last_updated":"2026-03-22T15:39:51.656478+00:00Z","unit_category":"patrol_vessel","operational_readiness":"high","readiness_rationale":"HMS Trent completed planned maintenance and capability upgrades in early 2025, returning to sea in mid-May 2025. As of the assessment date (March 2026), she has been operationally active for approximately 10 months since that refit. Her last reported position in the North East Atlantic Ocean, consistent with transit between her forward deployment areas (Mediterranean, West Africa), indicates she is actively deployed rather than in port or undergoing maintenance. The MOD confirmed her return to operational status in April/May 2025 written responses. Forward-deployed Batch 2 River-class OPVs typically maintain extended deployment cycles from Gibraltar, and all evidence suggests she is fully operational.","current_assignment":"Forward deployed from Gibraltar conducting maritime security operations across the Mediterranean and West African waters, including counter-piracy, counter-smuggling, and regional engagement patrols. Currently positioned in the North East Atlantic Ocean, likely transiting between operational areas or returning toward the Mediterranean/Gibraltar.","assignment_source":null,"capability_scores":{"carrier_strike":0,"air_defence":0,"anti_submarine_warfare":0,"maritime_patrol_and_surveillance":4,"forward_presence_and_engagement":5,"fishery_protection_and_ez_enforcement":4,"anti_surface_warfare":1,"task_group_escort":1,"covert_intelligence_gathering":1,"base_port_operations_and_fleet_support":1},"capability_rationale":"HMS Trent is a Batch 2 River-class OPV (~2,000 tonnes, 90m) specifically designed for forward presence and constabulary maritime operations, making forward_presence_and_engagement her primary role (5). Her extended deployments to the Gulf of Guinea, Mediterranean, and Caribbean with regional partner training and engagement are the core of her tasking. Maritime_patrol_and_surveillance scores highly (4) as the Batch 2 Rivers are purpose-built for sustained patrol operations with good endurance and sea-keeping, equipped with appropriate sensors for surface surveillance, and she routinely conducts counter-piracy and counter-smuggling patrols. Fishery_protection_and_ez_enforcement (4) reflects her class's direct lineage from fishery protection vessels and her full capability for constabulary boarding operations, supported by embarked Royal Marines from 42 Commando. Anti_surface_warfare scores only 1; her 30mm DS30M cannon and GPMGs provide a basic self-defence and light enforcement capability but she lacks anti-ship missiles or a meaningful combat suite. Task_group_escort (1) reflects that while she could nominally screen a convoy or contribute to a task group in a low-threat environment, she lacks the sensors, weapons, and combat management systems for meaningful escort duties. Carrier_strike (0), air_defence (0), and anti_submarine_warfare (0) are entirely outside her capability \u2014 she has no relevant weapons or sensor systems for these roles. Covert_intelligence_gathering (1) is minimal; she may gather some signals or observational intelligence during patrols but is not configured or tasked for dedicated intelligence collection. Base_port_operations_and_fleet_support (1) is minimal as she is a deployed warship, not a support or base asset, though she can provide limited logistics support to embarked forces."},{"name":"HMS Kent","type":"ship","class":null,"location_description":"Undergoing planned deep maintenance at HMNB Devonport","latitude":50.3714,"longitude":-4.1872,"confidence_score":0.99,"confidence_rationale":"HMNB Devonport \u2014 fixed base location","source_urls":["https://www.navylookout.com"],"date_observed":"2026-03-22","last_updated":"2026-03-22T15:40:05.378268+00:00Z","unit_category":"frigate","operational_readiness":"low","readiness_rationale":"HMS Kent is currently undergoing planned deep maintenance at HMNB Devonport. Deep maintenance periods for Type 23 frigates typically last many months to over a year and involve extensive hull work, machinery overhaul, and combat system upgrades. During this period the ship is non-operational: she cannot be deployed, tasked, or generate any warfighting capability. The intelligence context explicitly states she is NOT operationally available. Additionally, at 26 years old (commissioned 2000), she is an aging platform in a class being progressively replaced by Type 26 and Type 31 frigates, which may imply maintenance is more complex or extended. Readiness is assessed as low with high confidence.","current_assignment":"Undergoing planned deep maintenance at HMNB Devonport","assignment_source":null,"capability_scores":{"carrier_strike":0,"air_defence":0,"anti_submarine_warfare":0,"maritime_patrol_and_surveillance":0,"forward_presence_and_engagement":0,"fishery_protection_and_ez_enforcement":0,"anti_surface_warfare":0,"task_group_escort":0,"covert_intelligence_gathering":0,"base_port_operations_and_fleet_support":1},"capability_rationale":"All operational capability scores are set to 0 because HMS Kent is in deep maintenance and cannot deploy or perform any mission. When operational, a Type 23 frigate would score highly in anti-submarine warfare (primary role, equipped with Type 2087 towed array sonar, Type 2050 hull-mounted sonar, and Merlin HM2 ASW helicopter \u2014 would normally be 5), task group escort (4-5, a core Type 23 role for carrier strike group or task group protection), air defence (3, Sea Ceptor provides local/point defence), anti-surface warfare (2-3, depending on whether Harpoon has been retained), maritime patrol and surveillance (3, capable ASW/surface surveillance platform), forward presence and engagement (3, routinely deployed on standing tasks), carrier strike (3, as an escort element), and fishery protection/EZ enforcement (2, capable but over-specified for the role). However, none of these capabilities are available while in deep maintenance. The sole score of 1 for base port operations and fleet support reflects that the ship, while alongside, marginally contributes to fleet support activity at Devonport (e.g., providing training billets, trials platform for maintainers, spare parts management) but this contribution is minimal."},{"name":"HMNB Portsmouth","type":"base","class":null,"location_description":"Hampshire, England","latitude":50.8,"longitude":-1.1,"confidence_score":0.95,"confidence_rationale":"HMNB Portsmouth is Her Majesty's Naval Base Portsmouth, a well-known Royal Navy base located in Portsmouth, Hampshire, England. Its coordinates are well-established at approximately 50.80\u00b0N, 1.10\u00b0W.","source_urls":["https://www.navylookout.com"],"date_observed":"2026-03-22","last_updated":"2026-03-22T15:41:13.791996+00:00Z","unit_category":"naval_base","operational_readiness":"high","readiness_rationale":"HMNB Portsmouth is the principal home port of the Royal Navy's surface fleet and has been in continuous naval service for centuries. Intelligence indicates it currently hosts HMS Prince of Wales at high readiness as fleet flagship, actively supports deployments (HMS Dragon to Eastern Mediterranean, HMS Tyne on Channel patrols), and houses Naval Command Headquarters and FOST certification staff. The breadth of concurrent operations \u2014 carrier strike group generation, destroyer deployments, OPV patrols, and fleet-wide training certification \u2014 indicates a fully operational base at high readiness. No reports of infrastructure degradation or reduced capacity.","current_assignment":"Serving as the home port and primary operating base for the Royal Navy surface fleet, including fleet generation for the UK Carrier Strike Group (HMS Prince of Wales at high readiness), supporting Type 45 destroyer and OPV deployments, hosting Naval Command Headquarters, and providing FOST deployment certification services.","assignment_source":null,"capability_scores":{"carrier_strike":5,"air_defence":4,"anti_submarine_warfare":3,"maritime_patrol_and_surveillance":3,"forward_presence_and_engagement":4,"fishery_protection_and_ez_enforcement":3,"anti_surface_warfare":4,"task_group_escort":4,"covert_intelligence_gathering":1,"base_port_operations_and_fleet_support":5},"capability_rationale":"CARRIER_STRIKE (5): Portsmouth is the home port for both Queen Elizabeth-class carriers; HMS Prince of Wales is currently at high readiness for CSG leadership, making carrier strike generation a primary role. AIR_DEFENCE (4): Home base for Type 45 destroyers (the Royal Navy's principal area air defence platforms), providing strong support for air defence task generation, though the base itself is not an air defence weapon system. ANTI_SUBMARINE_WARFARE (3): Moderate \u2014 while ASW-capable frigates and helicopters may transit or be supported, Portsmouth is not the primary ASW-focused base (Devonport hosts the Type 23 fleet); however, FOST certification and logistics support contribute. MARITIME_PATROL_AND_SURVEILLANCE (3): HMS Tyne and other Batch 1 River-class OPVs operate from Portsmouth on Channel patrols, providing moderate capability; however, dedicated maritime patrol aircraft operate from RAF bases. FORWARD_PRESENCE_AND_ENGAGEMENT (4): Strong \u2014 the base generates and sustains forward-deployed units globally (e.g., HMS Dragon to the Eastern Mediterranean) and serves as the fleet's command hub. FISHERY_PROTECTION_AND_EZ_ENFORCEMENT (3): River-class OPVs based at Portsmouth conduct English Channel enforcement duties, giving moderate direct capability in this area. ANTI_SURFACE_WARFARE (4): Strong \u2014 Type 45 destroyers and carrier air wings hosted here carry significant anti-surface capability; the base provides the logistics and command infrastructure to generate these forces. TASK_GROUP_ESCORT (4): Strong \u2014 as the home port for Type 45s and the carrier strike group, Portsmouth is central to generating escort forces for task groups. COVERT_INTELLIGENCE_GATHERING (1): Minimal \u2014 while Naval Command HQ may have intelligence functions, the base is a major surface fleet installation with no identified covert intelligence-gathering role; submarines (the primary covert ISR platforms) are based elsewhere. BASE_PORT_OPERATIONS_AND_FLEET_SUPPORT (5): Primary role \u2014 Portsmouth provides extensive docking, dry dock, maintenance, ammunition handling, logistics, command-and-control, FOST certification, and fleet generation infrastructure. This is the defining function of HMNB Portsmouth."},{"name":"HMNB Devonport","type":"base","class":null,"location_description":"Plymouth, England","latitude":50.3714,"longitude":-4.1872,"confidence_score":0.95,"confidence_rationale":"HMNB Devonport, Plymouth","source_urls":["https://www.navylookout.com"],"date_observed":"2026-03-22","last_updated":"2026-03-22T15:41:32.429596+00:00Z","unit_category":"naval_base","operational_readiness":"high","readiness_rationale":"HMNB Devonport is the largest naval base in Western Europe and remains fully operational as a major fleet support, maintenance, and home port facility. The base's extensive infrastructure (15 dry docks, 25 tidal berths, 5 basins, 4 miles of waterfront) and its operation by Babcock International under TOBA indicate sustained high readiness for its primary role as a base and maintenance hub. Active deep maintenance work (e.g., HMS Kent refit) confirms ongoing operational tempo. However, some hosted platforms (HMS Albion, HMS Bulwark) are in extended readiness or facing decommissioning, which reduces the offensive amphibious capability generated from the base but does not diminish the base's own readiness as an infrastructure asset.","current_assignment":"Serving as home port and deep maintenance/refit facility for Type 23 frigates, amphibious vessels (in extended readiness), and survey vessels. Currently conducting planned deep maintenance on HMS Kent (Type 23). Also provides nuclear submarine refuelling/defuelling services and supports 3 Commando Brigade operations in the Plymouth area. Preparing infrastructure for future Type 26 frigate basing.","assignment_source":null,"capability_scores":{"carrier_strike":1,"air_defence":1,"anti_submarine_warfare":3,"maritime_patrol_and_surveillance":2,"forward_presence_and_engagement":3,"fishery_protection_and_ez_enforcement":1,"anti_surface_warfare":2,"task_group_escort":3,"covert_intelligence_gathering":2,"base_port_operations_and_fleet_support":5},"capability_rationale":"Base/port operations and fleet support is scored 5 as this is Devonport's primary role \u2014 it is the Royal Navy's principal maintenance, refit, and fleet generation facility with unmatched dockyard infrastructure in Western Europe. Anti-submarine warfare scores 3 because Devonport is home port to multiple Type 23 frigates (the RN's primary ASW platform) and will host Type 26 frigates optimised for ASW; the base generates and sustains these capabilities. Task group escort scores 3 for the same reason \u2014 Type 23s based here routinely deploy as task group escorts. Forward presence and engagement scores 3 as Devonport-based frigates and amphibious assets (when available) regularly deploy on forward presence tasking, and 3 Commando Brigade provides expeditionary capability. Anti-surface warfare scores 2 as Type 23s carry Harpoon (being phased out) and the base supports surface combatant generation, but this is not the primary optimisation. Maritime patrol and surveillance scores 2 reflecting the survey vessels based here and frigate contributions to maritime awareness. Covert intelligence gathering scores 2 due to nuclear submarine refuelling/defuelling activities and proximity to inte
