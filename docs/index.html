tion training and readiness scores 1: the flight deck can support helicopter landing operations and deck training serials but the absence of a hangar and aviation support facilities limits this to day-only, fair-weather operations. Carrier strike, air defence, ASW, amphibious operations, and RAS all score 0 as the vessel has no relevant systems, sensors, or design features for these roles."},{"name":"HMS Severn","service":"royal_navy","type":"ship","class":"River-class Batch I OPV","location_description":"Still in service; offered for sale to Uruguay","latitude":50.38,"longitude":-4.14,"confidence_score":0.45,"confidence_rationale":"HMS Severn is a River-class offshore patrol vessel still in Royal Navy service but offered for sale to Uruguay. While the sale process is underway, the vessel would most likely be based at or near its home port of HMNB Devonport in Plymouth, UK, which is the typical base for River-class OPVs. Without specific deployment information, Devonport is the best estimate for her current location.","source_urls":["https://www.navylookout.com"],"date_observed":"2026-04-18","last_updated":"2026-04-18T09:43:18.358798+00:00Z","unit_category":"patrol_vessel","operational_readiness":"high","readiness_rationale":"Intelligence indicates HMS Severn has been actively tasked in monitoring operations alongside HMS Mersey, specifically shadowing Russian naval vessels transiting near UK waters. This confirms she is operational, crewed, and available for tasking as of the assessment period. While she is one of three Batch 1 OPVs offered for sale to Uruguay with a projected class decommissioning date of 2028, there is no evidence of her being laid up, in refit, or otherwise unavailable. Active operational tasking supports a high readiness assessment. The pending sale/decommissioning timeline (still ~2 years away) does not currently degrade readiness but is noted as a future concern.","current_assignment":"Coastal sovereignty patrol and Russian naval vessel monitoring operations in UK home waters as part of the 1st Patrol Boat Squadron (formerly Offshore Division, Coastal Forces Squadron). Portsmouth-based.","assignment_source":null,"capability_scores":{"carrier_strike":0,"air_defence":0,"anti_submarine_warfare":0,"maritime_patrol_and_surveillance":4,"amphibious_operations":0,"replenishment_at_sea":0,"humanitarian_assistance_disaster_relief":2,"fishery_protection_and_sovereignty":5,"fleet_escort_and_sea_control":1,"aviation_training_and_readiness":1},"capability_rationale":"HMS Severn is a River-class Batch 1 OPV purpose-built for fishery protection and sovereignty patrol, scoring 5 in that primary role. She scores 4 in maritime patrol and surveillance, reflecting her proven, active employment in shadowing and monitoring Russian warships transiting UK approaches \u2014 this is a demonstrated and recurring tasking, though she lacks the sensor suite (no towed array, no significant radar/ESM fit) of a dedicated surveillance platform. Armament is limited to a 20mm Oerlikon cannon and machine guns, providing negligible capability in carrier strike, air defence, ASW, and amphibious operations (all scored 0). She has no RAS capability (0). Fleet escort and sea control scores 1 \u2014 she could nominally accompany a formation but offers no meaningful combat contribution against credible threats. The flight deck (no hangar) can receive Merlin or Wildcat helicopters for VERTREP or limited rotary-wing operations, giving a token score of 1 for aviation training/readiness and contributing to a limited HADR score of 2, where her modest size, helicopter reception capability, and general-purpose utility could support low-intensity humanitarian tasks."},{"name":"815 Naval Air Squadron","service":"royal_navy","type":"unit","class":"Wildcat helicopter squadron","location_description":"Based at RNAS Yeovilton; provided Wildcat helicopter for Russian ship monitoring in UK waters","latitude":51.0094,"longitude":-2.6386,"confidence_score":0.99,"confidence_rationale":"RNAS Yeovilton \u2014 fixed station location","source_urls":["https://www.navylookout.com"],"date_observed":"2026-04-07","last_updated":"2026-04-18T09:43:35.852369+00:00Z","unit_category":"air_station","operational_readiness":"high","readiness_rationale":"Multiple concurrent operational deployments in early 2026 demonstrate high readiness: two Wildcat flights deployed to Cyprus in March 2026 with Martlet missiles within days of the RAF Akrotiri UAS attack, a Wildcat was committed to Eagles Eye drone-teaming trials in January 2026, and another airframe was tasked for Russian ship monitoring in UK waters. The ability to sustain simultaneous detachments across the Eastern Mediterranean and home waters, while also participating in advanced capability development trials, indicates a well-resourced and operationally active squadron at high readiness.","current_assignment":"Multi-tasked: detachments deployed to Cyprus (armed with Martlet missiles reinforcing air defences in the Eastern Mediterranean alongside HMS Dragon following the 1 March 2026 UAS attack on RAF Akrotiri); providing embarked Wildcat helicopter for Russian warship monitoring in UK waters alongside HMS Mersey and RFA Tideforce; and conducting advanced drone-teaming missile engagement trials (Eagles Eye) at Predannack, Cornwall.","assignment_source":null,"capability_scores":{"carrier_strike":2,"air_defence":4,"anti_submarine_warfare":3,"maritime_patrol_and_surveillance":4,"amphibious_operations":1,"replenishment_at_sea":0,"humanitarian_assistance_disaster_relief":1,"fishery_protection_and_sovereignty":3,"fleet_escort_and_sea_control":5,"aviation_training_and_readiness":3},"capability_rationale":"Fleet escort and sea control is scored 5 as this is 815 NAS's primary role \u2014 providing embarked maritime attack helicopter flights to frigates and destroyers fleet-wide, armed with Sea Venom anti-ship missiles, Martlet LMMs, torpedoes, and machine guns, making them the UK's expert in maritime strike and embarked rotary wing operations. Air defence is scored 4 based on the demonstrated Cyprus deployment specifically to reinforce air defences with Martlet missiles against UAS threats, and the Eagles Eye trials proving drone-teamed Martlet engagements against moving targets \u2014 this is an increasingly primary mission set. Maritime patrol and surveillance scores 4 given active tasking for Russian ship monitoring in UK waters and the inherent ISR capability of embarked Wildcat flights with sensors and datalinks. Anti-submarine warfare scores 3 as the Wildcat HMA Mk 2 carries torpedoes and dipping sonar capability, though the intelligence context emphasises surface strike and air defence roles over ASW. Fishery protection and sovereignty scores 3 reflecting the demonstrated pairing with patrol vessel HMS Mersey for sovereignty tasks. Carrier strike scores 2: Wildcats can embark on carriers and contribute to the air group with Martlet/Sea Venom but are not a primary strike asset compared to fast jets. Aviation training and readiness scores 3 as 815 NAS generates trained flights for fleet-wide embarkation and participates in advanced capability trials. Amphibious operations and HADR score 1 \u2014 Wildcats could theoretically support these but it is not a trained or equipped role. Replenishment at sea scores 0 as it is wholly inapplicable."},{"name":"RNAS Yeovilton","service":"royal_navy","type":"air_station","class":null,"location_description":"Yeovilton, Somerset; home base of 815 Naval Air Squadron","latitude":51.0094,"longitude":-2.6386,"confidence_score":0.97,"confidence_rationale":"RNAS Yeovilton, Somerset","source_urls":["https://www.navylookout.com"],"date_observed":"2026-04-18","last_updated":"2026-04-18T09:43:54.416242+00:00Z","unit_category":"air_station","operational_readiness":"high","readiness_rationale":"RNAS Yeovilton (HMS Heron) is assessed as high readiness based on multiple indicators: it hosts over 100 aircraft across front-line and training squadrons, it is actively generating Wildcat maritime flights for fleet-wide embarkation, and as recently as March 2026 it deployed Maritime Attack Helicopters via RAF C-17 to Cyprus \u2014 demonstrating current operational tempo and force projection capability. The cancellation of the 2026 International Air Day may suggest that operational commitments are being prioritised over public engagement, which is consistent with sustained high readiness. The Commando Helicopter Force has re-focused on its core amphibious role, indicating a mature posture. No evidence of degraded infrastructure or capability shortfalls was found.","current_assignment":"Generating and sustaining Wildcat maritime helicopter flights for Royal Navy warship embarkations fleet-wide; supporting Commando Helicopter Force (CHF) operations with Merlin HC.3/4 and Wildcat AH.1; recently deployed Maritime Attack Helicopters to Cyprus (March 2026); conducting rotary-wing aircrew training.","assignment_source":null,"capability_scores":{"carrier_strike":2,"air_defence":1,"anti_submarine_warfare":4,"maritime_patrol_and_surveillance":4,"amphibious_operations":5,"replenishment_at_sea":0,"humanitarian_assistance_disaster_relief":3,"fishery_protection_and_sovereignty":2,"aviation_training_and_readiness":5,"fleet_escort_and_sea_control":4},"capability_rationale":"RNAS Yeovilton's primary roles are aviation training and readiness (5) \u2014 it is the Royal Navy's rotary-wing aircrew training base and generation hub \u2014 and amphibious operations (5), as it hosts the Commando Helicopter Force with Merlin HC.3/4 and Wildcat AH.1 directly supporting Royal Marines and amphibious task groups. Anti-submarine warfare scores 4 because 815 NAS Wildcat HMA.2 helicopters embarked on frigates and destroyers are a critical ASW asset, and Yeovilton is their generation base. Fleet escort and sea control (4) reflects the same logic: Wildcat maritime flights are integral to surface combatant operations. Maritime patrol and surveillance (4) is scored highly as embarked Wildcats contribute significantly to the surface search and surveillance picture. Carrier strike (2) receives a limited score; while Yeovilton-generated helicopters can operate from carriers, the station does not host fixed-wing fast jet squadrons (F-35B is based at RAF Marham/embarked). HADR (3) is moderate \u2014 CHF Merlins and Wildcats are frequently tasked for disaster relief and have a strong track record. Fishery protection (2) is limited \u2014 Wildcat flights on OPVs can contribute but it is not a primary role. Air defence (1) is minimal \u2014 helicopters have limited air defence capability beyond self-protection. Replenishment at sea (0) is not applicable to an air station."},{"name":"HMNB Portsmouth","service":"royal_navy","type":"base","class":null,"location_description":"Portsmouth; home port of HMS Prince of Wales and HMS Mersey","latitude":50.7984,"longitude":-1.1082,"confidence_score":0.97,"confidence_rationale":"Portsmouth Naval Base","source_urls":["https://www.navylookout.com"],"date_observed":"2026-04-18","last_updated":"2026-04-18T09:44:15.716574+00:00Z","unit_category":"naval_base","operational_readiness":"high","readiness_rationale":"HMNB Portsmouth is the Royal Navy's principal surface fleet base, home-porting almost two-thirds of the surface fleet including both Queen Elizabeth-class carriers. The intelligence context demonstrates high operational tempo: HMS Dragon deployed to the Eastern Mediterranean in March 2026 after an accelerated 6-day refit, HMS Prince of Wales is at 5 days' notice to sail for Operation Firecrest, and HMS Mersey is actively deployed monitoring Russian naval activity. Major investment in new jetties and berths indicates sustained infrastructure modernisation. The base's logistics, maintenance, and personnel support functions are evidently functioning at a high level given the rapid fleet generation demonstrated. HMS Daring is noted as completing regeneration, indicating active maintenance capacity. The presence of Navy Command Headquarters at HMS Excellent further underscores the base's strategic centrality.","current_assignment":"Primary home port and fleet generation hub for the Royal Navy surface fleet. Currently supporting: HMS Prince of Wales at readiness for Operation Firecrest; HMS Mersey deployed on Russian ship monitoring; HMS Daring undergoing regeneration; recently supported HMS Dragon's rapid deployment to Eastern Mediterranean. Also hosts Navy Command Headquarters (HMS Excellent) and Royal Naval Reserve unit HMS King Alfred. Undergoing major infrastructure investment including new jetties and ship berths.","assignment_source":null,"capability_scores":{"carrier_strike":5,"air_defence":4,"anti_submarine_warfare":3,"maritime_patrol_and_surveillance":4,"amphibious_operations":2,"replenishment_at_sea":2,"humanitarian_assistance_disaster_relief":3,"fishery_protection_and_sovereignty":5,"fleet_escort_and_sea_control":5,"aviation_training_and_readiness":3},"capability_rationale":"As the Royal Navy's primary surface fleet base, HMNB Portsmouth scores highest in roles directly supported by its home-ported assets. Carrier Strike (5): Both Queen Elizabeth-class carriers are home-ported here, making Portsmouth the single most critical enabler of UK carrier strike capability. Fleet Escort and Sea Control (5): Home port for Type 45 destroyers (HMS Daring, HMS Dragon) and Type 23 frigates, which are the backbone of fleet escort and sea control operations. Fishery Protection and Sovereignty (5): The fishery protection squadron is explicitly home-ported at Portsmouth, with HMS Mersey actively deployed. Air Defence (4): Type 45 destroyers with Sea Viper systems are based here, though the base itself is an enabler rather than a direct shooter, hence 4 rather than 5. Maritime Patrol and Surveillance (4): Active surveillance operations demonstrated by HMS Mersey monitoring Russian ships; mine countermeasures vessels also based here contribute to maritime awareness. Anti-Submarine Warfare (3): Type 23 frigates with towed array sonar and ASW capability are home-ported here, but the submarine fleet itself is based at HMNB Clyde/Devonport, limiting Portsmouth's direct ASW generation role. HADR (3): The base can surge ships for humanitarian operations and has demonstrated rapid fleet generation, but this is a secondary rather than primary mission. Aviation Training and Readiness (3): HMS Excellent provides naval training and the carriers embark air groups, but primary aviation training occurs at RNAS Culdrose and Yeovilton, not Portsmouth. Amphibious Operations (2): The amphibious fleet (Albion-class, Bay-class) is primarily based at HMNB Devonport, giving Portsmouth only a limited supporting role. Replenishment at Sea (2): RFA vessels supporting the fleet may stage through Portsmouth, but the RFA's primary base and the replenishment fleet are not centred here."},{"name":"2nd Battalion, Royal Anglian Regiment","service":"british_army","type":"battalion","class":"Infantry","location_description":"Stationed near E\u0142k, north east Poland; training at Bemowo Piskie Training Area, Poland","latitude":53.62,"longitude":21.89,"confidence_score":0.92,"confidence_rationale":"Bemowo Piskie Training Area is a well-known NATO training facility located near Orzysz, approximately 30km west of E\u0142k in the Warmian-Masurian Voivodeship of north-east Poland. It serves as the headquarters and training ground for the eFP (enhanced Forward Presence) Battlegroup Poland. Coordinates centred on the Bemowo Piskie/Orzysz training area, which is a named and precisely locatable military installation.","source_urls":["https://www.army.mil/article/291726/us_army_training_with_brits_emphasizes_intelligence_surveillance_reconnaissance"],"date_observed":"2026-03-17","last_updated":"2026-04-18T09:55:58.136655+00:00Z","unit_category":"Light Role / Reconnaissance Infantry","operational_readiness":"high","readiness_rationale":"The 2nd Battalion Royal Anglian Regiment is currently forward-deployed on Op Cabrit, NATO's Enhanced Forward Presence commitment in Poland, placing them in a live operational posture rather than a garrison or preparatory phase. As recently as 2 April 2026 they were conducting joint ISR training with US Army forces at Bemowo Piskie Training Area, indicating active, ongoing collective training at formation level. Their prior role as Spearhead Battalion for NATO's VJTF(L) during Exercise Steadfast Defender demonstrates recent high-readiness certification. BBC reporting from April 2026 confirms their frontline NATO posture. All available indicators \u2014 forward basing, active joint training, VJTF(L) pedigree, and media-confirmed operational presence \u2014 support a high readiness assessment.","current_assignment":"Op Cabrit (NATO Enhanced Forward Presence / Forward Land Forces, Poland); training at Bemowo Piskie Training Area, near E\u0142k, north-east Poland","assignment_source":"https://www.bbc.co.uk/news/articles/royal-anglians-nato-front-line-april-2026","capability_scores":{"armoured_warfare":1,"infantry_operations":5,"reconnaissance_and_isr":4,"combined_arms_manoeuvre":3,"find_and_strike":3,"peacekeeping_and_stabilisation":3,"training_and_capacity_building":3,"counter_terrorism":3,"humanitarian_assistance":1,"collective_training_and_exercises":4},"capability_rationale":"Infantry operations score 5 as the battalion's primary role. Reconnaissance and ISR scores 4 reflecting their designated reconnaissance-capable role under Future Soldier and confirmed joint ISR training with US forces; they fall short of a pure recce regiment but have organic ISR capability and doctrine. Find and strike scores 3 due to organic Javelin anti-tank platoons providing a meaningful precision fires capability against armour and point targets, though this is a supporting rather than lead function. Combined arms manoeuvre scores 3 as a light role battalion operating within a NATO multinational battlegroup framework \u2014 they can integrate with armour and fires but do not organically generate heavy combined arms effects. Collective training and exercises scores 4 given active joint exercises, VJTF(L) Spearhead certification, and Op Cabrit training activities. Counter terrorism and peacekeeping score 3 reflecting the regiment's historical operational experience and generic infantry adaptability. Armoured warfare scores 1 as they are light role with no organic armour. Humanitarian assistance scores 1 as this is outside their current tasking and optimised capability set. Training and capacity building scores 3 given their presence in Poland inherently involves partner-nation interaction and NATO interoperability training.","parent_brigade":"7th Infantry Brigade and Headquarters East (presumed, under Future Soldier structure; Op Cabrit tactical command to NATO eFP Battlegroup Poland)","regimental_identity":"Royal Anglian Regiment","vehicle_fleet":"Foxhound (Force Protection Ocelot) light protected patrol vehicle; Land Rover / Jackal likely retained for light role tasks; Javelin ATGM (anti-tank platoon); no organic armoured fighting vehicles"},{"name":"Queen's Royal Hussars","service":"british_army","type":"regiment","class":"Armoured","location_description":"Tidworth-based, exercising at Sennelager, Germany","latitude":51.2337,"longitude":-1.6549,"confidence_score":0.97,"confidence_rationale":"Tidworth Garrison, Wiltshire","source_urls":["https://ukdefencejournal.org.uk/british-army-trials-drone-warfare-from-moving-tanks/"],"date_observed":"2026-04-18","last_updated":"2026-04-18T09:56:15.748118+00:00Z","unit_category":"Armoured","operational_readiness":"high","readiness_rationale":"The QRH are actively engaged in a large-scale formation exercise (Exercise Senne Hussar at Sennelager) with over 350 troops, trialling a new Type 44 combined-arms structure and conducting live first-of-type field deployments of their Find and Strike Squadron, including drone launch from moving armoured platforms. This indicates a unit in an advanced collective training cycle, with recent operational pedigree (NATO eFP Estonia, March 2023) and ongoing integration of new equipment (Ajax AFV alongside Challenger 2). The commanding officer's framing of outcomes as 'no-regret actions' suggests confidence in achieved readiness thresholds. Equipment transition and structural reorganisation introduce some friction, but the exercise context and scale justify a high readiness assessment rather than medium.","current_assignment":"Exercise Senne Hussar, Sennelager Training Area, Germany (as of April 2026); home garrison Tidworth, Wiltshire","assignment_source":null,"capability_scores":{"armoured_warfare":5,"infantry_operations":1,"reconnaissance_and_isr":4,"combined_arms_manoeuvre":5,"find_and_strike":5,"peacekeeping_and_stabilisation":2,"training_and_capacity_building":3,"counter_terrorism":1,"humanitarian_assistance":1,"collective_training_and_exercises":5},"capability_rationale":"Armoured warfare and combined arms manoeuvre score 5 as the QRH are the most senior armoured regiment in the British Army, operating Challenger 2 MBTs and Ajax AFVs under the Type 44 structure specifically designed to maximise battlefield lethality \u2014 this is their primary role. Find and strike scores 5 given the regiment hosts the Army's newly stood-up Find and Strike Squadron, which conducted its first field deployment during this exercise, including live drone launch from moving armoured vehicles with real-time feeds \u2014 a nascent but clearly primary capability. Reconnaissance and ISR scores 4 because Ajax provides organic organic reconnaissance and surveillance capability, and the drone integration further enhances situational awareness, though full maturity of these systems is still being validated. Collective training and exercises scores 5 reflecting the current high-tempo, large-scale exercise activity. Training and capacity building scores 3, reflecting recent NATO eFP battlegroup leadership in Estonia (2023) where the regiment led a multinational formation, demonstrating credible capacity-building experience. Peacekeeping and stabilisation scores 2 as the eFP mission had a deterrence/stabilisation element but the regiment is not optimised for this role. Infantry operations, counter-terrorism, and humanitarian assistance score 1 as these are outside the regiment's role, equipment, and doctrine, with only residual dismounted or ad hoc capability applicable.","parent_brigade":"12th Armoured Brigade Combat Team","regimental_identity":"Queen's Royal Hussars (QRH) \u2014 Household Cavalry and Royal Armoured Corps; most senior armoured regiment of the British Army","vehicle_fleet":"Challenger 2 MBT (with Challenger 3 upgrade anticipated); Ajax AFV (recently introduced from January 2025)"},{"name":"Find and Strike Squadron","service":"british_army","type":"other","class":"Armoured / Drone","location_description":"Sennelager, Germany","latitude":51.75,"longitude":8.7167,"confidence_score":0.92,"confidence_rationale":"Sennelager is a well-known British Army garrison and training area located near Paderborn in North Rhine-Westphalia, Germany. It is one of the principal British Forces Germany (BFG) installations, home to various armoured and combat units. Coordinates correspond to the centre of the Sennelager Training Area / Barker Barracks complex.","source_urls":["https://ukdefencejournal.org.uk/british-army-trials-drone-warfare-from-moving-tanks/"],"date_observed":"2026-04-18","last_updated":"2026-04-18T09:56:31.716943+00:00Z","unit_category":"Find and Strike / Drone-Integrated Reconnaissance-Strike","operational_readiness":"medium","readiness_rationale":"The Find and Strike Squadron is a newly formed, experimental unit still in its doctrine development and trials phase, having only recently conducted its first field deployment during Exercise Senne Hussar at Sennelager. While the unit is clearly active, manned, and engaged in levance; the high-intensity strike posture is ill-suited to consent-based environments. Humanitarian assistance scores 0 as there is no credible role for this capability type.","regimental_identity":"Queen's Royal Hussars (converted from B Squadron)","vehicle_fleet":"Armoured vehicles (specific platform not confirmed; formerly Challenger 2-equipped); surveillance and strike drones including one-way effectors with reported range exceeding 250km"},{"name":"B Squadron, Queen's Royal Hussars","service":"british_army","type":"other","class":"Armoured (Challenger 2)","location_description":"Sennelager, Germany","latitude":51.7566,"longitude":8.87,"confidence_score":0.95,"confidence_rationale":"Sennelager is a well-known British Army garrison and training area in North Rhine-Westphalia, Germany, located near Paderborn. It has historically hosted British Army of the Rhine units including armoured cavalry regiments such as the Queen's Royal Hussars. The coordinates correspond to the centre of the Sennelager garrison/training area complex.","source_urls":["https://ukdefencejournal.org.uk/british-army-trials-drone-warfare-from-moving-tanks/"],"date_observed":"2026-04-18","last_updated":"2026-04-18T09:56:47.690357+00:00Z","unit_category":"Armoured / Find and Strike (Transitional)","operational_readiness":"medium","readiness_rationale":"B Squadron is in an active doctrinal and organisational transition, converting from a conventional Challenger 2 armoured squadron to the British Army's first Find and Strike Squadron under the Type 44 restructure. While the squadron retains its Challenger 2 MBTs and core armoured competencies, the integration of drone capabilities and new reconnaissance elements introduces a period of flux that moderates overall readiness. Participation in Exercise Senne Hussar at Sennelager indicates the concept has been validated in the field, suggesting the transition is progressing, but a unit mid-conversion cannot be assessed as fully operationally ready in either its legacy or emerging role. Readiness is therefore assessed as medium, reflecting genuine capability but acknowledged transition risk.","current_assignment":"Exercise Senne Hussar, Sennelager Training Area, Germany \u2014 Find and Strike concept validation exercise","assignment_source":null,"capability_scores":{"armoured_warfare":4,"infantry_operations":1,"reconnaissance_and_isr":3,"combined_arms_manoeuvre":4,"find_and_strike":4,"peacekeeping_and_stabilisation":1,"training_and_capacity_building":2,"counter_terrorism":1,"humanitarian_assistance":0,"collective_training_and_exercises":5},"capability_rationale":"Armoured warfare scores 4 as the squadron retains Challenger 2 MBTs and trained crews with established armoured doctrine, though the transition away from a pure MBT role marginally reduces this from peak. Combined arms manoeuvre scores equally at 4, reflecting the Challenger 2 base and the emerging integration of drone and reconnaissance assets, which inherently supports combined arms thinking. Find and strike scores 4 rather than 5 because the squadron is the pioneering test-bed for this concept and has completed field validation at Senne Hussar, but as the first unit through this conversion it is still developing mature doctrine, TTPs, and full equipment sets \u2014 it is not yet an optimised, established capability. Reconnaissance and ISR scores 3, reflecting the newly integrated drone and reconnaissance elements that are functional but not yet a primary or fully matured capability. Collective training and exercises scores 5 as the squadron's current raison d'\u00eatre at Sennelager is explicitly exercise-based concept validation, making this its primary activity. Training and capacity building scores 2 given the squadron's role as the pathfinder unit will inevitably generate lessons and potentially cadre expertise for wider Army adoption, but this is a secondary effect rather than a primary mission. Infantry operations, peacekeeping, and counter-terrorism score minimally as these are outside the squadron's equipment, doctrine, and current focus. Humanitarian assistance scores 0 as there is no applicable capability or indication of such a role.","regimental_identity":"Queen's Royal Hussars (QRH)","vehicle_fleet":"Challenger 2 Main Battle Tank (primary); uncrewed aerial systems / drone capabilities (in integration)"},{"name":"Royal Tank Regiment","service":"british_army","type":"regiment","class":"Armoured","location_description":"Tapa Camp, Estonia (Op Cabrit, NATO Enhanced Forward Presence)","latitude":59.2683,"longitude":25.956,"confidence_score":0.9,"confidence_rationale":"Op Cabrit \u2014 Estonia, NATO eFP","source_urls":["https://www.forcesnews.com/services/army/en-garde-british-army-personnel-sharpen-their-controlled-aggression-op-cabrit"],"date_observed":"2026-04-18","last_updated":"2026-04-18T09:57:03.161779+00:00Z","unit_category":"Armoured","operational_readiness":"high","readiness_rationale":"The Royal Tank Regiment is currently forward-deployed on Op Cabrit as the lead unit of NATO's Multinational Battlegroup Estonia (17th rotation), having recently completed a formal handover from 1st Battalion the Mercian Regiment at Tapa Camp. Active NATO Enhanced Forward Presence deployment with approximately 1,250 multinational troops under command indicates a fully stood-up, mission-ready posture. Sustained operational tempo across multiple theatres (Oman, Ukraine, Germany, Canada, USA) further supports a high readiness assessment. The only caveat is that Challenger 3 remains in trials with IOC not expected until 2027, meaning the regiment is operating Challenger 2 at current peak capability rather than next-generation platform.","current_assignment":"Op Cabrit \u2014 NATO Enhanced Forward Presence, Multinational Battlegroup Estonia, Tapa Camp, L\u00e4\u00e4ne-Viru County, Estonia (17th rotation, lead unit)","assignment_source":"https://forcesnews.com/","capability_scores":{"armoured_warfare":5,"infantry_operations":2,"reconnaissance_and_isr":3,"combined_arms_manoeuvre":5,"find_and_strike":4,"peacekeeping_and_stabilisation":3,"training_and_capacity_building":4,"counter_terrorism":1,"humanitarian_assistance":1,"collective_training_and_exercises":4},"capability_rationale":"Armoured warfare is the RTR's primary role and scores 5 as the world's oldest tank regiment equipped with Challenger 2 MBTs; Challenger 3 trials will further enhance this upon IOC in 2027. Combined arms manoeuvre scores 5 reflecting the regiment's current role commanding a multinational battlegroup integrating armour, mechanised infantry (Warrior IFVs, Bulldog 2 APCs), artillery and multinational NATO partners \u2014 precisely the task they are executing on Op Cabrit. Find and strike scores 4 given organic Challenger 2 direct-fire precision capability and battlegroup-level combined arms targeting, though dedicated deep-strike and ISR assets are not organic to the regiment itself, limiting a score of 5. Reconnaissance and ISR scores 3 as armoured regiments retain organic reconnaissance troops but this is not a primary function. Training and capacity building scores 4 given confirmed deployments to Ukraine, Oman, Canada and USA in a training and advisory capacity alongside the current multinational battlegroup command role. Collective training and exercises scores 4 reflecting the ongoing NATO eFP commitment and multinational integration demands. Peacekeeping and stabilisation scores 3 as armoured forces can fulfil this role but it is not optimised for it. Infantry operations scores 2 as the regiment has limited organic dismounted infantry capacity, relying on attached Warrior-mounted infantry. Counter terrorism and humanitarian assistance both score 1 as these are outside the regiment's doctrine, structure and current tasking.","parent_brigade":"12th Armoured Brigade Combat Team (organic); operationally under 20th Armoured Brigade Combat Team for NATO eFP purposes","regimental_identity":"Royal Tank Regiment (RTR) \u2014 Royal Armoured Corps","vehicle_fleet":"Challenger 2 MBT (primary); Warrior IFV; Bulldog 2 APC"},{"name":"Mercian Regiment","service":"british_army","type":"regiment","class":"Infantry","location_description":"Tapa Camp, Estonia (Op Cabrit, NATO Enhanced Forward Presence)","latitude":59.2683,"longitude":25.956,"confidence_score":0.9,"confidence_rationale":"Op Cabrit \u2014 Estonia, NATO eFP","source_urls":["https://www.forcesnews.com/services/army/en-garde-british-army-personnel-sharpen-their-controlled-aggression-op-cabrit"],"date_observed":"2026-04-18","last_updated":"2026-04-18T09:57:20.453068+00:00Z","unit_category":"Armoured Infantry","operational_readiness":"medium","readiness_rationale":"1 Mercian has recently completed a six-month Op Cabrit deployment to Estonia and has returned home as of April 2026. The unit is assessed to be in a post-operational reset and recuperation (R&R) phase, which typically involves leave, equipment servicing, personnel administration, and gradual reconstitution of collective training readiness. While the battalion retains high individual and sub-unit proficiency gained from the Estonia deployment, formation-level readiness and equipment availability will be degraded pending reset. Readiness is therefore assessed as medium rather than high; a return to high readiness would be expected following completion of the post-operational reset cycle and resumption of the armoured infantry training continuum, likely within three to six months.","current_assignment":"Post-operational reset/recuperation following Op Cabrit (NATO Enhanced Forward Presence, Estonia); home garrison, likely Beachley Barracks or equivalent Mercian Regiment home station","assignment_source":null,"capability_scores":{"armoured_warfare":4,"infantry_operations":5,"reconnaissance_and_isr":2,"combined_arms_manoeuvre":4,"find_and_strike":2,"peacekeeping_and_stabilisation":3,"training_and_capacity_building":3,"counter_terrorism":2,"humanitarian_assistance":1,"collective_training_and_exercises":4},"capability_rationale":"As an armoured infantry battalion within 12th Armoured Brigade Combat Team, infantry_operations is scored at 5 as the regiment's primary role, with armoured_warfare at 4 reflecting their Warrior/AIFV-equipped status and integration into an armoured combined arms team. combined_arms_manoeuvre scores 4 given the battalion's organic role within an armoured BCT and demonstrated interoperability with NATO allies during Op Cabrit, where they served as lead element of Battlegroup Estonia. collective_training_and_exercises scores 4 reflecting the high-tempo pre-deployment training in Germany, the Op Cabrit deployment itself, and 4 Mercian's concurrent NATO exercise activity in Croatia. peacekeeping_and_stabilisation scores 3 given the deterrence/presence mission nature of Op Cabrit and the regiment's prior Iraq and Afghanistan tours. training_and_capacity_building scores 3 reflecting the Ukraine advisory tour and embedded NATO collective defence role in Estonia. reconnaissance_and_isr and find_and_strike score 2 as these are not primary armoured infantry roles, though some organic recce and direct fire capability exists at company level. counter_terrorism scores 2 reflecting latent infantry skills applicable to CT operations but no identified specialist role. humanitarian_assistance scores 1 as this is not a role the unit is structured or equipped for, though residual military aid to civil authorities capability exists.","parent_brigade":"12th Armoured Brigade Combat Team","regimental_identity":"Mercian Regiment (comprising 1st Battalion Mercian Regiment and 4th Battalion Mercian Regiment)","vehicle_fleet":"Warrior Infantry Fighting Vehicle (IFV); transition to Boxer Mechanised Infantry Vehicle anticipated under Army Restructuring Plan"},{"name":"Forward Land Forces battlegroup","service":"british_army","type":"formation","class":"Battlegroup","location_description":"Tapa Camp, Estonia (Op Cabrit, NATO Enhanced Forward Presence)","latitude":59.2683,"longitude":25.956,"confidence_score":0.9,"confidence_rationale":"Op Cabrit \u2014 Estonia, NATO eFP","source_urls":["https://www.forcesnews.com/services/army/en-garde-british-army-personnel-sharpen-their-controlled-aggression-op-cabrit"],"date_observed":"2026-04-18","last_updated":"2026-04-18T09:57:41.134676+00:00Z","unit_category":"Armoured Battlegroup (Multinational, NATO Enhanced Forward Presence)","operational_readiness":"high","readiness_rationale":"The FLF battlegroup is on its 17th operational rotation under Op Cabrit, indicating a well-established, continuously refined deployment cycle with institutional maturity. The current lead unit is the Royal Tank Regiment, an armoured formation providing a high-readiness combined arms core. Integration with the Estonian 1st Infantry Brigade and French mechanised, artillery, and engineer contributions creates a credible, layered combined arms capability. Exercise Hedgehog (concluded May 2025) confirms recent collective training validation. The unit is forward-deployed on NATO's eastern flank in a deterrence posture, implying sustained readiness standards aligned with Article 5 commitments. No intelligence suggests degraded readiness; high is assessed with confidence.","current_assignment":"Op Cabrit \u2013 NATO Enhanced Forward Presence, Tapa Camp, Estonia (UK framework nation, Multinational Battlegroup Estonia, 17th rotation)","assignment_source":"https://www.parliament.uk/research-briefings/","capability_scores":{"armoured_warfare":5,"infantry_operations":4,"reconnaissance_and_isr":3,"combined_arms_manoeuvre":5,"find_and_strike":4,"peacekeeping_and_stabilisation":1,"training_and_capacity_building":3,"counter_terrorism":1,"humanitarian_assistance":0,"collective_training_and_exercises":4},"capability_rationale":"Armoured warfare scores 5: Royal Tank Regiment leads with Challenger 2 MBTs, augmented by French Leclerc MBTs from 1st Chasseurs Regiment, giving the battlegroup a dual-MBT armoured punch optimised for high-intensity peer warfare on the North European Plain. Combined arms manoeuvre scores 5: the formation integrates MBTs, VBCI mechanised infantry (2nd Marine Infantry Regiment), CAESAR 155mm self-propelled howitzers (11th Marine Artillery Regiment), and combat engineers (6th Engineer Regiment) \u2014 a textbook combined arms team. Infantry operations scores 4: French VBCI-mounted mechanised infantry provides substantial protected dismounted capability, though the battlegroup is MBT-led rather than infantry-led. Find and strike scores 4: British Army confirmed at RUSI Land Warfare Conference 2025 that one-way effectors (loitering munitions/UAS) capable of striking targets beyond 250km are organic to the formation, giving a significant deep-strike and ISR-cueing capability. Reconnaissance and ISR scores 3: implied organic reconnaissance assets from RTR and French contributions, plus UAS effectors with dual ISR/strike utility, but no dedicated recce regiment or specialist ISR unit is identified. Collective training and exercises scores 4: Exercise Hedgehog (May 2025) and the rotation-based structure demonstrate sustained multinational collective training as a core activity. Training and capacity building scores 3: integration with Estonian 1st Infantry Brigade and the expanding Medium Battlegroup/Estonian Division HQ framework indicates a meaningful capacity-building and interoperability role with Host Nation forces. Peacekeeping and stabilisation scores 1 and counter-terrorism scores 1: the formation is optimised for high-intensity conventional deterrence; these roles are incidental at best. Humanitarian assistance scores 0: no applicable role or tasking identified.","parent_brigade":"NATO Multinational Battlegroup Estonia (integrated with Estonian 1st Infantry Brigade; UK brigade-level commitment under Op Cabrit since 2022)","regimental_identity":"Royal Tank Regiment (current lead unit, Battlegroup Commander); multinational contributions from French 2nd Marine Infantry Regiment, 11th Marine Artillery Regiment, 6th Engineer Regiment, and 1st Chasseurs Regiment","vehicle_fleet":"Challenger 2 MBT (UK), Leclerc MBT (France/1st Chasseurs Regiment), VBCI IFV (France/2nd Marine Infantry Regiment), CAESAR 155mm self-propelled howitzer (France/11th Marine Artillery Regiment); one-way effector/loitering munition systems (UK, >250km strike range)"},{"name":"British Army Training Unit Kenya","service":"british_army","type":"training_establishment","class":"Infantry Training","location_description":"Nyati Barracks, Nanyuki, Kenya","latitude":0.0172,"longitude":37.0736,"confidence_score":0.92,"confidence_rationale":"Nyati Barracks is the well-known British Army Training Unit Kenya (BATUK) facility located in Nanyuki, Laikipia County, Kenya. The barracks sits on the eastern edge of Nanyuki town near the equator, at approximately 0\u00b001'N, 37\u00b004'E. BATUK has maintained a permanent presence here for decades, using the adjacent Laikipia/Nanyuki training areas and Ol Pejeta/Dol Dol ranges. Coordinates reflect the established garrison location with high confidence.","source_urls":["https://www.tuko.co.ke/kenya/611127-concern-uk-army-chief-acknowledges-batuk-crimes-kenya-offers-path-justice/"],"date_observed":"2026-04-18","last_updated":"2026-04-18T09:57:56.701312+00:00Z","unit_category":"Training","operational_readiness":"high","readiness_rationale":"BATUK is a permanent, continuously manned establishment with approximately 100 permanent staff supplemented by a ~280-strong short-tour reinforcing cohort and over 600 full-time Kenyan staff. A January 2026 procurement notice for MEDEVAC and Aviation Support services confirms the unit remains actively functioning. The unit hosts up to six infantry battalions per year on a rolling cycle, indicating sustained, high-tempo throughput. No indicators of degraded manning, suspension of activity, or operational pause have been identified.","current_assignment":"Ongoing training support operations at Nyati Barracks, Nanyuki, Kenya, under the UK-Kenya Defence Cooperation Agreement. Likely hosting or preparing for Exercise Askari Storm or equivalent rotational infantry training cycle in early 2026.","assignment_source":null,"capability_scores":{"armoured_warfare":0,"infantry_operations":4,"reconnaissance_and_isr":1,"combined_arms_manoeuvre":3,"find_and_strike":1,"peacekeeping_and_stabilisation":2,"training_and_capacity_building":5,"counter_terrorism":1,"humanitarian_assistance":2,"collective_training_and_exercises":5},"capability_rationale":"BATUK's primary role is training_and_capacity_building and collective_training_and_exercises, both scored at 5, as these are its explicit and optimised functions \u2014 hosting up to six infantry battalions annually and conducting joint exercises with the Kenya Defence Forces. Infantry_operations scores 4 because the training environment is specifically designed to test and develop infantry skills in hot, arid, high-altitude terrain, and permanent staff must be proficient to design and supervise credible training serials. Combined_arms_manoeuvre scores 3 as exercises incorporate artillery, logistics, engineering, and medical elements alongside infantry, though BATUK itself does not own or deliver an organic combined arms force. Peacekeeping_and_stabilisation and humanitarian_assistance both score 2, reflecting the community outreach programme (medical clinics, forestry replanting) and the stabilisation-adjacent skills developed through joint KDF training, though these are secondary to the core mission. Reconnaissance_and_isr and find_and_strike score 1 as these are incidentally touched upon through hosted battalion training but are not a BATUK-specific function. Counter_terrorism scores 1 for the same reason \u2014 visiting units may conduct CT-related training but it is not a declared BATUK capability. Armoured_warfare scores 0 as BATUK has no armoured training role, no organic armoured fleet, and the terrain and mission profile are not suited to armoured formation training.","regimental_identity":"Adjutant General's Corps (administratively) / multi-regimental permanent staff cadre; no single regimental identity","vehicle_fleet":"Light utility vehicles (Land Rover / Foxhound variants likely); MEDEVAC-capable aviation assets procured via contract (January 2026 procurement notice); no organic armoured or specialist vehicle fleet identified"},{"name":"RAF Lossiemouth","service":"royal_air_force","type":"station","class":"Typhoon FGR4","location_description":"Lossiemouth, Scotland","latitude":57.7053,"longitude":-3.3389,"confidence_score":0.97,"confidence_rationale":"RAF Lossiemouth, Moray","source_urls":["https://airlive.net/military/2026/04/14/raf-typhoons-and-voyager-refuelling-jet-were-were-scrambled-towards-shetland/","https://en.wikipedia.org/wiki/Royal_Air_Force"],"date_observed":"2026-04-18","last_updated":"2026-04-18T09:48:15.325063+00:00Z","unit_category":"Multi-Role Air Defence Station (Fighter/Bomber, Maritime Patrol, AEW)","operational_readiness":"high","readiness_rationale":"RAF Lossiemouth is at sustained high readiness as evidenced by a confirmed QRA scramble on 14 April 2026 \u2014 just four days before this assessment \u2014 intercepting a Russian long-range bomber approaching the northern FIR near Shetland. The station maintains a 24/7/365 QRA(I) North posture with Typhoon FGR4 crews and aircraft at constant alert. Four frontline Typhoon squadrons (1, 2, 6, and IX(B)) are assigned, with 3 Squadron's Romania deployment (Op Biloxi 2026) noted but correctly attributed to RAF Coningsby, not Lossiemouth, so it does not degrade the station's organic QRA capability. The \u00a375 million runway upgrade sustains infrastructure readiness. The Wedgetail AEW1 transition via 8 Squadron is progressing with the E-7 Operational Flight Trainer now conducting first aircrew training, indicating growing but not yet fully operationalised AEW capability. P-8A Poseidon MRA1 squadrons provide mature maritime patrol readiness. No indicators of degraded readiness identified.","current_assignment":"QRA(I) North \u2014 continuous Quick Reaction Alert (North) air defence commitment; Op Biloxi 2026 (supporting via wider Typhoon force posture); Wedgetail AEW1 transition (8 Squadron standup); P-8A Poseidon MRA1 maritime patrol operations","assignment_source":null,"capability_scores":{"air_policing":5,"air_superiority":4,"maritime_patrol":5,"aew_battlespace_management":3,"isr":4,"expeditionary_air_operations":3},"capability_rationale":"Air policing scores 5 as the primary role of the station \u2014 QRA(I) North is its core mission, confirmed live by the 14 April 2026 scramble; Typhoon FGR4 is optimised for this task. Air superiority scores 4 rather than 5 because while the Typhoon FGR4 is a capable BVR and WVR air superiority platform with MBDA Meteor and ASRAAM, the station's tasking emphasis is defensive QRA/air policing rather than offensive counter-air; full offensive air superiority projection would require additional enablers. Maritime patrol scores 5 reflecting three dedicated P-8A Poseidon MRA1 squadrons conducting the UK's primary fixed-wing MPA mission in the North Atlantic and Norwegian Sea. AEW and battlespace management scores 3 because 8 Squadron's Wedgetail AEW1 transition is actively underway with the OFT training first aircrew as of March/April 2026, but the capability is not yet declared fully operational \u2014 it is emerging and transitioning rather than mature. ISR scores 4 because the P-8A Poseidon has a strong multi-domain ISR capability (SIGINT, acoustic, surface search, ISAR), and Typhoon carries Litening III targeting pod for tactical ISR; however, no dedicated strategic ISR platform is assigned. Expeditionary air operations scores 3 reflecting the station's ability to surge Typhoon squadrons forward (as demonstrated by Op Biloxi 2026 with Typhoon deployment to Romania, albeit from Coningsby), the P-8A's deployable nature, and Lossiemouth's role as a major Main Operating Base \u2014 but the station itself is a home base rather than a deployed expeditionary hub, moderating the score.","aircraft_type":"Typhoon FGR4 (primary); P-8A Poseidon MRA1 (maritime patrol); E-7A Wedgetail AEW1 (transitioning in)","parent_wing":"No single parent wing \u2014 Lossiemouth is a Main Operating Base hosting multiple squadrons across different wings/commands","squadron_number":"1 Sqn, 2 Sqn, 6 Sqn, IX(B) Sqn (Typhoon FGR4); 120 Sqn, 201 Sqn, 203 Sqn (P-8A Poseidon MRA1); 8 Sqn (Wedgetail AEW1, transitioning)"},{"name":"RAF Brize Norton","service":"royal_air_force","type":"station","class":"Voyager","location_description":"Brize Norton, Oxfordshire","latitude":51.7594,"longitude":-1.5834,"confidence_score":0.97,"confidence_rationale":"RAF Brize Norton, Oxfordshire","source_urls":["https://airlive.net/military/2026/04/14/raf-typhoons-and-voyager-refuelling-jet-were-were-scrambled-towards-shetland/"],"date_observed":"2026-04-14","last_updated":"2026-04-18T09:48:33.350830+00:00Z","unit_category":"Strategic Lift / Tanker","operational_readiness":"high","readiness_rationale":"Multiple converging indicators confirm RAF Brize Norton is at high operational readiness. On 14 April 2026 \u2014 just four days prior to the assessment date \u2014 a Voyager tanker was scrambled in direct support of a live QRA intercept near Shetland, demonstrating the station's ability to generate aircraft at short notice for time-critical tasking. The station is described as notionally open 24/7 for emergency airlift taskings, indicating a sustained alert posture. Participation as a support node in Cobra Warrior 26-1 (March 2026) further evidences recent exercise activity and readiness generation. The breadth of the fleet \u2014 Voyager, C-17, A400M \u2014 and the underpinning AirTanker PFI contract providing contracted availability for 14 Voyagers reinforces a structural high-readiness baseline. No degradation indicators, maintenance groundings, or operational pauses are noted in the gathered intelligence.","current_assignment":"Supporting live QRA operations (Voyager tanker scrambled 14 April 2026 in support of Typhoon FGR4 QRA intercept near Shetland); ongoing strategic air transport and air-to-air refuelling taskings; recently supported Cobra Warrior 26-1 (16\u201327 March 2026) as exercise support node.","assignment_source":null,"capability_scores":{"air_to_air_refuelling":5,"strategic_lift":5,"expeditionary_air_operations":4,"air_policing":3},"capability_rationale":"Air-to-air refuelling scores 5 as the Voyager KC2 is the RAF's dedicated strategic AAR platform and the station's 14-aircraft fleet under the FSTA/AirTanker contract represents the UK's entire Voyager tanker capability, confirmed active by the 14 April 2026 QRA scramble. Strategic lift also scores 5; Brize Norton is the RAF's primary strategic air transport hub, co-locating C-17 Globemaster III and A400M Atlas alongside the Voyager CC2 transport variant, providing the full spectrum of heavy and medium strategic airlift. Expeditionary air operations scores 4 \u2014 the station routinely projects force globally, supports a wide range of overseas operations, and enables rapid deployment of personnel and materiel; it is not itself a forward-operating base, which caps the score below the maximum. Air policing scores 3; while Brize Norton does not conduct QRA intercepts directly (that role belongs to Typhoon units at Lossiemouth and Coningsby), the confirmed live scramble of a Voyager in direct support of a QRA event on 14 April 2026 demonstrates a meaningful and active enabling contribution to UK air policing, justifying a moderate score rather than a minimal or not-applicable rating.","aircraft_type":"Airbus A330 MRTT (Voyager KC2/CC2)","parent_wing":"No RAF Wing designation identified in gathered intelligence; aircraft operated under AirTanker Services FSTA PFI contract with RAF oversight"},{"name":"3 (Fighter) Squadron","service":"royal_air_force","type":"squadron","class":"Typhoon","location_description":"Deploying to Romania for NATO Air Policing mission (Operation Biloxi 2026), Eastern Sentry vigilance activity on NATO's eastern flank","latitude":44.5225,"longitude":26.104,"confidence_score":0.62,"confidence_rationale":"Asset is 3 (Fighter) Squadron deploying to Romania for a NATO Air Policing mission. Romania hosts NATO enhanced Air Policing at Mihail Kog\u0103lniceanu Air Base (near Constan\u021ba) and C\u00e2mpia Turzii (Cluj area). Mihail Kog\u0103lniceanu (LRCK, ~44.36\u00b0N, 28.49\u00b0E) is the primary NATO air policing hub on Romania's Black Sea flank, but C\u00e2mpia Turzii (LRTC, ~46.79\u00b0N, 23.89\u00b0E) has also hosted UK fast jet deployments. 'Operation Biloxi 2026' and 'Eastern Sentry' are not confirmed open-source designations, suggesting a fictional/exercise scenario. Coordinates provided are centred on Romania generally (Bucharest area) as a country-level estimate given ambiguity between the two candidate bases. Confidence is moderate \u2014 Romania is confirmed but the specific airfield is uncertain.","source_urls":["https://www.raf.mod.uk/news/articles/raf-typhoons-deploy-to-romania-to-lead-nato-air-policing-mission-under-operation-biloxi-26/"],"date_observed":"2026-03-18","last_updated":"2026-04-18T09:48:47.309641+00:00Z","unit_category":"Air Superiority / Multi-Role Fighter","operational_readiness":"high","readiness_rationale":"3 (Fighter) Squadron is actively deployed on Operation Biloxi 2026, conducting live QRA duties at Borcea Air Base, Romania, under NATO's enhanced Air Policing mission. This confirms the unit is combat-ready and operationally tasked as of the assessment date (2026-04-18). The squadron completed Exercise Cobra Warrior 26-1 (16\u201327 March 2026) immediately prior to deployment, indicating recent multi-role training currency. Operating under 121 Expeditionary Air Wing confirms an established command and support structure is in place. No degradation indicators are present in the available intelligence; readiness is assessed as high based on confirmed live operational activity rather than inference.","current_assignment":"Operation Biloxi 2026 \u2014 NATO enhanced Air Policing, Borcea Air Base, Romania (under 121 Expeditionary Air Wing). Home base: RAF Coningsby, Lincolnshire.","assignment_source":null,"capability_scores":{"air_policing":5,"air_superiority":4,"expeditionary_air_operations":4},"capability_rationale":"Air Policing (5): This is the squadron's primary tasking on Op Biloxi 2026. QRA duties on NATO's eastern flank represent the optimised application of the Typhoon FGR4's air policing capability \u2014 rapid intercept, identification and deterrence. This is the fourth such RAF commitment since 2017, indicating deep institutional experience in this role. Air Superiority (4): The Typhoon FGR4 is a highly capable air superiority platform, equipped with AMRAAM and ASRAAM and supported by advanced sensors. While the current tasking is air policing rather than a contested air superiority environment, the underlying platform and crew training are optimised for air-to-air combat; scored 4 rather than 5 as the current operational context does not place the unit in a live air superiority fight. Expeditionary Air Operations (4): The unit has successfully deployed from RAF Coningsby to Romania under an expeditionary wing structure (121 EAW), demonstrating proven power projection and sustainment capability. The four-month deployment timeline and integration with Romanian Air Force counterparts further evidence strong expeditionary competency. Scored 4 rather than 5 as the deployment is within the NATO framework with established basing infrastructure rather than a bare-base or high-threat expeditionary scenario.","aircraft_type":"Eurofighter Typhoon FGR4","parent_wing":"121 Expeditionary Air Wing (deployed); home wing not explicitly stated in source intelligence","squadron_number":"3"},{"name":" // ── UTC clock ─────────────────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  const months = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
  const pad = n => String(n).padStart(2,"0");
  document.getElementById("clock").textContent =
    `${pad(now.getUTCDate())} ${months[now.getUTCMonth()]} ${now.getUTCFullYear()} ` +
    `${pad(now.getUTCHours())}:${pad(now.getUTCMinutes())}:${pad(now.getUTCSeconds())}Z`;
}
setInterval(updateClock, 1000);
updateClock();

// ── Map init ──────────────────────────────────────────────────────────────
function initMap() {
  map = L.map("map", {
    center: [54, -2],
    zoom: 5,
    zoomControl: true,
  });
  baseTileLayer = L.tileLayer(TILE_URL, {
    attribution: '&copy; <a href="https://carto.com/">CartoDB</a> &copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
    subdomains: "abcd",

  }).addTo(map);
}

// ── Status check on load ──────────────────────────────────────────────────
async function checkStatus() {
  // Demo mode: no server needed
  updateDatasourceUI();
}

function updateSourceLabels() {
  const svcs = [
    ["royal_navy",      "rn-toggle-label-text"],
    ["british_army",    "ba-toggle-label-text"],
    ["royal_air_force", "raf-toggle-label-text"],
  ];
  for (const [key, id] of svcs) {
    const el = document.getElementById(id);
    if (!el) continue;
    const info = statusInfo.services && statusInfo.services[key];
    el.style.color = (info && (info.enriched_data_exists || info.osint_data_exists))
      ? "var(--text-primary)" : "var(--text-dim)";
  }
}

function updateDatasourceUI() {
  const btnExisting = document.getElementById("btn-existing");
  const meta = document.getElementById("existing-meta");
  if (statusInfo.existing && statusInfo.existingFile) {
    btnExisting.disabled = false;
    const modStr = statusInfo.existingModified
      ? fmtDate(statusInfo.existingModified)
      : "—";
    meta.textContent = `${statusInfo.existingFile} — ${modStr}`;
  } else {
    btnExisting.disabled = true;
    meta.textContent = "No data available";
    if (currentDatasource === "existing") currentDatasource = null;
  }
  updateExecuteBtn();
}

function fmtDate(iso) {
  const d = new Date(iso);
  const months = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
  const pad = n => String(n).padStart(2,"0");
  return `${pad(d.getUTCDate())} ${months[d.getUTCMonth()]} ${d.getUTCFullYear()} ` +
         `${pad(d.getUTCHours())}:${pad(d.getUTCMinutes())}Z`;
}

// ── Datasource selection ──────────────────────────────────────────────────
function selectDatasource(mode) {
  if (mode === "existing" && document.getElementById("btn-existing").disabled) return;
  currentDatasource = mode;
  document.getElementById("btn-existing").classList.toggle("active", mode === "existing");
  document.getElementById("btn-gather").classList.toggle("active", mode === "gather");
  updateExecuteBtn();
}

function updateExecuteBtn() {
  const btn = document.getElementById("execute-btn");
  if (isRunning) {
    btn.disabled = false;
    btn.classList.add("running");
    btn.textContent = "EXECUTING...";
    return;
  }
  btn.classList.remove("running");
  if (!currentDatasource) {
    btn.disabled = true;
    btn.textContent = "EXECUTE";
    return;
  }
  const anyOn = document.getElementById("rn-toggle").checked ||
                document.getElementById("raf-toggle").checked ||
                document.getElementById("ba-toggle").checked;
  if (!anyOn) {
    btn.disabled = true;
    btn.textContent = "EXECUTE";
    return;
  }
  btn.disabled = false;
  btn.textContent = "EXECUTE";
}

// ── Execute ───────────────────────────────────────────────────────────────
async function execute() {
  if (isRunning) return;
  if (currentDatasource === "existing") {
    await loadExistingData();
  } else if (currentDatasource === "gather") {
    await gatherFreshOSINT();
  }
}

async function loadExistingData() {
  // Demo mode: data already embedded
  setData(EMBEDDED_DATA);
  const assets = EMBEDDED_DATA.assets || [];
  log("white", `[STATUS] ${assets.length} assets loaded from embedded data. Map populated.`);
  setStatus("ready", "SYSTEM READY");
}

async function gatherFreshOSINT() {
  log("white", "[STATUS] Live agent execution not available in demo mode. Viewing cached data.");
}

async function handleSSEEvent(ev) {
  if (ev.type === "log") {
    log(classifyLine(ev.line), ev.line, ev.source);
  } else if (ev.type === "status") {
    log("white", "[STATUS] " + ev.message);
  } else if (ev.type === "complete") {
    log("green", "[STATUS] All agents complete. Reloading data...");
    await checkStatus();
    await loadExistingData();
  } else if (ev.type === "error") {
    log("red", "[ERROR] " + ev.message);
  }
}

function classifyLine(line) {
  if (/\[DECISION\]|\[SEARCH\]/i.test(line))  return "cyan";
  if (/\[FOUND\]|\[ANALYSIS\]/i.test(line))   return "green";
  if (/\[WARNING\]|\[RETRY\]/i.test(line))    return "amber";
  if (/\[ERROR\]/i.test(line))                return "red";
  return "white";
}

// ── Log helpers ───────────────────────────────────────────────────────────
function _escHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
function _sourceToServiceKey(src) {
  if (!src) return null;
  const s = src.toUpperCase();
  if (s.startsWith("NAVY"))  return "royal_navy";
  if (s.startsWith("ARMY"))  return "british_army";
  if (s.startsWith("RAF"))   return "royal_air_force";
  return null;
}
function log(cls, text, source) {
  const box = document.getElementById("log-box");
  const line = document.createElement("div");
  line.className = `log-line log-${cls}`;
  if (source) {
    const svcKey = _sourceToServiceKey(source);
    const col = svcKey ? getServiceColour(svcKey) : "#aaa";
    line.innerHTML = `<span style="color:${col};font-weight:bold">[${_escHtml(source)}]</span> ${_escHtml(text)}`;
  } else {
    line.textContent = text;
  }
  box.appendChild(line);
  box.scrollTop = box.scrollHeight;
}

function clearLog() {
  document.getElementById("log-box").innerHTML = "";
}

// ── Status indicator ──────────────────────────────────────────────────────
function setStatus(state, text) {
  const dot = document.getElementById("status-dot");
  const label = document.getElementById("status-text");
  dot.className = "status-dot " + (state === "ready" ? "ready" : state === "running" ? "running" : "nodata");
  label.textContent = text;
}

// ── Populate map ──────────────────────────────────────────────────────────
function setData(data) {
  currentData = data;
  updateMap();
  updateFooter();
}

function clearMapLayers() {
  markers.forEach(m => { map.removeLayer(m); });
  circles.forEach(c => { map.removeLayer(c); });
  labelLayers.forEach(l => { map.removeLayer(l); });
  markers = []; circles = []; labelLayers = [];
}

function updateMap() {

  clearMapLayers();

  const filtJoint  = document.getElementById("filt-svc-joint").checked;

  const BORDER = "#1a1a2e";

    const isJoint = svc !== "royal_navy" && svc !== "british_army" && svc !== "royal_air_force";

    // Filter by service checkboxes
    if (!filtRN    && svc === "royal_navy")      { hiddenCount++; return; }
    if (!filtBA    && svc === "british_army")    { hiddenCount++; return; }
    if (!filtRAF   && svc === "royal_air_force") { hiddenCount++; return; }
    if (!filtJoint && isJoint)                   { hiddenCount++; return; }

    // Filter by readiness
    const r = (asset.operational_readiness || "").toLowerCase();
    if (r === "high"   && !filtHigh) return;
    if (r === "medium" && !filtMed)  return;
    if (r === "low"    && !filtLow)  return;

    const fillColour = getColour(asset, colourBy);
    const isFixed = asset.type === "naval_base" || asset.type === "base" ||
                    asset.type === "air_station" || asset.type === "station" ||
                    asset.type === "barracks" || asset.type === "training_establishment" ||
                    asset.type === "headquarters";
    let marker;

    if (isFixed) {
      const icon = L.divIcon({
        html: `<div style="
          width:14px;height:14px;
          background:${fillColour};
          border:1px solid ${BORDER};
          box-shadow:0 0 6px ${fillColour}88;
          opacity:0;
          transition:opacity 0.3s;
        " class="map-marker-square"></div>`,
        iconSize: [14, 14],
        iconAnchor: [7, 7],
        className: "",
      });
      marker = L.marker([asset.latitude, asset.longitude], { icon });
    } else {
      marker = L.circleMarker([asset.latitude, asset.longitude], {
        radius: 8,
        color: BORDER,
        weight: 1,
        fillColor: fillColour,
        fillOpacity: 0.85,
        opacity: 0,
        className: "map-marker-circle",
      });
    }

    marker.addTo(map);
    setTimeout(() => {
      const el = marker.getElement && marker.getElement();
      if (el) {
        el.style.transition = "opacity 0.3s";
        el.style.opacity = "1";
        const sq = el.querySelector(".map-marker-square");
        if (sq) sq.style.opacity = "1";
      } else if (marker.setStyle) {
        marker.setStyle({ opacity: 1, fillOpacity: 0.85 });
      }
    }, 30);

    marker.bindPopup(() => buildPopup(asset), { maxWidth: 420 });
    markers.push(marker);

    if (showLabels) {
      const label = L.tooltip({
        permanent: true,
        direction: "right",
        offset: [12, 0],
        className: "osint-label",
      });
      const ls = getLabelStyles();
      label.setContent(`<span style="
        font-family:'Share Tech Mono',monospace;
        font-size:10px;
        color:#c8d6e5;
        background:${ls.bg};
        padding:1px 3px;
        border:1px solid ${ls.border};
        white-space:nowrap;
      ">${asset.name}</span>`);
      label.setLatLng([asset.latitude, asset.longitude]);
      label.addTo(map);
      labelLayers.push(label);
    }
  });

  updateLegend(colourBy);
}

function getColour(asset, colourBy) {
  if (colourBy === "service") {
    return getServiceColour(asset.service || "royal_navy");
  }
  if (colourBy === "readiness") {
    return READINESS_COLOURS[(asset.operational_readiness || "").toLowerCase()] || "#4a5568";
  }
  return "#4a5568";
}

function buildPopup(asset) {
  const r = (asset.operational_readiness || "").toLowerCase();
  const rClass = r === "high" ? "high" : r === "medium" ? "medium" : r === "low" ? "low" : "";
  const rText = r ? r.toUpperCase() : "—";
  const conf = asset.confidence_score != null
    ? Math.round(asset.confidence_score * 100)
    : null;
  const coords = (asset.latitude != null && asset.longitude != null)
    ? `${asset.latitude.toFixed(3)}°, ${asset.longitude.toFixed(3)}°`
    : "—";

  let sourcesHtml = "";
  if (asset.source_urls && asset.source_urls.length > 0) {
    sourcesHtml = `<hr class="popup-divider"><div class="popup-sources">`;
    for (const url of asset.source_urls.slice(0, 3)) {
      if (url) sourcesHtml += `<a href="${url}" target="_blank" rel="noopener">${url.replace(/https?:\/\//,"")}</a>`;
    }
    sourcesHtml += `</div>`;
  }

  const svc = asset.service || "royal_navy";
  const svcColour = getServiceColour(svc);
  const svcLabel  = getServiceLabel(svc);

  // Service-specific optional fields
  let optionalHtml = "";
  const optFields = [
    ["Hull Number",    asset.hull_number],
    ["Home Port",      asset.home_port],
    ["Aircraft Type",  asset.aircraft_type],
    ["Parent Wing",    asset.parent_wing],
    ["Squadron No.",   asset.squadron_number],
    ["Parent Brigade", asset.parent_brigade],
    ["Regt. Identity", asset.regimental_identity],
    ["Vehicle Fleet",  asset.vehicle_fleet],
  ];
  const present = optFields.filter(([, v]) => v);
  if (present.length > 0) {
    optionalHtml = `<hr class="popup-divider"><div style="font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Unit Details</div>`;
    for (const [k, v] of present) {
      optionalHtml += `<div class="popup-row"><span class="popup-key">${k}</span><span class="popup-val">${truncate(v, 60)}</span></div>`;
    }
  }

  return `
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
      <span style="background:${svcColour};color:#fff;font-size:9px;letter-spacing:1px;padding:2px 6px;font-weight:bold">${svcLabel}</span>
      <div class="popup-name" style="margin:0">${asset.name}</div>
    </div>
    <div class="popup-row"><span class="popup-key">Class / Type</span><span class="popup-val">${asset.class || "—"}</span></div>
    <div class="popup-row"><span class="popup-key">Category</span><span class="popup-val">${fmt(asset.unit_category)}</span></div>
    <div class="popup-row"><span class="popup-key">Readiness</span><span class="popup-val ${rClass}">${rText}</span></div>
    ${asset.readiness_rationale ? `<div class="popup-rationale">${truncate(asset.readiness_rationale, 200)}</div>` : ""}
    <div class="popup-row"><span class="popup-key">Assignment</span><span class="popup-val">${truncate(asset.current_assignment || "—", 80)}</span></div>
    <hr class="popup-divider">
    <div class="popup-row"><span class="popup-key">Location</span><span class="popup-val">${asset.location_description || "—"}</span></div>
    <div class="popup-row"><span class="popup-key">Coordinates</span><span class="popup-val">${coords}</span></div>
    ${conf !== null ? `
    <div class="popup-row" style="margin-top:4px">
      <span class="popup-key">Confidence</span>
      <span class="popup-val">
        <div class="conf-bar-wrap">
          <div class="conf-bar-bg"><div class="conf-bar-fill" style="width:${conf}%"></div></div>
          <span class="conf-pct">${conf}%</span>
        </div>
      </span>
    </div>` : ""}
    ${optionalHtml}
    ${sourcesHtml}
  `;
}

function fmt(s) {
  if (!s) return "—";
  return s.replace(/_/g, " ").replace(/\b\w/g, c => c.toUpperCase());
}
function truncate(s, n) {
  if (!s || s.length <= n) return s || "—";
  return s.slice(0, n) + "…";
}

// ── Legend ────────────────────────────────────────────────────────────────
function updateLegend(colourBy) {
  const el = document.getElementById("legend-items");
  el.innerHTML = "";

  // Marker shapes
  const shapesHeader = document.createElement("div");
  shapesHeader.style.cssText = "font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);margin-bottom:6px;margin-top:2px";
  shapesHeader.textContent = "Marker Shape";
  el.appendChild(shapesHeader);

  const squareRow = document.createElement("div");
  squareRow.className = "legend-item";
  squareRow.innerHTML = `<div style="width:12px;height:12px;background:var(--text-dim);border:1px solid rgba(255,255,255,0.2);flex-shrink:0"></div><span>Fixed installation</span>`;
  el.appendChild(squareRow);

  const circleRow = document.createElement("div");
  circleRow.className = "legend-item";
  circleRow.innerHTML = `<div style="width:12px;height:12px;border-radius:50%;background:var(--text-dim);border:1px solid rgba(255,255,255,0.2);flex-shrink:0"></div><span>Mobile unit</span>`;
  el.appendChild(circleRow);

  // Dynamic colour key
  const colourHeader = document.createElement("div");
  colourHeader.style.cssText = "font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);margin-bottom:6px;margin-top:10px";
  colourHeader.textContent = "Colour Key";
  el.appendChild(colourHeader);

  let entries = [];
  if (colourBy === "service") {
    entries = [
      { colour: SERVICE_COLOURS.royal_navy,     label: "Royal Navy" },
      { colour: SERVICE_COLOURS.british_army,   label: "British Army" },
      { colour: SERVICE_COLOURS.royal_air_force,label: "Royal Air Force" },
      { colour: SERVICE_COLOURS.joint,          label: "Joint / Other" },
    ];
  } else if (colourBy === "readiness") {
    entries = [
      { colour: READINESS_COLOURS.high,   label: "High" },
      { colour: READINESS_COLOURS.medium, label: "Medium" },
      { colour: READINESS_COLOURS.low,    label: "Low" },
    ];
  }

  for (const e of entries) {
    const row = document.createElement("div");
    row.className = "legend-item";
    row.innerHTML = `<div class="legend-swatch" style="background:${e.colour};border-color:${e.colour}"></div><span>${e.label}</span>`;
    el.appendChild(row);
  }
}

// ── Footer ────────────────────────────────────────────────────────────────
function updateFooter() {
  const footer = document.getElementById("footer");
  if (!currentData) {
    footer.innerHTML = `<div id="footer-nodata">NO DATA LOADED</div>`;
    return;
  }
  const assets = Array.isArray(currentData.assets || currentData)
    ? (currentData.assets || currentData) : [];
  const meta = currentData.metadata || {};

  const filtRN    = document.getElementById("filt-svc-rn").checked;
  const filtBA    = document.getElementById("filt-svc-ba").checked;
  const filtRAF   = document.getElementById("filt-svc-raf").checked;
  const filtJoint = document.getElementById("filt-svc-joint").checked;

  let navyCount = 0, armyCount = 0, rafCount = 0, hiddenCount = 0;
  let located = 0;
  const confs = [];

  for (const a of assets) {
    const svc = a.service || "royal_navy";
    if      (svc === "royal_navy")      navyCount++;
    else if (svc === "british_army")    armyCount++;
    else if (svc === "royal_air_force") rafCount++;

    const isJoint = svc !== "royal_navy" && svc !== "british_army" && svc !== "royal_air_force";
    const isHidden = (!filtRN    && svc === "royal_navy") ||
                     (!filtBA    && svc === "british_army") ||
                     (!filtRAF   && svc === "royal_air_force") ||
                     (!filtJoint && isJoint);
    if (isHidden) { hiddenCount++; continue; }

    if (a.latitude != null) located++;
    if (a.confidence_score != null) confs.push(a.confidence_score);
  }

  const avgConf = confs.length ? Math.round((confs.reduce((a,b)=>a+b,0)/confs.length)*100) : 0;
  const tokens  = meta.total_tokens_used ? meta.total_tokens_used.toLocaleString() : "—";
  const updated = meta.generated_at ? fmtDate(meta.generated_at) : "—";

  const navyPart  = navyCount  ? `NAVY: ${navyCount} | ` : "";
  const armyPart  = armyCount  ? `ARMY: ${armyCount} | ` : "";
  const rafPart   = rafCount   ? `RAF: ${rafCount} | `   : "";
  const hiddenPart = hiddenCount ? ` | HIDDEN: ${hiddenCount}` : "";

  footer.innerHTML = `
    <div id="footer-left">DEMO MODE &nbsp;|&nbsp; TOKENS: ${tokens} | UPDATED: ${updated}</div>
    <div id="footer-centre">${navyPart}${armyPart}${rafPart}LOCATED: ${located}${hiddenPart} | AVG CONF: ${avgConf}%</div>
    <div id="footer-right"></div>
  `;
}

// ── Theme switching ───────────────────────────────────────────────────────
function setTheme(name) {
  document.body.classList.remove("theme-highcon", "theme-nightvis");
  if (name === "highcon") document.body.classList.add("theme-highcon");
  if (name === "nightvis") document.body.classList.add("theme-nightvis");
  ["default","highcon","nightvis"].forEach(t => {
    document.getElementById("btn-theme-" + t).classList.toggle("active", t === name);
  });
  if (map) map.getPanes().tilePane.style.filter = TILE_PANE_FILTER[name] || "";
  currentTheme = name;
  if (currentData) updateMap();
}

// ── Init ──────────────────────────────────────────────────────────────────
initMap();
setStatus("ready", "SYSTEM READY");

// Demo mode: load embedded data immediately
(function () {
  currentData = EMBEDDED_DATA;
  const meta = EMBEDDED_DATA.metadata || {};
  statusInfo.existing = true;
  statusInfo.existingFile = "embedded (" + (meta.services_loaded || []).join(", ") + ")";
  statusInfo.existingModified = meta.generated_at || null;
  selectDatasource("existing");
  updateMap();
  updateFooter();

  // Enable toggles for services that have data
  const loaded = meta.services_loaded || [];
  if (loaded.includes("british_army"))   document.getElementById("ba-toggle").checked = true;
  if (loaded.includes("royal_air_force"))document.getElementById("raf-toggle").checked = true;
  updateMap();
  updateFooter();

  // Simulated typewriter agent log
  const assets = EMBEDDED_DATA.assets || [];
  const lines = [];
  const readinessLabel = r => r ? r.toUpperCase() : "UNKNOWN";
  const svcTag = svc => {
    if (svc === "royal_navy")      return "[NAVY/OSINT]";
    if (svc === "british_army")    return "[ARMY/OSINT]";
    if (svc === "royal_air_force") return "[RAF/OSINT]";
    return "[OSINT]";
  };
  assets.forEach(a => {
    const tag = svcTag(a.service);
    lines.push(["cyan",  `${tag} Querying: ${a.name} deployment 2026`]);
    if (a.location_description) {
      lines.push(["green", `${tag} ${a.name} — ${a.class || a.type} — ${a.location_description}`]);
    } else {
      lines.push(["green", `${tag} ${a.name} — ${a.class || a.type}`]);
    }
    if (a.operational_readiness) {
      lines.push(["white", `${tag} Readiness: ${readinessLabel(a.operational_readiness)} — ${(a.current_assignment || "assignment not confirmed").slice(0,80)}`]);
    }
  });
  lines.push(["dim", `[STATUS] Dataset loaded. ${assets.length} assets. ${assets.filter(x=>x.latitude!=null).length} geocoded.`]);

  let i = 0;
  const typeNext = () => {
    if (i >= lines.length) return;
    const [cls, text] = lines[i++];
    log(cls, text);
    setTimeout(typeNext, 40);
  };
  typeNext();
})();
</script>
